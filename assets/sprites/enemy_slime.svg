<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="slimeBody" cx="40%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#c6f6d5"/>
      <stop offset="32%" stop-color="#9ae6b4"/>
      <stop offset="68%" stop-color="#48bb78"/>
      <stop offset="100%" stop-color="#22683f"/>
    </radialGradient>
    <radialGradient id="slimeCore" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#e9fff2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e9fff2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slimeShine" x1="0.1" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- ground shadow -->
  <ellipse cx="64" cy="116" rx="36" ry="9" fill="#0a3a22" opacity="0.22"/>
  <!-- drop shadow (offset, no filter for mobile compat) -->
  <path d="M64 23 C92 23 104 49 104 75 C104 103 86 117 64 117 C42 117 24 103 24 75 C24 49 36 23 64 23 Z" fill="#143d28" opacity="0.28"/>
  <!-- body -->
  <path d="M64 18 C92 18 104 44 104 70 C104 98 86 112 64 112 C42 112 24 98 24 70 C24 44 36 18 64 18 Z" fill="url(#slimeBody)"/>
  <!-- subsurface core glow -->
