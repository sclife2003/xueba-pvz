  <circle cx="86" cy="42" r="2" fill="#ffffff" opacity="0.7"/>
  <!-- cheeks -->
  <ellipse cx="42" cy="80" rx="8" ry="5" fill="#f88379" opacity="0.45"/>
  <ellipse cx="86" cy="80" rx="8" ry="5" fill="#f88379" opacity="0.45"/>
  <!-- glossy lazy eyes -->
  <ellipse cx="50" cy="66" rx="10" ry="11.5" fill="#1a202c"/>
  <ellipse cx="78" cy="66" rx="10" ry="11.5" fill="#1a202c"/>
  <circle cx="53" cy="62" r="3.6" fill="#ffffff"/>
  <circle cx="81" cy="62" r="3.6" fill="#ffffff"/>
  <circle cx="47" cy="70" r="1.6" fill="#ffffff" opacity="0.7"/>
  <circle cx="75" cy="70" r="1.6" fill="#ffffff" opacity="0.7"/>
  <!-- heavy lazy lids -->
  <path d="M39 59 Q50 54 61 59 L61 56 Q50 51 39 56 Z" fill="#22683f"/>
  <path d="M67 59 Q78 54 89 59 L89 56 Q78 51 67 56 Z" fill="#22683f"/>
