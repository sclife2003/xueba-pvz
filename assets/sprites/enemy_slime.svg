  <text x="90" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#2f855a" opacity="0.85">z</text>
  <text x="101" y="29" font-family="Arial" font-size="11" font-weight="bold" fill="#2f855a" opacity="0.6">z</text>
