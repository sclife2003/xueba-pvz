<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="pencilBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d99a2b"/>
    </linearGradient>
  </defs>
  <!-- ground shadow -->
  <ellipse cx="64" cy="117" rx="26" ry="7" fill="#000000" opacity="0.18"/>
  <!-- pencil (slightly tilted) -->
  <g transform="rotate(-8 64 64)">
    <!-- wood cone -->
    <polygon points="64,8 54,30 74,30" fill="#e8c39e" stroke="#b9825b" stroke-width="2"/>
    <!-- graphite tip -->
    <polygon points="64,8 60,18 68,18" fill="#3a3a3a"/>
    <!-- barrel -->
    <rect x="50" y="30" width="28" height="62" rx="4" fill="url(#pencilBody)" stroke="#a9772a" stroke-width="2"/>
    <!-- barrel highlight -->
    <rect x="54" y="33" width="5" height="56" rx="2.5" fill="#ffffff" opacity="0.35"/>
    <!-- ferrule -->
    <rect x="50" y="92" width="28" height="9" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="50" y="95" width="28" height="2" fill="#94a3b8"/>
    <!-- eraser -->
    <rect x="51" y="101" width="26" height="14" rx="6" fill="#f687b3" stroke="#d4699a" stroke-width="2"/>
  </g>
  <!-- face -->
  <ellipse cx="57" cy="58" rx="6" ry="7" fill="#ffffff"/>
  <ellipse cx="72" cy="56" rx="6" ry="7" fill="#ffffff"/>
  <circle cx="58" cy="59" r="3" fill="#1a202c"/>
  <circle cx="73" cy="57" r="3" fill="#1a202c"/>
  <circle cx="57" cy="58" r="1" fill="#ffffff"/>
  <circle cx="72" cy="56" r="1" fill="#ffffff"/>
  <path d="M51 49 Q57 47 62 50" stroke="#7a5b1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M67 47 Q73 45 78 48" stroke="#7a5b1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M58 68 Q66 74 74 67" stroke="#7a5b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- arm ready to shoot -->
  <path d="M44 70 Q34 72 32 64" stroke="#d99a2b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="31" cy="63" r="4" fill="#fbbf24" stroke="#a9772a" stroke-width="1.5"/>
</svg>
