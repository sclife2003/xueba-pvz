        // 屏幕坐标 -> 迷宫格子，点击可走格则自动寻路过去
        mazeTap(sx, sy) {
            if (!this.maze) return;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width, scaleY = this.canvas.height / rect.height;
            const cx = (sx - rect.left) * scaleX, cy = (sy - rect.top) * scaleY;
            const m = this.maze;
            const gx = Math.floor((cx - m.mx) / m.cs), gy = Math.floor((cy - m.my) / m.cs);
            if (gx < 0 || gx >= m.w || gy < 0 || gy >= m.h) return;
            if (m.map[gy][gx] === 1) return; // 墙不可点
            const path = this.findMazePath(m.px, m.py, gx, gy);
            if (path && path.length > 0) { this.mazePath = path; this.mazePathIdx = 0; this.currentTouch = null; }
        }

        // BFS 最短路径；找不到返回 null（代表不可达）
        findMazePath(sx, sy, tx, ty) {
            const m = this.maze;
            if (!m || (sx === tx && sy === ty)) return [];
            const key = (x, y) => y * m.w + x;
            const visited = new Set([key(sx, sy)]);
            const prev = {};
            const queue = [{ x: sx, y: sy }];
            const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
            let head = 0;
            while (head < queue.length) {
                const cur = queue[head++];
                if (cur.x === tx && cur.y === ty) {
                    const path = [];
                    let node = { x: tx, y: ty };
                    while (!(node.x === sx && node.y === sy)) { path.push(node); node = prev[key(node.x, node.y)]; }
                    return path.reverse();
                }
                for (const d of dirs) {
                    const nx = cur.x + d.x, ny = cur.y + d.y;
                    if (nx >= 0 && nx < m.w && ny >= 0 && ny < m.h && m.map[ny][nx] !== 1 && !visited.has(key(nx, ny))) {
                        visited.add(key(nx, ny));
                        prev[key(nx, ny)] = { x: cur.x, y: cur.y };
                        queue.push({ x: nx, y: ny });
                    }
                }
            }
            return null;
        }

        findExit(map, w, h) {
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (map[y][x] === 5) return { x, y };
            return null;
        }

        handleClick(x, y) {
            if (this.phase !== 'td' || this.combatPaused) return false;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;
            const cx = (x - rect.left) * scaleX;
            const cy = (y - rect.top) * scaleY;
            for (let i = this.objs.length - 1; i >= 0; i--) {
                const o = this.objs[i];
                if (o.type === 'star') {
                    if ((cx-o.x)**2 + (cy-o.y)**2 < 55**2) {
                        this.objs.splice(i, 1);
                        this.openCombatQuiz();
                        return true;
                    }
                }
                if (o.type === 'orb') {
                    if ((cx-o.x)**2 + (cy-o.y)**2 < 50**2) {
                        this.mp += (o.val || 25);
                        this.spawnParticles(o.x, o.y, '#F6E05E', 8);
                        this.floatText(`+${o.val}`, o.x, o.y, '#F6E05E', 40);
                        this.objs.splice(i, 1); this.updateStats(); return true;
                    }
                }
            }
            const uiSelected = this.selectedTower;
            if (!uiSelected) {
                // 未选道具：点击场上单位 → 选中以供关卡内升级；点击空地 → 取消选中
                const fc = Math.floor((cx - this.OX) / this.G);
                const fr = Math.floor((cy - this.OY) / this.G);
                const tw = this.objs.find(o => o.type === 'tower' && o.c === fc && o.r === fr);
                if (tw && this.advancedMode) { this.selectField(tw); return true; } // 仅进阶模式可选中升级；主线点单位不做事
                this.clearField(); return false;
            }
            if (this.towerCooldowns[uiSelected] > 0) return false;
            const c = Math.floor((cx - this.OX) / this.G);
            const r = Math.floor((cy - this.OY) / this.G);
            if (c >= 0 && c < this.C && r >= 0 && r < this.R) {
                if (!this.objs.some(o =>
                    (o.type === 'tower' && o.c === c && o.r === r) ||
                    (o.type === 'enemy' && o.r === r && Math.abs(o.x - (this.OX + c * this.G)) < 20)
                )) {
                    const tData = TOWERS[uiSelected];
                    const isFree = this.freeNextTower;
                    if (isFree || this.mp >= tData.cost) {
                        if (isFree) this.freeNextTower = false; else this.mp -= tData.cost;
                        const tw = { type: 'tower', id: uiSelected, c, r, x: this.OX + c * this.G, y: this.OY + r * this.G, hp: tData.dmg, maxHp: tData.dmg, data: tData, cd: 0, fire: 0, placedFrame: this.frame };
                        // 永久升级：若该文具已升级，套用更强属性 + 换皮，并依需要缩短冷却
                        const permUp = (this.save.toolUpgrades && this.save.toolUpgrades[uiSelected]) ? TOOL_UPGRADES[uiSelected] : null;
                        if (permUp) { tw.upgradedPermanent = true; tw.up = permUp; permUp.apply(tw); }
                        this.objs.push(tw);
                        this.towerCooldowns[uiSelected] = Math.round(tData.recharge * ((permUp && permUp.recharge) || 1));
                        this.spawnParticles(cx, cy, '#fff', 8);
                        this.floatText(isFree ? '免费!' : `-${tData.cost}`, cx, cy, isFree ? '#48bb78' : '#fbbf24');
                        this.updateStats();
                        this.callbacks.onSelectTower(null);
                        this.selectedTower = null; return true;
                    }
                }
            }
            return false;
        }

        startTD() {
            this.phase = 'td'; this.callbacks.onPhaseChange('td'); this.waitNextWave = null;
            this.laneWarnings = [];
            if (this.savedTowers.length > 0) { this.objs = [...this.savedTowers]; this.savedTowers = []; }
            else if (this.waveIdx === 0) this.objs = [];
            const lvl = LEVELS[this.levelIdx];
            const waveData = lvl.waves[this.waveIdx];
            if (!waveData) { return; }
            this.spawnState = { active: true, groupIdx: 0, mobsLeftInGroup: waveData.groups[0].n, timer: waveData.groups[0].preDelay, totalGroups: waveData.groups.length, nextRow: null };
            // 本波敌人预告 + 关卡提示（让玩家开局就明白策略与即将面对的敌人）
            const tally = {};
            waveData.groups.forEach(g => { tally[g.e] = (tally[g.e] || 0) + g.n; });
            const enemies = Object.keys(tally).map(id => ({
                id,
                name: (ENEMIES[id] && ENEMIES[id].name) || id,
                color: (ENEMIES[id] && ENEMIES[id].color) || '#ffffff',
                count: tally[id],
                hint: (ENEMIES[id] && ENEMIES[id].hint) || '',
                ability: (ENEMIES[id] && ENEMIES[id].ability) || 'none'
            }));
            this.callbacks.onWaveIntro({
                wave: this.waveIdx + 1,
                totalWaves: lvl.waves.length,
                enemies,
                tip: lvl.tip || '',
                showTip: this.waveIdx === 0,
                isLastWave: this.waveIdx === lvl.waves.length - 1
            });
            this.pushCombatState();
        }

        startMaze() {
            this.phase = 'maze'; this.callbacks.onPhaseChange('maze');
            this.clearField();
            this.savedTowers = this.objs.filter(o => o.type === 'tower');
            this.objs = []; this.particles = [];
            this.mazePath = null; this.currentTouch = null;
            const targetCell = 50;
            let mw = Math.floor((this.w - 20) / targetCell);
            let mh = Math.floor((this.h - 20) / targetCell);
            if (mw % 2 === 0) mw--; if (mh % 2 === 0) mh--;
            mw = Math.max(9, mw); mh = Math.max(9, mh);
            const cs = Math.min(60, Math.floor(Math.min(this.w / mw, this.h / mh)));
            const mx = (this.w - mw * cs) / 2;
            const my = (this.h - mh * cs) / 2;
            // 生成迷宫并验证出口从起点(1,1)可达，最多重试5次，杜绝"没路/被墙挡住"
            let map, exit;
            for (let attempt = 0; attempt < 5; attempt++) {
                map = generateMaze(mw, mh);
                exit = this.findExit(map, mw, mh);
                this.maze = { map, w: mw, h: mh, px: 1, py: 1, cs, mx, my, exit };
                if (exit && this.findMazePath(1, 1, exit.x, exit.y)) break;
            }
        }

        updateMazeMovement() {
            if (this.phase !== 'maze' || !this.maze) return;
            if (this.mazeMoveTimer > 0) { this.mazeMoveTimer--; return; }
            const m = this.maze;
            // 自动寻路：点击空地后角色逐格走过去（手机主操作方式）
            if (this.mazePath && this.mazePathIdx < this.mazePath.length) {
                const step = this.mazePath[this.mazePathIdx++];
                m.px = step.x; m.py = step.y; this.mazeMoveTimer = 6;
                const tile = m.map[step.y][step.x];
                if (tile === 5) { this.mazePath = null; this.generateQuiz(step.x, step.y); return; }
                if (this.mazePathIdx >= this.mazePath.length) this.mazePath = null;
                return;
            }
            // 拖曳即时移动（备用操作方式）
            if (!this.currentTouch) return;
            const cs = m.cs, mx = m.mx, my = m.my;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width, scaleY = this.canvas.height / rect.height;
            const touchX = (this.currentTouch.x - rect.left) * scaleX;
            const touchY = (this.currentTouch.y - rect.top) * scaleY;
            const playerScreenX = mx + m.px * cs + cs/2;
            const playerScreenY = my + m.py * cs + cs/2;
            const dx = touchX - playerScreenX, dy = touchY - playerScreenY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            let moveX = 0, moveY = 0;
            if (Math.abs(dx) > Math.abs(dy)) { moveX = dx > 0 ? 1 : -1; } else { moveY = dy > 0 ? 1 : -1; }
            const nx = m.px + moveX, ny = m.py + moveY;
            if (nx >= 0 && nx < m.w && ny >= 0 && ny < m.h) {
                const tile = m.map[ny][nx];
                if (tile !== 1) {
                    m.px = nx; m.py = ny; this.mazeMoveTimer = 7;
                    if (tile === 5) { this.generateQuiz(nx, ny); }
                }
            }
        }

        generateQuiz(tx, ty, isRescue = false, isFollowUp = false) {
            this.callbacks.onLoading(true);
            this.currentTouch = null;
            setTimeout(() => {
                const q = this.getQuestion();
                this.currentQuestionObj = q;
                const answersWithIndex = q.a.map((ans, idx) => ({ ...ans, originalIndex: idx }));
                const canSOS = !isRescue && !isFollowUp;
                const canHint = this.questionsAnswered > 0;
                this.callbacks.onQuizOpen(q.q, answersWithIndex, isRescue, canSOS, canHint);
                if (tx !== null && ty !== null) this._pendingQuizTile = { x: tx, y: ty };
                this.callbacks.onLoading(false);
            }, 500);
        }

        resolveQuiz(correct) {
            this.questionsAnswered++;
            if (!correct) this.wrongAnswers++; // Phase 4：星级评定计数
            // Phase C：学科统计（答对）+ 错题收集（答错，本关 session 内，去重、限量）
            const cq = this.currentQuestionObj;
            if (correct) {
                const subj = (cq && cq.subject) || '常识';
                this.subjectsLearned[subj] = (this.subjectsLearned[subj] || 0) + 1;
                this.addShards(1); // 答对一题 → +1 知识碎片
            } else if (cq) {
                const correctAns = ((cq.a || []).find(o => o.ok === 1) || {}).t || '';
                const exp = (cq.visual && cq.visual.content && cq.visual.content.join('　')) || '仔细审题，下次一定行！';
                if (!this.wrongList.some(w => w.q === cq.q) && this.wrongList.length < 8) {
                    this.wrongList.push({ q: cq.q, ans: correctAns, exp });
                }
            }
            if (this.combatPaused) {
                // 战斗答题：答对 → 三选一奖励（战场维持暂停，待选奖励）；答错 → 扣少量能量 + 简短解析，立即恢复
                if (correct) {
                    this.chargeTeacher(35); // 答对题：班主任技能槽大幅充能
                    this.callbacks.onRewardPicker(this.rollRewards());
                } else {
                    const penalty = 30 + Math.round(((LEVELS[this.levelIdx].difficulty || 1) - 1) * 40);
                    this.mp = Math.max(0, this.mp - penalty);
                    const tip = (this.currentQuestionObj && this.currentQuestionObj.visual && this.currentQuestionObj.visual.content && this.currentQuestionObj.visual.content[0]) || '仔细审题，下次一定行！';
                    this.callbacks.onToast('答错 -' + penalty + ' 能量 ｜ ' + tip);
                    this.combatPaused = false;
                    this.updateStats();
                }
                return;
            }
            if (this.phase === 'rescue_quiz') {
                if (correct) { this.hp = 4; this.phase = 'td'; this.callbacks.onPhaseChange('td'); this.updateStats(); this.syncSave(); }
                else { this.phase = 'over'; this.callbacks.onPhaseChange('over'); this.callbacks.onGameOver(false, "复活失败", "下次再接再厉！"); }
                return;
            }
            const tile = this._pendingQuizTile;
            if (correct && this.maze && tile) {
                this.mp += 200; this.hp = Math.min(HP_CAP, this.hp + 2); this.updateStats(); this.syncSave();
                this.spawnParticles(this.w/2, this.h/2, '#ECC94B', 30);
                this.floatText("通关! +200 能量 +2 ❤️", this.w/2, this.h/2, '#48bb78', 80, 40);
                setTimeout(() => this.nextLevel(), 1200);
            } else {
                if (this.maze) {
                    const neighbors = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
                    for(let n of neighbors) {
                        const nx = this.maze.px + n.x, ny = this.maze.py + n.y;
                        if(nx>=0 && nx<this.maze.w && ny>=0 && ny<this.maze.h && this.maze.map[ny][nx]===0) { this.maze.px = nx; this.maze.py = ny; break; }
                    }
                }
                this.mp = Math.max(0, this.mp - 50); this.updateStats();
                this.floatText("答错扣分!", this.w/2, this.h/2, '#f56565', 60, 30);
            }
        }

        // Phase C：敌人贴纸「遇到即收集」— 敌人首次出现就写进收藏（每种只写一次盘，存档保持 ASCII）
        collectEnemySticker(id) {
            if (!id || id === 'elf') return; // 知识精灵是友方能量单位，不算敌人贴纸
            if (this.enemiesSeen && this.enemiesSeen[id]) return;
            if (!this.enemiesSeen) this.enemiesSeen = {};
            this.enemiesSeen[id] = true;
            if (!this.save.stickers) this.save.stickers = {};
            const key = 'enemy:' + id;
            if (!this.save.stickers[key]) { this.save.stickers[key] = true; writeGameSave(this.save); }
        }

        damageEnemy(enemy, dmg, sourceColor) {
            if (!enemy || enemy.type !== 'enemy') return;
            let finalDmg = dmg;
            if (enemy.data && enemy.data.ability === 'paperShield' && enemy.hp > enemy.maxHp * 0.55) {
                finalDmg = Math.max(1, Math.round(dmg * 0.55));
                enemy.shieldFlash = 12;
            }
            enemy.hp -= finalDmg;
            enemy.hitFlash = Math.max(enemy.hitFlash || 0, 5);
            if (sourceColor) this.spawnParticles(enemy.x, enemy.y, sourceColor, 4);
        }

        triggerLaneRescue(enemy) {
            if (!enemy || enemy.id === 'elf') return false;
            if (!this.laneRescueUsed) this.laneRescueUsed = {};
            if (this.laneRescueUsed[enemy.r]) return false;
            this.laneRescueUsed[enemy.r] = true;
            const y = this.OY + enemy.r * this.G + this.G / 2;
            this.floatText('值日生救场！', this.OX + this.G * 1.2, y, '#F6D365', 80, 28);
            this.spawnParticles(this.OX + this.G * 0.9, y, '#F6D365', 26);
            this.objs.forEach(e => {
                if (e.type === 'enemy' && e.r === enemy.r) {
                    e.x = Math.max(e.x, this.OX + this.G * 0.85);
                    e.slowTimer = Math.max(e.slowTimer || 0, 140);
                    this.damageEnemy(e, 420, '#F6D365');
                }
            });
            this.pushCombatState();
            return true;
        }

        // 知识碎片：永久升级货币。即时写盘（频率低）；累计本关获得量供结算展示。
        addShards(n) {
            if (!n) return;
            if (typeof this.save.shards !== 'number') this.save.shards = 0;
            this.save.shards = Math.min(999999, this.save.shards + n); // 与 import clamp 同上限，防爆表
            this.shardsEarnedThisLevel = (this.shardsEarnedThisLevel || 0) + n;
            writeGameSave(this.save);
        }

        // Phase 4：结算星级并保存最佳成绩
        computeAndSaveStars() {
            const lvl = LEVELS[this.levelIdx];
            const sg = lvl.starGoals || {};
            const hp = this.hp, wrong = this.wrongAnswers || 0;
            let stars = 1;
            if (sg.twoStar && hp >= (sg.twoStar.minHp || 0)) stars = 2;
            if (sg.threeStar && hp >= (sg.threeStar.minHp || 0) && wrong <= (sg.threeStar.maxWrongAnswers != null ? sg.threeStar.maxWrongAnswers : 99)) stars = 3;
            const id = lvl.id || ('L' + this.levelIdx);
            if (!this.save.results) this.save.results = {};
            const prev = this.save.results[id] || { stars: 0, bestHp: 0, bestWrong: 99 };
            const isNewBest = stars > prev.stars;
            this.save.results[id] = {
                stars: Math.max(prev.stars, stars),
                bestHp: Math.max(prev.bestHp, hp),
                bestWrong: Math.min(prev.bestWrong, wrong)
            };
            // Phase A/B 轻量收集：通关即收集该关贴纸；reward 为 badge 则收集徽章（资料模型先跑起来，完整贴纸册留待 Phase C）
            if (!this.save.stickers) this.save.stickers = {};
            if (!this.save.badges) this.save.badges = {};
            const isFirstSticker = !this.save.stickers[id];
            this.save.stickers[id] = true;
            let gotBadge = '';
            if (lvl.reward && lvl.reward.type === 'badge' && lvl.reward.text && !this.save.badges[id]) {
                this.save.badges[id] = true; gotBadge = lvl.reward.text; // 存 presence 旗标即可；显示文字从 LEVELS reward 取，存档保持 ASCII
            }
            // Phase C：世界完成徽章 — 该关所属世界的所有真实关卡都已通关
            let gotWorldBadge = '';
            const world = WORLDS.find(w => !w.locked && w.nodes.some(n => n.levelIdx === this.levelIdx));
            if (world) {
                const realNodes = world.nodes.filter(n => n.levelIdx != null);
                const allCleared = realNodes.every(n => { const lid = LEVELS[n.levelIdx] && LEVELS[n.levelIdx].id; const rr = lid && this.save.results[lid]; return rr && rr.stars > 0; });
                const wkey = 'world:' + world.id;
                if (allCleared && !this.save.badges[wkey]) { this.save.badges[wkey] = true; gotWorldBadge = world.name; }
            }
            writeGameSave(this.save);
            const tags = [];
            if (wrong === 0) tags.push('零失误');
            if (hp >= HP_CAP) tags.push('完美防守');
            const stickerText = isFirstSticker ? ('🏅 收集到「' + friendlyLevelName(lvl) + '」贴纸！') : '';
            this.addShards(1 + stars); // 通关奖励碎片：基础 1 + 每颗星 1
            return { levelIdx: this.levelIdx, id, stars, hp, wrong, isNewBest, reward: lvl.reward || null, tags, isChallenge: !!lvl.isChallenge, name: lvl.name, stickerText, gotBadge, gotWorldBadge, subjectsLearned: this.subjectsLearned || {}, wrongList: this.wrongList || [], shardsEarned: this.shardsEarnedThisLevel || 0, shardsTotal: this.save.shards || 0 };
        }

        nextLevel() {
            this.waveIdx++;
            const lvl = LEVELS[this.levelIdx];
            if (this.waveIdx >= lvl.waves.length) {
                const result = this.computeAndSaveStars();
                const isLastCampaign = !lvl.isChallenge && this.levelIdx >= CAMPAIGN_COUNT - 1;
                if (!lvl.isChallenge && this.levelIdx + 1 < CAMPAIGN_COUNT) this.syncSave({ unlockedLevel: this.levelIdx + 1 });
                else this.syncSave();
                this.callbacks.onLevelComplete(this.levelIdx, Object.assign({ isLastCampaign }, result));
                this.phase = 'level_complete'; this.callbacks.onPhaseChange('level_complete');
                this.floatText("章节完成!", this.w/2, this.h/2, '#F6E05E', 150, 40);
            } else { this.startTD(); }
        }

        startLoop() {
            const loop = () => { this.update(); this.draw(); this.animationId = requestAnimationFrame(loop); };
            this.animationId = requestAnimationFrame(loop);
        }

        spawnOrb(x, y, val = 25) { this.objs.push({ type: 'orb', x, y, val, life: 400, maxLife: 400 }); }

        spawnStar() {
            const x = this.OX + this.G + Math.random() * Math.max(1, (this.C - 2) * this.G);
            const y = this.OY + this.G / 2 + Math.random() * Math.max(1, (this.R - 1) * this.G);
            this.objs.push({ type: 'star', x, y, life: 600, maxLife: 600 });
            this.floatText('💡 知识星出现！', x, y - 24, '#F6D365', 70, 20);
        }

        // 点击知识星 → 暂停战场并开启战斗答题（区别于迷宫出口答题）
        openCombatQuiz() {
            if (this.combatPaused) return;
            this.combatPaused = true;
            const q = this.getQuestion();
            this.currentQuestionObj = q;
            const answersWithIndex = q.a.map((ans, idx) => ({ ...ans, originalIndex: idx }));
            const canHint = this.questionsAnswered > 0;
            this.callbacks.onQuizOpen(q.q, answersWithIndex, false, false, canHint, true);
        }

        rollRewards() {
            const pool = REWARDS.map((_, i) => i);
            shuffleArray(pool);
            return pool.slice(0, 3).map(i => REWARDS[i]);
        }

        applyReward(id) {
            if (id === 'energy') {
                this.mp += 150; this.floatText('+150 能量', this.w/2, this.h/2, '#F6D365', 70, 34);
            } else if (id === 'focus') {
                this.objs.forEach(o => { if (o.type === 'enemy') o.slowTimer = 300; });
                this.floatText('全班专注！敌人减速', this.w/2, this.h/2, '#4A90E2', 70, 30);
            } else if (id === 'chalk') {
                const counts = new Array(this.R).fill(0);
                this.objs.forEach(o => { if (o.type === 'enemy') counts[o.r]++; });
                let best = 0; for (let r = 1; r < this.R; r++) if (counts[r] > counts[best]) best = r;
                this.objs.forEach(o => { if (o.type === 'enemy' && o.r === best) this.damageEnemy(o, 400, '#E85D5D'); });
                this.floatText('粉笔风暴！', this.OX + this.C*this.G/2, this.OY + best*this.G + this.G/2, '#E85D5D', 80, 30);
            } else if (id === 'heal') {
                this.objs.forEach(o => { if (o.type === 'tower') o.hp = o.maxHp; });
                this.floatText('紧急补课！防御回满', this.w/2, this.h/2, '#48bb78', 70, 30);
            } else if (id === 'free') {
                this.freeNextTower = true;
                this.floatText('下一个防御免费！', this.w/2, this.h/2, '#B9825B', 70, 28);
            }
            this.combatPaused = false;
            this.updateStats();
            this.syncSave();
        }

        // ----- Phase 2.5 System 1: 关卡前敌人预告 + 推荐策略 -----
        getLevelPreview(idx) {
            const lvl = LEVELS[idx];
            const tally = {};
            lvl.waves.forEach(w => w.groups.forEach(g => { tally[g.e] = (tally[g.e] || 0) + g.n; }));
            const enemies = Object.keys(tally).map(id => ({
                id, name: (ENEMIES[id] && ENEMIES[id].name) || id, color: (ENEMIES[id] && ENEMIES[id].color) || '#ffffff',
                count: tally[id], role: (ENEMIES[id] && ENEMIES[id].role) || 'normal', hint: (ENEMIES[id] && ENEMIES[id].hint) || ''
            }));
            const roles = new Set(enemies.filter(e => e.id !== 'elf').map(e => e.role));
            const strategies = ['课本发电站优先摆 2-3 个攒能量'];
            if (roles.has('fast')) strategies.push('快速敌人多：用胶水陷阱减速拖住');
            if (roles.has('normal')) strategies.push('普通敌人：铅笔投手当主力输出');
            if (roles.has('tank')) strategies.push('铁桶怪硬：橡皮盾挡路 + 集火破甲');
            if (roles.has('boss')) strategies.push('有魔王压线：留好橡皮盾与班主任技能');
            return {
                levelIdx: idx, id: lvl.id || ('L' + idx), name: lvl.name, enemies, strategies, isFixed: idx === 0, loadoutSize: LOADOUT_SIZE,
                archetype: lvl.archetype || '', hint: lvl.enemyPreviewHint || '', starGoals: lvl.starGoals || {},
                isBoss: !!lvl.isBoss, isChallenge: !!lvl.isChallenge, chapterId: lvl.chapterId || '',
                goal: lvl.goal || lvl.tip || '',
                recommendedTools: lvl.recommendedTools || Object.keys(TOWERS),
                mainlineLoadout: lvl.mainlineLoadout || Object.keys(TOWERS),
                lessonBeat: lvl.lessonBeat || null
            };
        }

        // ----- Phase 2.5 System 3: 班主任技能槽 -----
        canUseTeacherSkill() {
            return !!(this.activeLoadout && this.activeLoadout.includes('teacher'));
        }
        chargeTeacher(amt) {
            if (!this.canUseTeacherSkill()) return;
            if (this.teacherReady) return;
            this.teacherCharge = Math.min(this.teacherMax, this.teacherCharge + amt);
            if (this.teacherCharge >= this.teacherMax) {
                this.teacherReady = true;
                this.floatText('班主任技能就绪！', this.w / 2, this.h / 2, '#4A90E2', 80, 28);
                this.pushCombatState();
            }
        }
        releaseTeacherSkill() {
            if (!this.canUseTeacherSkill()) return;
            if (!this.teacherReady || this.phase !== 'td' || this.combatPaused) return;
            this.teacherReady = false; this.teacherCharge = 0;
            this.freezeTimer = 180; // 全班安静：定身 3 秒
            this.objs.forEach(o => { if (o.type === 'enemy') o.slowTimer = Math.max(o.slowTimer || 0, 180); });
            this.spawnParticles(this.w / 2, this.h / 2, '#4A90E2', 30);
            this.floatText('全班安静！敌人定身 3 秒', this.w / 2, this.h / 2, '#4A90E2', 90, 30);
            this.pushCombatState();
        }

        // ----- Phase 2.5 System 4: 提前上课（等待下一波时可提前开始，给少量能量） -----
        callNextWaveEarly() {
            if (this.phase !== 'td' || this.combatPaused) return;
            if (this.waitNextWave === null || this.waitNextWave <= 0) return;
            this.mp += 50;
            this.floatText('提前上课！+50 灵感值', this.w / 2, this.h / 2, '#F6D365', 70, 28);
            this.waitNextWave = 1; // 仅缩短等待计时，保留既有过波 flow（迷宫/答题）
            this.updateStats();
            this.pushCombatState();
        }

        // ----- Phase 2.5 System 5: 关卡内升级 -----
        selectField(tw) {
            this.selectedField = tw;
            const up = UPGRADES[tw.id];
            this.callbacks.onFieldSelect && this.callbacks.onFieldSelect({
                id: tw.id, name: tw.data.name, icon: tw.data.icon, color: tw.data.color,
                upgraded: !!tw.upgraded,
                canUpgrade: !!up && !tw.upgraded,
                upgradeName: up ? up.name : '', upgradeDesc: up ? up.desc : '', upgradeCost: up ? up.cost : 0
            });
        }
        clearField() {
            if (this.selectedField) { this.selectedField = null; this.callbacks.onFieldSelect && this.callbacks.onFieldSelect(null); }
        }
        upgradeSelectedField() {
            const tw = this.selectedField; if (!tw) return;
            const up = UPGRADES[tw.id]; if (!up || tw.upgraded) return;
            if (this.mp < up.cost) { this.floatText('能量不足', tw.x + this.G / 2, tw.y, '#E85D5D', 50, 22); return; }
            this.mp -= up.cost; tw.upgraded = true; up.apply(tw);
            this.spawnParticles(tw.x + this.G / 2, tw.y + this.G / 2, '#F6D365', 14);
            this.floatText('升级！' + up.name, tw.x + this.G / 2, tw.y, '#48bb78', 60, 22);
            this.updateStats();
            this.selectField(tw); // 刷新升级面板状态
        }

        // 推送战斗 HUD 额外状态（技能槽 / 提前上课按钮）
        pushCombatState() {
            this.callbacks.onCombatState && this.callbacks.onCombatState({
                teacherCharge: this.teacherCharge / this.teacherMax,
                teacherReady: this.teacherReady,
                waitWave: this.waitNextWave !== null && this.waitNextWave > 0
            });
        }

        spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 3 + 2;
                this.particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 30+Math.random()*20, color, size: Math.random()*4+2 });
            }
        }

        // 敌人死亡：纸屑 + 粉笔灰（校园主题），Boss 爆得更大
        spawnDeathFx(x, y, color, big) {
            const n = big ? 22 : 9;
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 3 + 1.5;
                this.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2.2, life: 40 + Math.random()*22, color: i % 2 ? color : '#F7F3E8', size: Math.random()*3+3, shape: 'scrap', rot: Math.random()*6.28, vr: (Math.random()-0.5)*0.5 });
            }
            const m = big ? 16 : 6;
            for (let i = 0; i < m; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 1.5 + 0.5;
                this.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1, life: 30 + Math.random()*20, color: '#ffffff', size: Math.random()*2+1.5, shape: 'dust' });
            }
        }

        floatText(text, x, y, color, life = 50, size = 24) { this.floatTexts.push({ text, x, y, color, life, size }); }

        update() {
            if (this.phase === 'over' || this.phase === 'level_complete' || this.phase === 'rescue_quiz') return;
            if (isOrientationBlocked(this.phase)) return;
            if (this.combatPaused) return; // 战斗答题/选奖励时冻结战场
            if (this.phase === 'maze') {
                this.updateMazeMovement();
                for(let i=this.floatTexts.length-1; i>=0; i--) { this.floatTexts[i].y--; this.floatTexts[i].life--; if(this.floatTexts[i].life<=0) this.floatTexts.splice(i,1); }
                for(let i=this.particles.length-1; i>=0; i--) { const p=this.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.life--; if(p.life<=0) this.particles.splice(i,1); }
                return;
            }
            if (this.hp <= 0 && this.phase !== 'rescue_quiz') {
                this.phase = 'over'; this.callbacks.onPhaseChange('over');
                this.callbacks.onGameOver(false, "游戏结束", "生命值耗尽！"); return;
            }
            this.frame++;
            if (this.phase === 'td') {
                for(const k in this.towerCooldowns) if (this.towerCooldowns[k] > 0) this.towerCooldowns[k]--;
                if (this.frame % 6 === 0) { this.mp += 1; }
                if (this.frame % 10 === 0) this.updateStats();
                this.naturalSunTimer--;
                if (this.naturalSunTimer <= 0) { this.spawnOrb(this.OX + Math.random()*(this.C*this.G), this.OY + Math.random()*(this.R*this.G), 40); this.naturalSunTimer = 300; }
                for (let i = this.laneWarnings.length - 1; i >= 0; i--) { if (--this.laneWarnings[i].life <= 0) this.laneWarnings.splice(i, 1); }
                if (this.freezeTimer > 0) this.freezeTimer--;
                if (this.frame % 30 === 0) this.pushCombatState(); // 技能槽进度平滑刷新
                // Phase 4 Boss「红笔点名」：预警一路 → 触发伤害该路最前防御；班主任定身可化解
                if (LEVELS[this.levelIdx].isBoss) {
                    if (this.objs.some(o => o.type === 'enemy' && o.id === 'boss')) {
                        this.bossTimer--;
                        if (this.bossTimer <= 0) {
                            const rows = [];
                            this.objs.forEach(o => { if (o.type === 'tower' && rows.indexOf(o.r) < 0) rows.push(o.r); });
                            if (rows.length) this.bossMarks.push({ r: rows[Math.floor(Math.random() * rows.length)], life: 95, max: 95, fired: false });
                            this.bossTimer = 420;
                        }
                    }
                    for (let bi = this.bossMarks.length - 1; bi >= 0; bi--) {
                        const mk = this.bossMarks[bi];
                        if (--mk.life <= 0 && !mk.fired) {
                            mk.fired = true;
                            if (this.freezeTimer > 0) {
                                this.floatText('红笔点名被化解！', this.OX + this.G, this.OY + mk.r * this.G + this.G / 2, '#4A90E2', 60, 24);
                            } else {
                                const ts = this.objs.filter(o => o.type === 'tower' && o.r === mk.r).sort((a, b) => b.x - a.x);
                                if (ts.length) { const t = ts[0]; t.hp -= 2000; t.hitFlash = 6; this.spawnParticles(t.x + this.G / 2, t.y + this.G / 2, '#E85D5D', 16); this.floatText('红笔点名！', t.x, t.y, '#E85D5D', 60, 26); }
                                else { this.floatText('红笔点名！', this.OX + this.G, this.OY + mk.r * this.G + this.G / 2, '#E85D5D', 60, 24); }
                            }
                            this.bossMarks.splice(bi, 1);
                        }
                    }
                }
                this.starTimer--;
                if (this.starTimer <= 0) {
                    if (this.spawnState.active || this.objs.some(o => o.type === 'enemy')) this.spawnStar();
                    this.starTimer = 720 + Math.floor(Math.random() * 360); // 约 12-18 秒掉一颗
                }
                if (this.spawnState.active) {
                    this.spawnState.timer--;
                    // 敌人生成前预先确定出现路线并闪红预警（让玩家来得及部署该路）
                    if (this.spawnState.timer <= 75 && this.spawnState.nextRow == null) {
                        const wr = Math.floor(Math.random() * this.R);
                        this.spawnState.nextRow = wr;
                        const wlife = Math.max(40, this.spawnState.timer + 12);
                        this.laneWarnings.push({ r: wr, life: wlife, max: wlife });
                    }
                    if (this.spawnState.timer <= 0) {
                        const grp = LEVELS[this.levelIdx].waves[this.waveIdx].groups[this.spawnState.groupIdx];
                        const eDef = ENEMIES[grp.e];
                        const r = (this.spawnState.nextRow != null) ? this.spawnState.nextRow : Math.floor(Math.random() * this.R);
                        this.spawnState.nextRow = null;
                        const difficulty = LEVELS[this.levelIdx].difficulty || 1.0;
                        const hp = eDef.hp * difficulty, spd = eDef.spd * (1 + (difficulty - 1) * 0.2) * (this.challengeRule === 'speed' ? 1.2 : 1), dmg = eDef.dmg * difficulty;
                        this.objs.push({ type: 'enemy', id: grp.e, r, x: this.OX + this.C*this.G, y: this.OY + r*this.G, hp, maxHp: hp, dmg, data: eDef, vx: -spd, fly: eDef.type === 'air', slowTimer: 0, isEating: false, hitFlash: 0, levelIdx: this.levelIdx });
                        this.collectEnemySticker(grp.e); // Phase C：遇到即收集敌人贴纸
                        this.spawnState.mobsLeftInGroup--; this.spawnState.timer = grp.interval;
                        if (this.spawnState.mobsLeftInGroup <= 0) {
                            this.spawnState.groupIdx++;
                            if (this.spawnState.groupIdx < this.spawnState.totalGroups) {
                                this.spawnState.mobsLeftInGroup = LEVELS[this.levelIdx].waves[this.waveIdx].groups[this.spawnState.groupIdx].n;
                                this.spawnState.timer = LEVELS[this.levelIdx].waves[this.waveIdx].groups[this.spawnState.groupIdx].preDelay;
                                if (this.spawnState.groupIdx === this.spawnState.totalGroups - 1) this.floatText("警告：最后一波!", this.w/2, this.h/2, '#e53e3e', 180, 40);
                            } else { this.spawnState.active = false; }
                        }
                    }
                } else if (!this.spawnState.active && !this.objs.some(o => o.type === 'enemy')) {
                    if (this.waitNextWave === null) {
                        this.waitNextWave = (this.challengeRule === 'speed') ? 120 : 300; this.floatText("战场打扫时间...", this.w/2, this.h/2, '#F6E05E', 250, 30);
                        this.chargeTeacher(15); // 过波存活：技能槽充能
                        this.pushCombatState(); // 显示「提前上课」按钮
                    }
                    this.waitNextWave--;
                    if (this.waitNextWave <= 0) { this.waitNextWave = null; this.startMaze(); this.pushCombatState(); }
                }
                for (let i = this.objs.length - 1; i >= 0; i--) {
                    const o = this.objs[i];
                    if (o.type === 'orb' || o.type === 'star') { o.life--; if(o.life<=0) this.objs.splice(i,1); }
                    else if (o.type === 'tower') {
                        if (o.data.type === 'bomb') {
                            const rowsToBomb = [o.r - 1, o.r, o.r + 1];
                            this.objs.forEach(e => { if (e.type === 'enemy' && rowsToBomb.includes(e.r) && e.x < this.w) { this.damageEnemy(e, o.data.dmg, '#F56565'); this.floatText("BOOM!", e.x, e.y, '#F56565', 40, 30); } });
                            this.spawnParticles(o.x, o.y, '#F56565', 50); this.objs.splice(i, 1); continue;
                        }
                        if (o.data.type === 'producer') { const prodRate = o.rateOverride || o.data.rate; o.cd++; if(o.cd>=prodRate) { this.spawnOrb(o.x+this.G/2, o.y+this.G/2, 40); o.cd=0; } }
                        else if (o.data.type === 'shoot') {
                            const atk = o.atkOverride || o.data.dmg, fireRate = o.rateOverride || o.data.rate, slowDur = o.slowDurOverride || 180;
                            o.cd--; if(o.cd<=0) {
                                const target = this.objs.find(e => e.type === 'enemy' && e.r === o.r && e.x > o.x);
                                if (!target) {
                                    const eatingEnemy = this.objs.find(e => e.type === 'enemy' && e.r === o.r && Math.abs(e.x - o.x) < this.G && e.x < this.w);
                                    if (eatingEnemy) { this.objs.push({ type: 'bullet', x: o.x+this.G/2, y: o.y+this.G/4, target: eatingEnemy, dmg: atk, color: o.data.color, isSlow: o.data.slow, slowDur, vx: 0, vy: 0 }); o.cd = fireRate; }
                                } else {
                                    const ang = Math.atan2((target.y+this.G/2)-(o.y+this.G/4), (target.x+this.G/2)-(o.x+this.G/2));
                                    this.objs.push({ type: 'bullet', x: o.x+this.G/2, y: o.y+this.G/4, target, dmg: atk, color: o.data.color, isSlow: o.data.slow, slowDur, vx: Math.cos(ang)*15, vy: Math.sin(ang)*15 });
                                    o.cd = fireRate;
                                }
                            }
                        }
                        if (o.hp <= 0) this.objs.splice(i,1);
                    }
                    else if (o.type === 'enemy') {
                        if(o.hitFlash>0) o.hitFlash--;
                        if(o.shieldFlash>0) o.shieldFlash--;
                        const frozen = this.freezeTimer > 0;
                        let spd = Math.abs(o.vx);
                        if(o.data && o.data.ability === 'schoolRush' && !o.rushUsed && o.x < this.OX + this.C * this.G * 0.66) {
                            o.rushUsed = true; o.rushTimer = 90;
                            this.floatText('冲刺！', o.x, o.y, '#E85D5D', 45, 24);
                        }
                        if(o.data && o.data.ability === 'laneHop' && !o.hopped && o.x < this.OX + this.C * this.G * 0.72) {
                            const dirs = [];
                            if (o.r > 0) dirs.push(-1);
                            if (o.r < this.R - 1) dirs.push(1);
                            if (dirs.length) {
                                o.hopped = true;
                                o.r += dirs[Math.floor(Math.random() * dirs.length)];
                                o.y = this.OY + o.r * this.G;
                                this.floatText('换路！', o.x, o.y, '#F59E0B', 45, 22);
                                this.spawnParticles(o.x + this.G / 2, o.y + this.G / 2, '#F59E0B', 10);
                            }
                        }
                        if(o.data && o.data.ability === 'doodleHeal' && this.frame % 120 === 0) {
                            let healed = false;
                            this.objs.forEach(e => {
                                if (e.type === 'enemy' && e !== o && e.r === o.r && Math.abs(e.x - o.x) < this.G * 2.3 && e.hp > 0 && e.hp < e.maxHp) {
                                    e.hp = Math.min(e.maxHp, e.hp + 45);
                                    e.hitFlash = Math.max(e.hitFlash || 0, 4);
                                    healed = true;
                                }
                            });
                            if (healed) {
                                this.floatText('鼓劲！', o.x, o.y, '#EC4899', 38, 20);
                                this.spawnParticles(o.x + this.G / 2, o.y + this.G / 2, '#EC4899', 8);
                            }
                        }
                        if(o.rushTimer > 0) { spd *= 1.75; o.rushTimer--; }
                        if(o.slowTimer>0) { spd*=0.5; o.slowTimer--; }
                        let move = true;
                        const eating = this.objs.find(t=>t.type==='tower' && t.r===o.r && t.x<o.x+this.G/2 && t.x+this.G>o.x);
                        if(eating) { move=false; o.isEating=true; if(this.frame%30===0 && !frozen) eating.hp-=o.dmg; } else o.isEating=false;
                        if(frozen) move=false; // 全班安静：定身
                        if(move) o.x -= spd;
                        if(o.x < this.OX-20) {
                            if (this.triggerLaneRescue(o)) continue;
                            this.hp--; this.objs.splice(i,1); this.updateStats(); this.syncSave(); this.floatText("-1 ❤️", this.OX, o.y, '#e53e3e');
                        }
                        else if(o.hp<=0) { this.spawnDeathFx(o.x + this.G/2, o.y + this.G/2, o.data.color, o.id === 'boss'); if(o.data.val>0) this.spawnOrb(o.x,o.y,o.data.val); else if(Math.random()<0.4) this.spawnOrb(o.x,o.y,40); if(o.id!=='elf') this.chargeTeacher(3); this.objs.splice(i,1); }
                    }
                    else if (o.type === 'bullet') {
                        let dx = o.vx, dy = o.vy;
                        if(o.target && o.target.hp>0) {
                            const dist = Math.sqrt(((o.target.x+this.G/2)-o.x)**2 + ((o.target.y+this.G/2)-o.y)**2);
                            if(dist<30) { this.damageEnemy(o.target, o.dmg, o.color); if(o.isSlow) o.target.slowTimer=Math.max(o.target.slowTimer||0, o.slowDur||180); this.objs.splice(i,1); continue; }
                            else { const ang = Math.atan2((o.target.y+this.G/2)-o.y,(o.target.x+this.G/2)-o.x); o.vx=Math.cos(ang)*15; o.vy=Math.sin(ang)*15; dx=o.vx; dy=o.vy; }
                        }
                        o.x+=dx; o.y+=dy;
                        if(o.x>this.w||o.x<0||o.y>this.h||o.y<0) this.objs.splice(i,1);
                    }
                }
            }
            for(let i=this.floatTexts.length-1; i>=0; i--) { this.floatTexts[i].y--; this.floatTexts[i].life--; if(this.floatTexts[i].life<=0) this.floatTexts.splice(i,1); }
            for(let i=this.particles.length-1; i>=0; i--) { const p=this.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.life--; if(p.life<=0) this.particles.splice(i,1); }
        }

        drawEnemySprite(ctx, o, G, sprite) {
            const bobY = Math.sin(this.frame * 0.1) * 3;
            const cx = o.x + G/2, cy = o.y + G/2 + bobY;
            const squish = 1 + Math.sin(this.frame * 0.15) * 0.04;
            const size = G * 1.12;
            if (o.slowTimer > 0 || this.freezeTimer > 0) {
                ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = '#90CDF4';
                ctx.beginPath(); ctx.arc(cx, cy, size * 0.52, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
            ctx.save();
            ctx.translate(cx, cy); ctx.scale(1 / squish, squish);
            ctx.drawImage(sprite, -size/2, -size/2, size, size);
            if (o.hitFlash > 0) { ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.55; ctx.drawImage(sprite, -size/2, -size/2, size, size); }
            ctx.restore();
            if (o.rushTimer > 0) { ctx.fillStyle = '#E85D5D'; ctx.font = `bold ${Math.max(11, G*0.24)}px Arial`; ctx.fillText('冲!', o.x + G * 0.15, o.y - 8); }
            if (o.shieldFlash > 0) { ctx.strokeStyle = '#F6D365'; ctx.lineWidth = 4; ctx.strokeRect(o.x + 10, o.y + 10, G - 20, G - 20); }
            if (o.isEating) { ctx.fillStyle = '#E85D5D'; ctx.font = `bold ${Math.max(12, G*0.28)}px Arial`; ctx.fillText('咬!', o.x + 4, o.y + 4); }
            if (o.hp < o.maxHp) {
                const barY = o.y - 6;
                ctx.fillStyle = 'red'; ctx.fillRect(o.x + 15, barY, G - 30, 6);
                ctx.fillStyle = '#48bb78'; ctx.fillRect(o.x + 15, barY, (G - 30) * (o.hp / o.maxHp), 6);
                ctx.strokeStyle = 'black'; ctx.lineWidth = 1; ctx.strokeRect(o.x + 15, barY, G - 30, 6);
            }
        }

        drawEnemy(ctx, o, G) {
            const sprite = ASSETS.get('enemy_' + o.id);
            if (sprite) { this.drawEnemySprite(ctx, o, G, sprite); return; }
            const bobY = Math.sin(this.frame * 0.1) * 3;
            const x = o.x, y = o.y + bobY;
            const cx = x + G/2, cy = y + G/2;
            const legSwing = Math.sin(this.frame * 0.2) * 8;
            const levelIdx = o.levelIdx || 0;
            let primaryColor = o.data.color, accColor = '#718096';
            if (levelIdx === 1) { if(o.id==='slime') primaryColor='#4299E1'; if(o.id==='tank') accColor='#ECC94B'; if(o.id==='bat') primaryColor='#F56565'; }
            else if (levelIdx >= 2) { if(o.id==='slime') primaryColor='#805AD5'; if(o.id==='tank') accColor='#1A202C'; if(o.id==='bat') primaryColor='#171923'; }
            if (o.slowTimer > 0 || this.freezeTimer > 0) ctx.fillStyle = '#90CDF4';
            else ctx.fillStyle = primaryColor;
            if (o.hitFlash > 0) ctx.fillStyle = 'white';
            const mainColor = ctx.fillStyle;
            ctx.save();
            if (o.type === 'ground' && o.id !== 'slime') {
                ctx.strokeStyle = '#2D3748'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(cx - 5, y + G - 10); ctx.lineTo(cx - 5 - legSwing, y + G); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 5, y + G - 10); ctx.lineTo(cx + 5 + legSwing, y + G); ctx.stroke();
            }
            if (o.id === 'slime') {
                const squish = Math.cos(this.frame * 0.15) * 2;
                ctx.beginPath(); ctx.moveTo(x + 10 - squish, y + G - 10);
                ctx.bezierCurveTo(x + 5 - squish, y + G - 40 + squish, x + 20, y + 20 + squish, cx, y + 20 + squish);
                ctx.bezierCurveTo(x + G - 20, y + 20 + squish, x + G - 5 + squish, y + G - 40 + squish, x + G - 10 + squish, y + G - 10);
                ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(cx - 10, cy, 7, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 10, cy, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = levelIdx === 2 ? 'red' : 'black'; ctx.beginPath(); ctx.arc(cx - 10, cy, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 10, cy, 3, 0, Math.PI*2); ctx.fill();
            } else if (o.id === 'bat') {
                const wingFlap = Math.sin(this.frame * 0.4) * 15;
                ctx.fillStyle = levelIdx >= 2 ? '#2D3748' : '#4C1D95';
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.quadraticCurveTo(x - 10, y + 10 + wingFlap, x, cy + 20); ctx.quadraticCurveTo(x + 20, cy + 30, cx, cy + 10); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.quadraticCurveTo(x + G + 10, y + 10 + wingFlap, x + G, cy + 20); ctx.quadraticCurveTo(x + G - 20, cy + 30, cx, cy + 10); ctx.fill();
                ctx.fillStyle = mainColor; ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#FBD38D'; ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 4, cy - 2, 2, 0, Math.PI*2); ctx.fill();
            } else if (o.id === 'tank') {
                ctx.fillStyle = '#4A5568'; ctx.fillRect(x + 20, y + 40, G - 40, G - 50);
                ctx.fillStyle = '#A0AEC0'; ctx.beginPath(); ctx.arc(cx, y + 35, 18, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = accColor; ctx.strokeStyle = '#2D3748'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(cx - 16, y + 28); ctx.lineTo(cx - 20, y + 5); ctx.lineTo(cx + 20, y + 5); ctx.lineTo(cx + 16, y + 28); ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(cx - 6, y + 38, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 6, y + 38, 3, 0, Math.PI*2); ctx.fill();
            } else if (o.id === 'note') {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(Math.sin(this.frame * 0.12 + o.x * 0.01) * 0.22);
                ctx.fillStyle = '#FDE68A';
                ctx.strokeStyle = '#92400E';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-G * 0.28, -G * 0.24);
                ctx.lineTo(G * 0.26, -G * 0.16);
                ctx.lineTo(G * 0.18, G * 0.24);
                ctx.lineTo(-G * 0.24, G * 0.18);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                ctx.strokeStyle = 'rgba(146,64,14,0.45)';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-G * 0.18, -G * 0.03); ctx.lineTo(G * 0.12, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-G * 0.16, G * 0.08); ctx.lineTo(G * 0.08, G * 0.11); ctx.stroke();
                ctx.fillStyle = '#111827';
                ctx.beginPath(); ctx.arc(-G * 0.09, -G * 0.1, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(G * 0.08, -G * 0.08, 3, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            } else if (o.id === 'doodle') {
                const wiggle = Math.sin(this.frame * 0.14 + o.x * 0.01) * 4;
                ctx.fillStyle = '#F9A8D4';
                ctx.strokeStyle = '#9D174D';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(cx, cy, G * 0.31, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                ctx.strokeStyle = '#EC4899';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(cx - G * 0.25, cy - G * 0.12);
                ctx.quadraticCurveTo(cx - G * 0.05, cy - G * 0.24 + wiggle, cx + G * 0.22, cy - G * 0.1);
                ctx.stroke();
                ctx.fillStyle = '#111827';
                ctx.beginPath(); ctx.arc(cx - G * 0.1, cy, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + G * 0.11, cy, 4, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#BE185D';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(cx, cy + G * 0.12, G * 0.09, 0, Math.PI); ctx.stroke();
            } else if (o.id === 'boss') {
                const bossColor = levelIdx === 2 ? '#9B2C2C' : '#C53030';
                ctx.fillStyle = 'rgba(229, 62, 62, 0.3)'; ctx.beginPath(); ctx.arc(cx, cy, G/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = bossColor; ctx.beginPath(); ctx.arc(cx, cy, G/2 - 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#742A2A'; ctx.beginPath(); ctx.moveTo(cx-20, cy+20); ctx.lineTo(cx+20, cy+20); ctx.lineTo(cx, cy+50); ctx.fill();
                ctx.fillStyle = '#F6AD55'; ctx.beginPath(); ctx.moveTo(cx - 20, cy - 20); ctx.bezierCurveTo(cx - 40, cy - 40, cx - 30, cy - 50, cx - 10, cy - 30); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 20, cy - 20); ctx.bezierCurveTo(cx + 40, cy - 40, cx + 30, cy - 50, cx + 10, cy - 30); ctx.fill();
                ctx.fillStyle = levelIdx >= 1 ? '#F6E05E' : '#FBD38D';
                ctx.beginPath(); ctx.moveTo(cx - 20, cy - 10); ctx.lineTo(cx - 5, cy); ctx.lineTo(cx - 20, cy + 5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 20, cy - 10); ctx.lineTo(cx + 5, cy); ctx.lineTo(cx + 20, cy + 5); ctx.fill();
                ctx.strokeStyle = 'black'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy + 15, 10, 3.14, 0); ctx.stroke();
            } else if (o.id === 'elf') {
                const glow = Math.sin(this.frame * 0.2) * 5;
                ctx.fillStyle = 'rgba(250, 240, 137, 0.6)'; ctx.beginPath(); ctx.arc(cx, cy, 20 + glow, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#FFFFF0'; ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.beginPath(); ctx.ellipse(cx - 15, cy, 15, 5, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 15, cy, 15, 5, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#B7791F'; ctx.font = `${Math.max(10, G*0.25)}px Arial`; ctx.fillText('$', cx - 4, cy + 5);
            }
            if (o.isEating) { ctx.fillStyle = 'red'; ctx.font = `bold ${Math.max(12, G*0.3)}px Arial`; ctx.fillText('咬!', x, y); }
            if (o.rushTimer > 0) { ctx.fillStyle = '#E85D5D'; ctx.font = `bold ${Math.max(11, G*0.24)}px Arial`; ctx.fillText('冲!', x + G * 0.15, y - 8); }
            if (o.shieldFlash > 0) { ctx.strokeStyle = '#F6D365'; ctx.lineWidth = 4; ctx.strokeRect(x + 10, y + 10, G - 20, G - 20); }
            ctx.restore();
            if (o.hp < o.maxHp) {
                const barY = y - 10;
                ctx.fillStyle = 'red'; ctx.fillRect(x + 15, barY, G - 30, 6);
                ctx.fillStyle = '#48bb78'; ctx.fillRect(x + 15, barY, (G - 30) * (o.hp / o.maxHp), 6);
                ctx.strokeStyle = 'black'; ctx.lineWidth = 1; ctx.strokeRect(x + 15, barY, G - 30, 6);
            }
        }

        drawRoundedRect(ctx, x, y, w, h, r) {
            const rr = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + rr, y);
            ctx.lineTo(x + w - rr, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
            ctx.lineTo(x + w, y + h - rr);
            ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
            ctx.lineTo(x + rr, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
            ctx.lineTo(x, y + rr);
            ctx.quadraticCurveTo(x, y, x + rr, y);
        }

        getClassroomStageCacheKey(G) {
            return [this.w, this.h, this.OX, this.OY, this.C, this.R, Math.round(G * 100)].join(':');
        }

        renderClassroomStageCache(G) {
            const canvas = document.createElement('canvas');
            canvas.width = this.w;
            canvas.height = this.h;
            const ctx = canvas.getContext('2d');
            const p = CLASSROOM_PALETTE;
            const gridX = this.OX, gridY = this.OY, gridW = this.C * G, gridH = this.R * G;
            const wall = ctx.createLinearGradient(0, 0, 0, Math.max(1, gridY + gridH));
            wall.addColorStop(0, p.wallTop);
            wall.addColorStop(0.52, p.wallBottom);
            wall.addColorStop(0.53, p.floor);
            wall.addColorStop(1, p.floorDark);
            ctx.fillStyle = wall;
            ctx.fillRect(0, 0, this.w, this.h);

            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            for (let x = gridX - G; x < gridX + gridW + G; x += Math.max(42, G * 0.72)) {
                ctx.fillRect(x, gridY + gridH + 4, 2, this.h - gridY - gridH);
            }
            ctx.fillStyle = 'rgba(75,45,25,0.18)';
            ctx.fillRect(0, gridY + gridH + 3, this.w, 5);

            const boardH = Math.min(58, Math.max(34, gridY - 18));
            const bx = gridX + G * 0.45, by = Math.max(8, gridY - boardH - 7), bw = Math.min(gridW * 0.46, this.w - bx - 18);
            if (boardH > 28) {
                ctx.fillStyle = p.chalkTrim;
                this.drawRoundedRect(ctx, bx - 7, by - 7, bw + 14, boardH + 14, 10); ctx.fill();
                ctx.fillStyle = p.chalkboard;
                this.drawRoundedRect(ctx, bx, by, bw, boardH, 7); ctx.fill();

                const wx = bx + bw + 18, ww = Math.min(G * 1.4, this.w - wx - 16);
                if (ww > 36) {
                    ctx.fillStyle = '#f7f3e8';
                    this.drawRoundedRect(ctx, wx, by + 2, ww, boardH - 2, 8); ctx.fill();
                    ctx.fillStyle = p.window;
                    this.drawRoundedRect(ctx, wx + 5, by + 7, ww - 10, boardH - 12, 5); ctx.fill();
                    ctx.strokeStyle = 'rgba(36,87,63,0.35)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(wx + ww / 2, by + 8); ctx.lineTo(wx + ww / 2, by + boardH - 7);
                    ctx.moveTo(wx + 7, by + boardH / 2); ctx.lineTo(wx + ww - 7, by + boardH / 2); ctx.stroke();
                }
            }

            ctx.save();
            ctx.shadowColor = 'rgba(37,23,12,0.22)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            for (let r = 0; r < this.R; r++) {
                for (let c = 0; c < this.C; c++) {
                    const x = gridX + c * G, y = gridY + r * G;
                    const pad = Math.max(3, G * 0.055);
                    const grad = ctx.createLinearGradient(x, y, x, y + G);
                    grad.addColorStop(0, (r + c) % 2 === 0 ? p.deskTop : '#d29358');
                    grad.addColorStop(1, (r + c) % 2 === 0 ? p.deskAlt : '#aa6836');
                    ctx.fillStyle = grad;
                    this.drawRoundedRect(ctx, x + pad, y + pad, G - pad * 2, G - pad * 2, Math.max(7, G * 0.12));
                    ctx.fill();
                    ctx.strokeStyle = p.deskEdge; ctx.lineWidth = Math.max(1, G * 0.025); ctx.stroke();
                    ctx.fillStyle = 'rgba(255,236,196,0.24)';
                    ctx.fillRect(x + pad + 8, y + pad + 7, Math.max(10, G * 0.34), 3);
                    if ((r + c) % 3 === 0) {
                        ctx.fillStyle = p.paper;
                        ctx.fillRect(x + G * 0.58, y + G * 0.18, G * 0.22, G * 0.16);
                        ctx.fillStyle = 'rgba(74,144,226,0.38)';
                        ctx.fillRect(x + G * 0.6, y + G * 0.24, G * 0.15, 2);
                    }
                }
            }
            ctx.restore();

            ctx.strokeStyle = 'rgba(247,243,232,0.38)';
            ctx.lineWidth = 2;
            for (let r = 0; r <= this.R; r++) {
                ctx.beginPath(); ctx.moveTo(gridX, gridY + r * G); ctx.lineTo(gridX + gridW, gridY + r * G); ctx.stroke();
            }
            for (let c = 0; c <= this.C; c++) {
                ctx.beginPath(); ctx.moveTo(gridX + c * G, gridY); ctx.lineTo(gridX + c * G, gridY + gridH); ctx.stroke();
            }
            return { canvas, key: this.getClassroomStageCacheKey(G), chalk: boardH > 28 ? { bx, by, bw, boardH } : null };
        }

        drawClassroomStage(ctx, G) {
            const key = this.getClassroomStageCacheKey(G);
            if (!this.classroomStageCache || this.classroomStageCache.key !== key) {
                this.classroomStageCache = this.renderClassroomStageCache(G);
            }
            const cache = this.classroomStageCache;
            ctx.drawImage(cache.canvas, 0, 0);
            if (cache.chalk) {
                const { bx, by, bw, boardH } = cache.chalk;
                ctx.strokeStyle = 'rgba(247,243,232,0.26)';
                ctx.lineWidth = 3;
                for (let i = 0; i < 3; i++) {
                    const yy = by + 15 + i * Math.max(8, boardH * 0.2);
                    ctx.beginPath();
                    ctx.moveTo(bx + 16, yy);
                    ctx.lineTo(bx + bw * (0.42 + i * 0.11), yy + Math.sin(this.frame * 0.02 + i) * 2);
                    ctx.stroke();
                }
            }
        }

        draw() {
            if (!this.ctx) return;
            const ctx = this.ctx, G = this.G;
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, this.w, this.h);
            if (this.phase === 'td') {
                const chapterId = (LEVELS[this.levelIdx] && LEVELS[this.levelIdx].chapterId) || '';
                if (chapterId === 'classroom') {
                    this.drawClassroomStage(ctx, G);
                } else {
                    for (let r = 0; r < this.R; r++) for (let c = 0; c < this.C; c++) {
                        ctx.fillStyle = (r + c) % 2 === 0 ? '#38A169' : '#2F855A';
                        ctx.fillRect(this.OX + c * this.G, this.OY + r * this.G, this.G, this.G);
                    }
                }
                // 路线预警：敌人即将出现的那一路，右侧闪红 + ⚠️
                this.laneWarnings.forEach(w => {
                    const blink = 0.3 + 0.4 * Math.abs(Math.sin(this.frame * 0.3));
                    const ry = this.OY + w.r * this.G;
                    const gridRight = this.OX + this.C * this.G;
                    const grad = ctx.createLinearGradient(gridRight - this.G * 2, 0, gridRight, 0);
                    grad.addColorStop(0, 'rgba(229,62,62,0)');
                    grad.addColorStop(1, 'rgba(229,62,62,' + blink + ')');
                    ctx.fillStyle = grad;
                    ctx.fillRect(gridRight - this.G * 2, ry, this.G * 2, this.G);
                    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(1, blink + 0.25) + ')';
                    ctx.font = 'bold ' + Math.max(16, Math.floor(this.G * 0.5)) + 'px Arial';
                    ctx.fillText('⚠️', gridRight - this.G * 0.95, ry + this.G * 0.64);
                });
                // Phase 4 Boss「红笔点名」预警绘制
                this.bossMarks.forEach(mk => {
                    const ry = this.OY + mk.r * this.G;
                    const prog = 1 - mk.life / mk.max;
                    const blink = 0.35 + 0.45 * Math.abs(Math.sin(this.frame * 0.4));
                    ctx.fillStyle = 'rgba(232,93,93,' + (0.12 + prog * 0.25) + ')';
                    ctx.fillRect(this.OX, ry, this.C * this.G, this.G);
                    const ts = this.objs.filter(o => o.type === 'tower' && o.r === mk.r).sort((a, b) => b.x - a.x);
                    const mx = ts.length ? ts[0].x + this.G / 2 : this.OX + this.G * 1.5;
                    const my = ry + this.G / 2, rad = this.G * (0.55 - prog * 0.18);
                    ctx.strokeStyle = 'rgba(232,93,93,' + blink + ')'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(mx, my, rad, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(mx - rad * 0.6, my - rad * 0.6); ctx.lineTo(mx + rad * 0.6, my + rad * 0.6);
                    ctx.moveTo(mx + rad * 0.6, my - rad * 0.6); ctx.lineTo(mx - rad * 0.6, my + rad * 0.6); ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(1, blink + 0.3) + ')';
                    ctx.font = 'bold ' + Math.max(12, Math.floor(this.G * 0.34)) + 'px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('红笔点名', this.OX + this.C * this.G * 0.5, ry + this.G * 0.32);
                    ctx.textAlign = 'left';
                });
                this.objs.forEach(o => {
                    if(o.type!=='orb' && o.type!=='bullet') { ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(o.x+G/2, o.y+G-5, G/3, G/6, 0, 0, Math.PI*2); ctx.fill(); }
                    if(o.type==='tower') {
                        const tSprite = ASSETS.get('tower_' + o.id);
                        if (tSprite) {
                            const age = this.frame - (o.placedFrame || 0);
                            const pop = age < 14 ? 1 + Math.sin(age/14*Math.PI)*0.22 : 1; // 放置弹入
                            const sq = (1 + Math.sin(this.frame*0.12 + o.c)*0.03) * pop;
                            const sz = G * 1.08;
                            ctx.save(); ctx.translate(o.x+G/2, o.y+G/2); ctx.scale(pop, sq);
                            ctx.drawImage(tSprite, -sz/2, -sz/2, sz, sz); ctx.restore();
                            if(o.hp<o.maxHp) { ctx.fillStyle='rgba(255,0,0,0.45)'; ctx.fillRect(o.x+10, o.y+10, G-20, (G-20)*(1-o.hp/o.maxHp)); }
                        } else {
                        ctx.fillStyle = o.data.color;
                        if(o.data.type==='wall') { ctx.fillRect(o.x+10, o.y+10, G-20, G-20); ctx.strokeStyle='white'; ctx.strokeRect(o.x+10,o.y+10,G-20,G-20); ctx.fillStyle='black'; ctx.font=`${G*0.5}px Arial`; ctx.fillText('🛡️', o.x+G/3.5, o.y+G/1.5); }
                        else if(o.data.type==='bomb') {
                            ctx.beginPath(); ctx.arc(o.x+G/2, o.y+G/2, G/2.5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
                            ctx.fillStyle='white'; ctx.font=`${G*0.6}px Arial`; ctx.fillText('👩‍🏫', o.x+G/4, o.y+G/1.4);
                            ctx.fillStyle='#F6AD55'; ctx.beginPath(); ctx.arc(o.x+G-10, o.y+10, 5, 0, Math.PI*2); ctx.fill();
                        }
                        else { ctx.beginPath(); ctx.arc(o.x+G/2, o.y+G/2, G/2.5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='black'; ctx.font=`${G*0.5}px Arial`; ctx.fillText(o.data.icon, o.x+G/3.5, o.y+G/1.5); }
                        if(o.hp<o.maxHp) { ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.fillRect(o.x+10, o.y+10, G-20, (G-20)*(1-o.hp/o.maxHp)); }
                        }
                        // 升级标记 + 选中高亮（Phase 2.5）
                        if(o.upgraded) { ctx.fillStyle='#F6D365'; ctx.font=`bold ${Math.max(12,G*0.3)}px Arial`; ctx.textAlign='left'; ctx.fillText('⭐', o.x+G-G*0.36, o.y+G*0.36); }
                        if(o.upgradedPermanent) { ctx.font=`${Math.max(12,G*0.32)}px Arial`; ctx.textAlign='left'; ctx.fillText('✨', o.x+G*0.04, o.y+G*0.34); }
                        if(o===this.selectedField) { ctx.strokeStyle='#F6D365'; ctx.lineWidth=3; ctx.setLineDash([6,4]); ctx.strokeRect(o.x+4, o.y+4, G-8, G-8); ctx.setLineDash([]); }
                    } else if(o.type==='enemy') { this.drawEnemy(ctx, o, G); }
                    else if(o.type==='bullet') {
                        const sp = Math.hypot(o.vx, o.vy);
                        if (sp > 0.5) {
                            const tl = 16, tx = o.x - o.vx/sp*tl, ty = o.y - o.vy/sp*tl;
                            const grad = ctx.createLinearGradient(tx, ty, o.x, o.y);
                            grad.addColorStop(0, 'rgba(255,255,255,0)'); grad.addColorStop(1, o.color);
                            ctx.strokeStyle = grad; ctx.lineWidth = 6; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(o.x, o.y); ctx.stroke();
                        }
                        ctx.fillStyle=o.color; ctx.beginPath(); ctx.arc(o.x, o.y, 7, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(o.x-1.5, o.y-1.5, 2.5, 0, Math.PI*2); ctx.fill();
                    }
                    else if(o.type==='orb') { ctx.shadowBlur=15; ctx.shadowColor='#F6E05E'; ctx.fillStyle='#F6E05E'; ctx.beginPath(); ctx.arc(o.x, o.y, 25, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#FFFFF0'; ctx.lineWidth=3; ctx.stroke(); ctx.shadowBlur=0; }
                    else if(o.type==='star') {
                        const pulse = 1 + Math.sin(this.frame*0.2)*0.12;
                        ctx.save(); ctx.translate(o.x, o.y); ctx.scale(pulse, pulse);
                        ctx.shadowBlur=18; ctx.shadowColor='#F6D365';
                        ctx.fillStyle='#F6D365'; ctx.strokeStyle='#fff7e0'; ctx.lineWidth=2;
                        ctx.beginPath();
                        for(let s=0;s<5;s++){ const a=-Math.PI/2 + s*2*Math.PI/5, a2=a+Math.PI/5;
                            ctx.lineTo(Math.cos(a)*22, Math.sin(a)*22); ctx.lineTo(Math.cos(a2)*10, Math.sin(a2)*10); }
                        ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
                        ctx.fillStyle='#7a5b1a'; ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.fillText('?', 0, 6);
                        ctx.restore();
                    }
                });
            } else if (this.phase === 'maze' && this.maze) {
                const m = this.maze, cs = m.cs, mx = m.mx, my = m.my;
                for(let y=0; y<m.h; y++) for(let x=0; x<m.w; x++) {
                    const t = m.map[y][x], px = mx+x*cs, py = my+y*cs;
                    if(t===1) { ctx.fillStyle='#1e293b'; ctx.fillRect(px,py,cs,cs); ctx.fillStyle='#334155'; ctx.fillRect(px,py,cs,5); }
                    else { ctx.fillStyle='#f1f5f9'; ctx.fillRect(px,py,cs,cs); ctx.strokeStyle='#cbd5e1'; ctx.strokeRect(px,py,cs,cs); }
                    if(t===5) {
                        const pulse2 = Math.sin(this.frame * 0.15) * 4;
                        ctx.fillStyle='rgba(72, 187, 120, 0.4)'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/2.5 + pulse2, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#22c55e'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/3, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke(); ctx.fillStyle='white'; ctx.font='bold 24px Arial'; ctx.fillText('?', px+cs/2-7, py+cs/2+8);
                    }
                }
                if (this.mazePath && this.mazePathIdx < this.mazePath.length) {
                    ctx.fillStyle = 'rgba(59,130,246,0.35)';
                    for (let pi = this.mazePathIdx; pi < this.mazePath.length; pi++) {
                        const s = this.mazePath[pi];
                        ctx.beginPath(); ctx.arc(mx+s.x*cs+cs/2, my+s.y*cs+cs/2, cs/6, 0, Math.PI*2); ctx.fill();
                    }
                }
                const px = mx+m.px*cs, py = my+m.py*cs;
                ctx.fillStyle='#3b82f6'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/3, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
                if (this.touchStart) {
                    ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 4; ctx.arc(this.touchStart.x, this.touchStart.y, 50, 0, Math.PI * 2); ctx.stroke();
                    if (this.currentTouch) {
                        ctx.beginPath(); ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.arc(this.currentTouch.x, this.currentTouch.y, 20, 0, Math.PI * 2); ctx.fill();
                        const playerScreenX = mx + m.px * cs + cs/2, playerScreenY = my + m.py * cs + cs/2;
                        ctx.beginPath(); ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)'; ctx.lineWidth = 4; ctx.setLineDash([10, 5]); ctx.moveTo(playerScreenX, playerScreenY); ctx.lineTo(this.currentTouch.x, this.currentTouch.y); ctx.stroke(); ctx.setLineDash([]);
                    }
                }
            }
            this.particles.forEach(p => {
                const fade = Math.min(1, p.life / 18);
                if (p.shape === 'scrap') {
                    ctx.save(); ctx.globalAlpha = fade; ctx.translate(p.x, p.y); ctx.rotate((p.rot || 0) + this.frame * (p.vr || 0));
                    ctx.fillStyle = p.color; ctx.fillRect(-p.size, -p.size*0.6, p.size*2, p.size*1.2); ctx.restore();
                } else if (p.shape === 'dust') {
                    ctx.save(); ctx.globalAlpha = fade * 0.85; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
                } else {
                    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
            });
            this.floatTexts.forEach(t => { ctx.shadowBlur=2; ctx.shadowColor='black'; ctx.fillStyle=t.color; ctx.font=`bold ${t.size}px Arial`; ctx.fillText(t.text, t.x, t.y); ctx.shadowBlur=0; });
        }

        updateStats() {
            const normalizedCooldowns = {};
            for (const k in TOWERS) normalizedCooldowns[k] = this.towerCooldowns[k] ? this.towerCooldowns[k] / TOWERS[k].recharge : 0;
            this.callbacks.onStatsUpdate(this.mp, this.hp, this.waveIdx + 1, LEVELS[this.levelIdx].name, 0, normalizedCooldowns);
        }
    }

        el(tag, style, ...children) {
            const e = document.createElement(tag);

                if (typeof c === 'string') e.appendChild(document.createTextNode(c));
                else if (c) e.appendChild(c);
            });
            return e;

        btn(text, style, onClick, disabled = false) {
            const b = document.createElement('button');

        // 计算单一世界进度：真实关卡数 / 已通关数 / 星星总数 / 是否解锁
        worldStat(world) {
            const realNodes = world.nodes.filter(n => n.levelIdx != null);
            const firstReal = realNodes.length ? Math.min.apply(null, realNodes.map(n => n.levelIdx)) : 999;
            let cleared = 0, stars = 0;
            realNodes.forEach(n => {
                const id = LEVELS[n.levelIdx] && LEVELS[n.levelIdx].id;
                const r = id && this.results[id];
                if (r && r.stars > 0) { cleared++; stars += r.stars; }
            });
            const unlocked = !world.locked && firstReal <= (this.unlockedLevel || 0);
            return { realCount: realNodes.length, total: world.nodes.length, cleared, stars, unlocked, firstReal };
        }

                    });

                        this.el('div', { width:'30px', height:'30px', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px', background: it.have ? (it.color || '#F6D365') : 'rgba(255,255,255,0.15)' }, it.have ? (it.emoji || '★') : '❓'),
                        this.el('div', { color: it.have ? 'white' : 'rgba(255,255,255,0.6)', fontSize:'11px', fontWeight:'900', textAlign:'center', lineHeight:'1.25' }, it.have ? it.label : '未收集')
                    );
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                return sec;
            };

            inner.appendChild(section('🎒 关卡贴纸', campaign.map(i => ({ have: !!stickers[LEVELS[i].id], label: friendlyLevelName(LEVELS[i]), color:'#4A90E2', emoji:'🎒' }))));
            inner.appendChild(section('👾 敌人贴纸', enemyIds.map(id => ({ have: !!stickers['enemy:' + id], label: ENEMIES[id].name, color: ENEMIES[id].color, emoji:'👾' }))));

            wrap.appendChild(inner);
            return wrap;
        }

        // ----- 装备工坊：用知识碎片把文具永久升级（纯加成、不卡进度） -----
        renderWorkshop() {
            if (this.phase !== 'workshop') return null;
            const shards = this.shards || 0;
            const ups = this.toolUpgrades || {};
            const wrap = this.el('div', {
                position:'absolute', inset:'0', zIndex:'56', overflowY:'auto', overflowX:'hidden', pointerEvents:'auto',
                background:'linear-gradient(135deg, #0c4a6e 0%, #1e3a8a 50%, #1e293b 100%)',
                display:'flex', justifyContent:'center', boxSizing:'border-box',
                padding:'calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))'
            });
            wrap.className = 'hide-scrollbar';
            const inner = this.el('div', { width:'100%', maxWidth:'520px', margin:'auto', display:'flex', flexDirection:'column', gap:'12px' });

            const head = this.el('div', { display:'flex', alignItems:'center', gap:'12px' });
            head.appendChild(this.btn('‹ 返回地图', {
                padding:'8px 14px', borderRadius:'999px', border:'2px solid rgba(255,255,255,0.35)', background:'rgba(0,0,0,0.25)',
                color:'white', fontWeight:'900', fontSize:'14px', fontFamily:'inherit', cursor:'pointer', flexShrink:'0'
            }, () => this.onRestart && this.onRestart()));
            const ht = this.el('div', { display:'flex', flexDirection:'column' });
            ht.append(
                this.el('div', { color:'white', fontWeight:'900', fontSize:'24px' }, '🔧 装备工坊'),
                this.el('div', { color:'#bae6fd', fontSize:'14px', fontWeight:'900' }, '知识碎片 💎 ' + shards + '（答题、通关都会获得）')
            );
            head.appendChild(ht);
            inner.appendChild(head);

            Object.values(TOWERS).forEach(t => {
                const up = TOOL_UPGRADES[t.id];
                if (!up) return;
                const done = !!ups[t.id];
                const afford = shards >= up.cost;
                const card = this.el('div', {
                    display:'flex', alignItems:'center', gap:'12px', padding:'12px', borderRadius:'16px',
                    border:'2px solid ' + (done ? '#34d399' : '#334155'), background:'rgba(255,255,255,0.06)'
                });
                // 升级前后图示
                const icons = this.el('div', { display:'flex', alignItems:'center', gap:'6px', flexShrink:'0' });
                icons.append(
                    this.el('div', { width:'40px', height:'40px', borderRadius:'10px', background:'rgba(0,0,0,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'22px', opacity: done ? '0.5' : '1' }, t.icon),
                    this.el('div', { color:'#94a3b8', fontWeight:'900' }, '→'),
                    this.el('div', { width:'44px', height:'44px', borderRadius:'10px', background: done ? 'rgba(52,211,153,0.25)' : 'rgba(56,189,248,0.18)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'24px', border:'2px solid ' + (done ? '#34d399' : '#38bdf8') }, up.icon)
                );
                card.appendChild(icons);
                const info = this.el('div', { flex:'1', minWidth:'0' });
                info.append(
                    this.el('div', { color:'white', fontWeight:'900', fontSize:'15px' }, t.name + ' → ' + up.name),
                    this.el('div', { color:'rgba(255,255,255,0.8)', fontSize:'12px', fontWeight:'bold', lineHeight:'1.4' }, up.blurb)
                );
                card.appendChild(info);
                if (done) {
                    card.appendChild(this.el('div', { color:'#34d399', fontWeight:'900', fontSize:'14px', flexShrink:'0' }, '✅ 已升级'));
                } else {
                    const buyBtn = this.btn('💎' + up.cost, {
                        padding:'10px 14px', borderRadius:'12px', border:'2px solid ' + (afford ? '#38bdf8' : '#475569'),
                        background: afford ? '#0ea5e9' : '#334155', color:'white', fontWeight:'900', fontSize:'15px',
                        fontFamily:'inherit', cursor: afford ? 'pointer' : 'not-allowed', flexShrink:'0'
                    }, () => { if (afford && this.onUpgradeTool) this.onUpgradeTool(t.id); });
                    buyBtn.disabled = !afford;
                    card.appendChild(buyBtn);

                inner.appendChild(card);
