        }

        triggerSOS() {
            if (!this.currentQuestionObj) return;
            const visual = this.currentQuestionObj.visual || DEFAULT_VISUAL;
            this.callbacks.onExplanation(visual);
        }

        proceedToFollowUp() {
            this.generateQuiz(null, null, false, true);
        }

        handleInput(type, x, y) {
            if (this.phase === 'minigame') {
                this.handleMinigameInput(type, x, y);
                return;
            }
            if (type === 'start') {
                this.touchStart = { x, y };
                if (this.phase === 'maze') this.mazeTap(x, y);
                else this.handleClick(x, y);
            } else if (type === 'move') {
                if (this.phase === 'maze' && this.touchStart) { this.currentTouch = { x, y }; this.mazePath = null; }
            } else if (type === 'end') {
                this.touchStart = null; this.currentTouch = null;
            }
        }

        startChapterMinigame(levelIdx, nextLevelIdx) {
            this.clearPendingUltimate('minigame-start', false);
            const cfg = chapterMinigameForCompletedLevel(levelIdx);
            if (!cfg) return false;
            this.objs = []; this.particles = []; this.floatTexts = [];
            this.minigame = {
                ...cfg,
                nextLevelIdx: typeof nextLevelIdx === 'number' ? nextLevelIdx : cfg.nextLevelIdx,
                time: 900,
                maxTime: 900,
                score: 0,
                hits: 0,
                shots: 0,
                rewardEarned: 0,
                spawnTimer: 18,
                targets: [],
                crosshair: { x: this.w / 2, y: this.h / 2 }
            };
            this.phase = 'minigame';
            this.callbacks.onPhaseChange('minigame');
            this.callbacks.onMinigameState && this.callbacks.onMinigameState(this.minigame);
            SOUND.play('tap');
            return true;
        }

        minigamePointFromScreen(sx, sy) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (sx - rect.left) * (this.w / rect.width),
                y: (sy - rect.top) * (this.h / rect.height)
            };
        }

        spawnMinigameTarget() {
            if (!this.minigame) return;
            const lane = Math.random();
            const x = this.w * (0.18 + lane * 0.64);
            const y = this.h * (0.28 + Math.random() * 0.18);
            const kind = Math.random() < 0.22 ? 'fast' : (Math.random() < 0.38 ? 'shield' : 'normal');
            const radius = kind === 'shield' ? 34 : 27;
            const hp = kind === 'shield' ? 2 : 1;
            this.minigame.targets.push({
                x, y, radius, hp, maxHp: hp,
                vx: (Math.random() - 0.5) * (kind === 'fast' ? 3.6 : 1.8),
                vy: kind === 'fast' ? 2.7 : 1.7,
                life: 210,
                maxLife: 210,
                color: kind === 'shield' ? '#94a3b8' : (kind === 'fast' ? '#f97316' : '#a855f7'),
                kind
            });
        }

        handleMinigameInput(type, x, y) {
            if (!this.minigame || type === 'end') return;
            const p = this.minigamePointFromScreen(x, y);
            this.minigame.crosshair = p;
            if (type !== 'start') {
                this.callbacks.onMinigameState && this.callbacks.onMinigameState(this.minigame);
                return;
            }
            this.minigame.shots++;
            let hitIndex = -1, best = Infinity;
            this.minigame.targets.forEach((t, i) => {
                const d = Math.hypot(t.x - p.x, t.y - p.y);
                if (d <= t.radius + 18 && d < best) { best = d; hitIndex = i; }
            });
            if (hitIndex >= 0) {
                const t = this.minigame.targets[hitIndex];
                t.hp--;
                this.spawnParticles(t.x, t.y, '#F6D365', 9);
                if (t.hp <= 0) {
                    this.minigame.targets.splice(hitIndex, 1);
                    this.minigame.hits++;
                    this.minigame.score += t.kind === 'fast' ? 45 : (t.kind === 'shield' ? 55 : 35);
                    this.minigame.rewardEarned = Math.min(this.minigame.reward, this.minigame.hits * 30);
                    this.floatText('+30 阳光', t.x, t.y, '#F6D365', 42, 20);
                    SOUND.play('hit');
                }
            } else {
                SOUND.play('tap');
            }
            this.callbacks.onMinigameState && this.callbacks.onMinigameState(this.minigame);
        }

        updateChapterMinigame() {
            if (!this.minigame) return;
            this.frame++;
            this.minigame.time--;
            this.minigame.spawnTimer--;
            if (this.minigame.spawnTimer <= 0) {
                this.spawnMinigameTarget();
                this.minigame.spawnTimer = Math.max(24, 58 - Math.floor((1 - this.minigame.time / this.minigame.maxTime) * 22));
            }
            for (let i = this.minigame.targets.length - 1; i >= 0; i--) {
                const t = this.minigame.targets[i];
                t.x += t.vx; t.y += t.vy; t.radius += 0.035; t.life--;
                if (t.x < t.radius || t.x > this.w - t.radius) t.vx *= -1;
                if (t.life <= 0 || t.y > this.h + t.radius) this.minigame.targets.splice(i, 1);
            }
            for(let i=this.floatTexts.length-1; i>=0; i--) { this.floatTexts[i].y--; this.floatTexts[i].life--; if(this.floatTexts[i].life<=0) this.floatTexts.splice(i,1); }
            for(let i=this.particles.length-1; i>=0; i--) { const p=this.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life--; if(p.life<=0) this.particles.splice(i,1); }
            if (this.frame % 10 === 0) this.callbacks.onMinigameState && this.callbacks.onMinigameState(this.minigame);
            if (this.minigame.time <= 0) this.finishChapterMinigame();
        }

        finishChapterMinigame() {
            this.clearPendingUltimate('minigame-finish', false);
            if (!this.minigame) return;
            const result = {
                reward: Math.min(this.minigame.reward, this.minigame.rewardEarned || 0),
                hits: this.minigame.hits,
                shots: this.minigame.shots,
                nextLevelIdx: this.minigame.nextLevelIdx,
                title: this.minigame.title
            };
            this.pendingSunBonus = result.reward;
            this.minigame = null;
            this.phase = 'level_complete';
            this.callbacks.onMinigameComplete && this.callbacks.onMinigameComplete(result);
            this.callbacks.onPhaseChange('level_complete');
            SOUND.play('reward');
        }

        // 屏幕坐标 -> 迷宫格子，点击可走格则自动寻路过去
        mazeTap(sx, sy) {
            if (!this.maze) return;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.w / rect.width, scaleY = this.h / rect.height;
            const cx = (sx - rect.left) * scaleX, cy = (sy - rect.top) * scaleY;
            const m = this.maze;
            const gx = Math.floor((cx - m.mx) / m.cs), gy = Math.floor((cy - m.my) / m.cs);
            if (gx < 0 || gx >= m.w || gy < 0 || gy >= m.h) return;
            if (m.map[gy][gx] === 1) return; // 墙不可点
            const path = this.findMazePath(m.px, m.py, gx, gy);
            if (path && path.length > 0) { this.mazePath = path; this.mazePathIdx = 0; this.currentTouch = null; }
        }

        // BFS 最短路径；找不到返回 null（代表不可达）
        findMazePath(sx, sy, tx, ty) {
            const m = this.maze;
            if (!m || (sx === tx && sy === ty)) return [];
            const key = (x, y) => y * m.w + x;
            const visited = new Set([key(sx, sy)]);
            const prev = {};
            const queue = [{ x: sx, y: sy }];
            const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
            let head = 0;
            while (head < queue.length) {
                const cur = queue[head++];
                if (cur.x === tx && cur.y === ty) {
                    const path = [];
                    let node = { x: tx, y: ty };
                    while (!(node.x === sx && node.y === sy)) { path.push(node); node = prev[key(node.x, node.y)]; }
                    return path.reverse();
                }
                for (const d of dirs) {
                    const nx = cur.x + d.x, ny = cur.y + d.y;
                    if (nx >= 0 && nx < m.w && ny >= 0 && ny < m.h && m.map[ny][nx] !== 1 && !visited.has(key(nx, ny))) {
                        visited.add(key(nx, ny));
                        prev[key(nx, ny)] = { x: cur.x, y: cur.y };
                        queue.push({ x: nx, y: ny });
                    }
                }
            }
            return null;
        }

        findExit(map, w, h) {
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (map[y][x] === 5) return { x, y };
            return null;
        }

        screenToGridCell(x, y) {
            const rect = this.canvas.getBoundingClientRect();
            const cx = (x - rect.left) * (this.w / rect.width);
            const cy = (y - rect.top) * (this.h / rect.height);
            const cell = { c: Math.floor((cx - this.OX) / this.G), r: Math.floor((cy - this.OY) / this.G) };
            return cell.c >= 0 && cell.c < this.C && cell.r >= 0 && cell.r < this.R ? cell : null;
        }

        handleClick(x, y) {
            if (this.phase !== 'td' || this.combatPaused) return false;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.w / rect.width;
            const scaleY = this.h / rect.height;
            const cx = (x - rect.left) * scaleX;
            const cy = (y - rect.top) * scaleY;
            if (this.pendingUltimate) {
                const cell = this.screenToGridCell(x, y);
                if (cell) this.pendingUltimate.previewCell = cell;
                return false;
            }
            for (let i = this.objs.length - 1; i >= 0; i--) {
                const o = this.objs[i];
                if (o.type === 'star') {
                    if ((cx-o.x)**2 + (cy-o.y)**2 < 55**2) {
                        this.objs.splice(i, 1);
                        SOUND.play('star');
                        this.openCombatQuiz();
                        return true;
                    }
                }
                if (o.type === 'orb') {
                    if ((cx-o.x)**2 + (cy-o.y)**2 < 50**2) {
                        this.mp += (o.val || 25);
                        this.spawnParticles(o.x, o.y, '#F6E05E', 8);
                        this.floatText(`+${o.val}`, o.x, o.y, '#F6E05E', 40);
                        this.objs.splice(i, 1); this.updateStats(); return true;
                    }
                }
            }
            const uiSelected = this.selectedTower;
            if (!uiSelected) {
                // 未选道具：点击场上单位 → 选中以供关卡内升级；点击空地 → 取消选中
                const fc = Math.floor((cx - this.OX) / this.G);
                const fr = Math.floor((cy - this.OY) / this.G);
                const tw = this.objs.find(o => o.type === 'tower' && o.c === fc && o.r === fr);
                if (tw && this.advancedMode) { this.selectField(tw); return true; } // 仅进阶模式可选中升级；主线点单位不做事
                this.clearField(); return false;
            }
            if (this.towerCooldowns[uiSelected] > 0) return false;
            const c = Math.floor((cx - this.OX) / this.G);
            const r = Math.floor((cy - this.OY) / this.G);
            if (c >= 0 && c < this.C && r >= 0 && r < this.R) {
                if (!this.objs.some(o =>
                    (o.type === 'tower' && o.c === c && o.r === r) ||
                    (o.type === 'enemy' && o.r === r && Math.abs(o.x - (this.OX + c * this.G)) < 20)
                )) {
                    const tData = TOWERS[uiSelected];
                    const isFree = this.freeNextTower;
                    if (isFree || this.mp >= tData.cost) {
                        if (isFree) this.freeNextTower = false; else this.mp -= tData.cost;
                        const tw = { type: 'tower', id: uiSelected, c, r, x: this.OX + c * this.G, y: this.OY + r * this.G, hp: tData.dmg, maxHp: tData.dmg, data: tData, cd: 0, fire: 0, placedFrame: this.frame };
                        // 永久等级：按 toolLevels 套用 Lv1-Lv5 战斗属性；旧存档会先 migration。
                        const toolLevel = getToolLevelFromMap(this.save.toolLevels, uiSelected);
                        const levelMeta = applyToolLevel(tw, toolLevel);
                        this.objs.push(tw);
                        this.towerCooldowns[uiSelected] = Math.round(tData.recharge * ((levelMeta && levelMeta.recharge) || 1));
                        SOUND.play('place');
                        this.spawnParticles(cx, cy, '#fff', 8);
                        this.floatText(isFree ? '免费!' : `-${tData.cost}`, cx, cy, isFree ? '#48bb78' : '#fbbf24');
                        this.updateStats();
                        this.callbacks.onSelectTower(null);
                        this.selectedTower = null; return true;
                    }
                }
            }
            return false;
        }

        startTD() {
            this.phase = 'td'; this.callbacks.onPhaseChange('td'); this.waitNextWave = null;
            this.laneWarnings = [];
            if (this.savedTowers.length > 0) { this.objs = [...this.savedTowers]; this.savedTowers = []; }
            else if (this.waveIdx === 0) this.objs = [];
            const lvl = LEVELS[this.levelIdx];
            const waveData = lvl.waves[this.waveIdx];
            if (!waveData) { return; }
            this.spawnState = { active: true, groupIdx: 0, mobsLeftInGroup: waveData.groups[0].n, timer: waveData.groups[0].preDelay, totalGroups: waveData.groups.length, nextRow: null };
            // 本波敌人预告 + 关卡提示（让玩家开局就明白策略与即将面对的敌人）
            const tally = {};
            waveData.groups.forEach(g => { tally[g.e] = (tally[g.e] || 0) + g.n; });
            const enemies = Object.keys(tally).map(id => ({
                id,
                name: (ENEMIES[id] && ENEMIES[id].name) || id,
                color: (ENEMIES[id] && ENEMIES[id].color) || '#ffffff',
                count: tally[id],
                hint: (ENEMIES[id] && ENEMIES[id].hint) || '',
                ability: (ENEMIES[id] && ENEMIES[id].ability) || 'none'
            }));
            this.callbacks.onWaveIntro({
                wave: this.waveIdx + 1,
                totalWaves: lvl.waves.length,
                enemies,
                tip: lvl.tip || '',
                showTip: this.waveIdx === 0,
                isLastWave: this.waveIdx === lvl.waves.length - 1,
                isFlagWave: !!waveData.flagWave,
                pressureLevel: waveData.pressureLevel || 1,
                prepMessage: waveData.prepMessage || ''
            });
            this.pushCombatState();
        }

        startMaze() {
            this.clearPendingUltimate('maze-start', false);
            this.phase = 'maze'; this.callbacks.onPhaseChange('maze');
            this.clearField();
            this.savedTowers = this.objs.filter(o => o.type === 'tower');
            this.objs = []; this.particles = [];
            this.mazePath = null; this.currentTouch = null;
            const targetCell = 50;
            let mw = Math.floor((this.w - 20) / targetCell);
            let mh = Math.floor((this.h - 20) / targetCell);
            if (mw % 2 === 0) mw--; if (mh % 2 === 0) mh--;
            mw = Math.max(9, mw); mh = Math.max(9, mh);
            const cs = Math.min(60, Math.floor(Math.min(this.w / mw, this.h / mh)));
            const mx = (this.w - mw * cs) / 2;
            const my = (this.h - mh * cs) / 2;
            // 生成迷宫并验证出口从起点(1,1)可达，最多重试5次，杜绝"没路/被墙挡住"
            let map, exit;
            for (let attempt = 0; attempt < 5; attempt++) {
                map = generateMaze(mw, mh);
                exit = this.findExit(map, mw, mh);
                this.maze = { map, w: mw, h: mh, px: 1, py: 1, cs, mx, my, exit };
                if (exit && this.findMazePath(1, 1, exit.x, exit.y)) break;
            }
        }

        updateMazeMovement() {
            if (this.phase !== 'maze' || !this.maze) return;
            if (this.mazeMoveTimer > 0) { this.mazeMoveTimer--; return; }
            const m = this.maze;
            // 自动寻路：点击空地后角色逐格走过去（手机主操作方式）
            if (this.mazePath && this.mazePathIdx < this.mazePath.length) {
                const step = this.mazePath[this.mazePathIdx++];
                m.px = step.x; m.py = step.y; this.mazeMoveTimer = 6;
                const tile = m.map[step.y][step.x];
                if (tile === 5) { this.mazePath = null; this.generateQuiz(step.x, step.y); return; }
                if (this.mazePathIdx >= this.mazePath.length) this.mazePath = null;
                return;
            }
            // 拖曳即时移动（备用操作方式）
            if (!this.currentTouch) return;
            const cs = m.cs, mx = m.mx, my = m.my;
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.w / rect.width, scaleY = this.h / rect.height;
            const touchX = (this.currentTouch.x - rect.left) * scaleX;
            const touchY = (this.currentTouch.y - rect.top) * scaleY;
            const playerScreenX = mx + m.px * cs + cs/2;
            const playerScreenY = my + m.py * cs + cs/2;
            const dx = touchX - playerScreenX, dy = touchY - playerScreenY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            let moveX = 0, moveY = 0;
            if (Math.abs(dx) > Math.abs(dy)) { moveX = dx > 0 ? 1 : -1; } else { moveY = dy > 0 ? 1 : -1; }
            const nx = m.px + moveX, ny = m.py + moveY;
            if (nx >= 0 && nx < m.w && ny >= 0 && ny < m.h) {
                const tile = m.map[ny][nx];
                if (tile !== 1) {
                    m.px = nx; m.py = ny; this.mazeMoveTimer = 7;
                    if (tile === 5) { this.generateQuiz(nx, ny); }
                }
            }
        }

        generateQuiz(tx, ty, isRescue = false, isFollowUp = false) {
            this.callbacks.onLoading(true);
            this.currentTouch = null;
            setTimeout(() => {
                const q = this.getQuestion();
                this.currentQuestionObj = q;
                const answersWithIndex = q.a.map((ans, idx) => ({ ...ans, originalIndex: idx }));
                const canSOS = !isRescue && !isFollowUp;
                const canHint = this.questionsAnswered > 0;
                this.callbacks.onQuizOpen(q.q, answersWithIndex, isRescue, canSOS, canHint);
                if (tx !== null && ty !== null) this._pendingQuizTile = { x: tx, y: ty };
                this.callbacks.onLoading(false);
            }, 500);
        }

        resolveQuiz(correct) {
            this.questionsAnswered++;
            if (!correct) this.wrongAnswers++; // Phase 4：星级评定计数
            // Phase C：学科统计（答对）+ 错题收集（答错，本关 session 内，去重、限量）
            const cq = this.currentQuestionObj;
            SOUND.play(correct ? 'correct' : 'wrong');
            if (correct) {
                const subj = (cq && cq.subject) || '常识';
                this.subjectsLearned[subj] = (this.subjectsLearned[subj] || 0) + 1;
                this.addShards(1); // 答对一题 → +1 知识碎片
            } else if (cq) {
                const correctAns = ((cq.a || []).find(o => o.ok === 1) || {}).t || '';
                const exp = (cq.visual && cq.visual.content && cq.visual.content.join('　')) || '仔细审题，下次一定行！';
                if (!this.wrongList.some(w => w.q === cq.q) && this.wrongList.length < 8) {
                    this.wrongList.push({ q: cq.q, ans: correctAns, exp });
                }
            }
            if (this.combatPaused) {
                // 战斗答题：答对 → 三选一奖励（战场维持暂停，待选奖励）；答错 → 扣少量能量 + 简短解析，立即恢复
                if (correct) {
                    this.chargeTeacher(35); // 答对题：班主任技能槽大幅充能
                    this.callbacks.onRewardPicker(this.rollRewards());
                } else {
                    // 儿童友善：答错不扣能量、不惩罚，只给鼓励 + 简短解析（研究 P0：只前进不惩罚）
                    const tip = (this.currentQuestionObj && this.currentQuestionObj.visual && this.currentQuestionObj.visual.content && this.currentQuestionObj.visual.content[0]) || '没关系，下次一定行！';
                    this.callbacks.onToast('没关系～ ' + tip);
                    this.combatPaused = false;
                    this.updateStats();
                }
                return;
            }
            if (this.phase === 'rescue_quiz') {
                if (correct) { this.hp = 4; this.phase = 'td'; this.callbacks.onPhaseChange('td'); this.updateStats(); this.syncSave(); }
                else { this.phase = 'over'; this.callbacks.onPhaseChange('over'); this.callbacks.onGameOver(false, "复活失败", "下次再接再厉！"); }
                return;
            }
            const tile = this._pendingQuizTile;
            if (correct && this.maze && tile) {
                this.mp += 200; this.hp = Math.min(HP_CAP, this.hp + 2); this.updateStats(); this.syncSave();
                this.spawnParticles(this.w/2, this.h/2, '#ECC94B', 30);
                this.floatText("通关! +200 能量 +2 ❤️", this.w/2, this.h/2, '#48bb78', 80, 40);
                setTimeout(() => this.nextLevel(), 1200);
            } else {
                if (this.maze) {
                    const neighbors = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
                    for(let n of neighbors) {
                        const nx = this.maze.px + n.x, ny = this.maze.py + n.y;
                        if(nx>=0 && nx<this.maze.w && ny>=0 && ny<this.maze.h && this.maze.map[ny][nx]===0) { this.maze.px = nx; this.maze.py = ny; break; }
                    }
                }
                this.mp = Math.max(0, this.mp - 50); this.updateStats();
                this.floatText("答错扣分!", this.w/2, this.h/2, '#f56565', 60, 30);
            }
        }

        // Phase C：敌人贴纸「遇到即收集」— 敌人首次出现就写进收藏（每种只写一次盘，存档保持 ASCII）
        collectEnemySticker(id) {
            if (!id || id === 'elf') return; // 知识精灵是友方能量单位，不算敌人贴纸
            if (this.enemiesSeen && this.enemiesSeen[id]) return;
            if (!this.enemiesSeen) this.enemiesSeen = {};
            this.enemiesSeen[id] = true;
            if (!this.save.stickers) this.save.stickers = {};
            const key = 'enemy:' + id;
            if (!this.save.stickers[key]) { this.save.stickers[key] = true; writeGameSave(this.save); }
        }

        damageEnemy(enemy, dmg, sourceColor) {
            if (!enemy || enemy.type !== 'enemy') return;
            let finalDmg = enemy.vulnerabilityTimer > 0 ? Math.round(dmg * 1.35) : dmg;
            if (enemy.data && enemy.data.ability === 'paperShield' && enemy.hp > enemy.maxHp * 0.55) {
                finalDmg = Math.max(1, Math.round(dmg * 0.55));
                enemy.shieldFlash = 12;
            }
            if (enemy.data && enemy.data.ability === 'titanOverdrive') {
                const shield = BOSS_MECHANICS[enemy.id] && BOSS_MECHANICS[enemy.id].titanShield;
                if (shield && (enemy.hp > enemy.maxHp * shield.hpRatio || enemy.titanShieldTimer > 0)) {
                    finalDmg = Math.max(1, Math.round(finalDmg * shield.damageScale));
                    enemy.shieldFlash = 16;
                }
            }
            enemy.hp -= finalDmg;
            enemy.hitFlash = Math.max(enemy.hitFlash || 0, 5);
            if (sourceColor) this.spawnParticles(enemy.x, enemy.y, sourceColor, 4);
        }

        registerEnemyDefeat(enemy) {
            if (!enemy || enemy.id === 'elf') return;
            this.stampKills = (this.stampKills || 0) + 1;
            if (this.stampKills >= STAMP_KILLS_REQUIRED) {
                this.stampKills -= STAMP_KILLS_REQUIRED;
                this.stamps = Math.min(3, (this.stamps || 0) + 1);
                this.floatText('获得 1 枚印章！', this.w / 2, this.OY + 28, '#F6D365', 70, 26);
                this.spawnParticles(this.w / 2, this.OY + 42, '#F6D365', 20);
            }
            this.pushCombatState();
        }

        announce(message) {
            if (message && this.callbacks.onAnnouncement) this.callbacks.onAnnouncement(message);
        }

        clearPendingUltimate(reason, shouldAnnounce = true) {
            if (!this.pendingUltimate) return false;
            this.pendingUltimate = null;
            if (shouldAnnounce) this.announce('已取消大招，印章未消耗。');
            this.pushCombatState();
            return true;
        }

        beginUltimateGesture(toolId) {
            if (this.phase !== 'td' || this.combatPaused || (this.stamps || 0) <= 0) {
                this.clearPendingUltimate('gesture-invalid', false);
                return false;
            }
            const id = toolId || this.selectedTower || 'pencil';
            if (!TOOL_ULTIMATES[id]) return false;
            const previousCell = this.pendingUltimate && this.pendingUltimate.toolId === id
                ? this.pendingUltimate.previewCell
                : null;
            this.pendingUltimate = { toolId: id, state: 'dragging', previewCell: previousCell };
            this.announce('大招瞄準：拖到戰場選擇範圍，放手只鎖定。');
            return true;
        }

        updateUltimateGesture(x, y) {
            if (!this.pendingUltimate || this.pendingUltimate.state !== 'dragging') return false;
            const cell = this.screenToGridCell(x, y);
            if (!cell) return false;
            this.pendingUltimate.previewCell = cell;
            return true;
        }

        endUltimateGesture(returnedToIcon) {
            if (!this.pendingUltimate || this.pendingUltimate.state !== 'dragging') return false;
            if (returnedToIcon || !this.pendingUltimate.previewCell) {
                this.clearPendingUltimate('gesture-cancel');
                return false;
            }
            this.pendingUltimate.state = 'locked';
            this.announce('大招範圍已鎖定。再點同一個大招圖示才會施放。');
            this.pushCombatState();
            return true;
        }

        cancelUltimateGesture() {
            return this.clearPendingUltimate('pointer-cancel');
        }

        armStampUltimate(toolId) {
            if (this.phase !== 'td' || this.combatPaused || (this.stamps || 0) <= 0) return false;
            const id = toolId || this.selectedTower || 'pencil';
            if (!TOOL_ULTIMATES[id]) return false;
            this.pendingUltimate = { toolId: id, state: 'locked', previewCell: { c: Math.floor(this.C / 2), r: Math.floor(this.R / 2) } };
            this.floatText('选择目标格：' + TOOL_ULTIMATES[id].label, this.w / 2, this.OY - 18, '#F6D365', 75, 24);
            this.announce('大招瞄準：' + TOOL_ULTIMATES[id].label + '。方向鍵移動，Enter 或空白鍵確認，Escape 取消。');
            this.pushCombatState();
            return true;
        }

        cancelStampUltimate() {
            return this.clearPendingUltimate('manual-cancel');
        }

        movePendingUltimate(dx, dy) {
            if (!this.pendingUltimate || !this.pendingUltimate.previewCell) return false;
            const cell = this.pendingUltimate.previewCell;
            cell.c = Math.max(0, Math.min(this.C - 1, cell.c + dx));
            cell.r = Math.max(0, Math.min(this.R - 1, cell.r + dy));
            this.announce('大招瞄準：第 ' + (cell.r + 1) + ' 路，第 ' + (cell.c + 1) + ' 格。');
            this.pushCombatState();
            return true;
        }

        confirmPendingUltimate() {
            if (!this.pendingUltimate) return false;
            return this.confirmStampUltimate(this.pendingUltimate.previewCell);
        }

        handleUltimateKey(key) {
            if (!this.pendingUltimate) return false;
            if (key === 'ArrowLeft') return this.movePendingUltimate(-1, 0);
            if (key === 'ArrowRight') return this.movePendingUltimate(1, 0);
            if (key === 'ArrowUp') return this.movePendingUltimate(0, -1);
            if (key === 'ArrowDown') return this.movePendingUltimate(0, 1);
            if (key === 'Escape') return this.cancelStampUltimate();
            if (key === 'Enter' || key === ' ' || key === 'Spacebar') {
                this.confirmPendingUltimate();
                return true;
            }
            return false;
        }

        enemyGridColumn(enemy) {
            if (!enemy) return -1;
            return Math.max(0, Math.min(this.C - 1, Math.floor(((enemy.x || 0) - this.OX + this.G / 2) / this.G)));
        }

        ultimateTargets(meta, cell) {
            return this.objs.filter(enemy => {
                if (enemy.type !== 'enemy' || enemy.hp <= 0) return false;
                const enemyColumn = this.enemyGridColumn(enemy);
                return meta.shape === 'lanes_3' ? Math.abs(enemy.r - cell.r) <= 1 :
                    meta.shape === 'cross' ? enemy.r === cell.r || enemyColumn === cell.c :
                    meta.shape === 'rect_2x3' ? enemyColumn >= cell.c && enemyColumn <= cell.c + 1 && enemy.r >= cell.r - 1 && enemy.r <= cell.r + 1 :
                    Math.abs(enemy.r - cell.r) <= 1 && Math.abs(enemyColumn - cell.c) <= 1;
            });
        }

        ultimateAreaCells(meta, cell) {
            if (!meta || !cell) return [];
            const cells = [];
            const add = (c, r) => {
                if (c >= 0 && c < this.C && r >= 0 && r < this.R && !cells.some(item => item.c === c && item.r === r)) cells.push({ c, r });
            };
            if (meta.shape === 'lanes_3') {
                for (let r = cell.r - 1; r <= cell.r + 1; r++) for (let c = 0; c < this.C; c++) add(c, r);
            } else if (meta.shape === 'cross') {
                for (let c = 0; c < this.C; c++) add(c, cell.r);
                for (let r = 0; r < this.R; r++) add(cell.c, r);
            } else if (meta.shape === 'rect_2x3') {
                for (let r = cell.r - 1; r <= cell.r + 1; r++) for (let c = cell.c; c <= cell.c + 1; c++) add(c, r);
            } else {
                for (let r = cell.r - 1; r <= cell.r + 1; r++) for (let c = cell.c - 1; c <= cell.c + 1; c++) add(c, r);
            }
            return cells;
        }

        confirmStampUltimate(cell) {
            if (!this.pendingUltimate || !cell) return false;
            const id = this.pendingUltimate.toolId;
            const meta = TOOL_ULTIMATES[id];
            if (this.phase !== 'td' || this.combatPaused || (this.stamps || 0) <= 0 || !meta) {
                this.clearPendingUltimate('confirm-invalid', false);
                return false;
            }
            const targets = this.ultimateTargets(meta, cell);
            if (!targets.length) {
                this.announce('沒有目標，印章未消耗。請移動瞄準位置或取消。');
                return false;
            }
            const levels = (this.save.toolLevels || defaultToolLevels());
            const scaling = meta.levelScaling[Math.max(0, Math.min(4, (levels[id] || 1) - 1))];
            this.stamps = Math.max(0, this.stamps - 1);
            targets.forEach(enemy => {
                const bossScale = enemy.data && enemy.data.role === 'boss' ? 0.45 : 1;
                let damage = scaling.damage;
                if (id === 'textbook') damage += scaling.pulses * 12;
                if (id === 'pencil') damage += scaling.volleys * 18 + scaling.pierce * 8;
                if (id === 'ruler') damage += scaling.crossBonus;
                this.damageEnemy(enemy, Math.round(damage * bossScale), '#F6D365');
                if (scaling.slow) enemy.slowTimer = Math.max(enemy.slowTimer || 0, scaling.slow);
                if (scaling.duration) {
                    enemy.ultimateDotTimer = Math.max(enemy.ultimateDotTimer || 0, scaling.duration);
                    enemy.ultimateDotDamage = Math.max(enemy.ultimateDotDamage || 0, Math.max(2, Math.round(scaling.damage / 8)));
                    enemy.ultimateDotColor = id === 'glue' ? '#ec4899' : '#38bdf8';
                }
                if (scaling.push) enemy.x = Math.min(this.OX + this.C * this.G, enemy.x + scaling.push);
                if (scaling.freeze) enemy.ultimateFreezeTimer = Math.max(enemy.ultimateFreezeTimer || 0, scaling.freeze);
                if (id === 'teacher' && enemy.data && enemy.data.role === 'boss') this.startBossVulnerability(enemy, scaling.vulnerability);
            });
            if (id === 'textbook') this.mp += scaling.sun;
            if (id === 'ruler' && scaling.rebounds > 0) {
                const targetSet = new Set(targets);
                this.objs.filter(enemy => enemy.type === 'enemy' && enemy.hp > 0 && !targetSet.has(enemy))
                    .sort((a, b) => Math.hypot(this.enemyGridColumn(a) - cell.c, a.r - cell.r) - Math.hypot(this.enemyGridColumn(b) - cell.c, b.r - cell.r))
                    .slice(0, scaling.rebounds)
                    .forEach(enemy => this.damageEnemy(enemy, Math.round((scaling.damage + scaling.crossBonus) * 0.45), '#fbbf24'));
            }
            if (id === 'eraser') this.objs.filter(o => o.type === 'tower' && o.id === 'eraser').forEach(o => { o.hp = Math.min(o.maxHp, o.hp + scaling.shield); });
            const vfxFamily = { textbook: 'paper', pencil: 'impact', watering: 'soundwave', glue: 'doodle', ruler: 'impact', eraser: 'impact', teacher: 'paper' }[id];
            const visualPulses = Math.min(7, scaling.pulses || scaling.volleys || 1);
            for (let pulse = 0; pulse < visualPulses; pulse++) {
                this.spawnVfxPhase({ id, x: this.OX + cell.c * this.G, y: this.OY + cell.r * this.G }, 'impact', { label: meta.label, family: vfxFamily, delay: pulse * 6 });
            }
            this.pendingUltimate = null;
            this.announce('大招已施放：' + meta.label + '。');
            this.updateStats();
            this.pushCombatState();
            return true;
        }

        releaseStampUltimate(toolId) {
            const id = toolId || this.selectedTower || 'pencil';
            if (this.pendingUltimate && this.pendingUltimate.toolId === id) {
                if (this.pendingUltimate.state !== 'locked') return false;
                return this.confirmStampUltimate(this.pendingUltimate.previewCell);
            }
            if (this.pendingUltimate) this.clearPendingUltimate('tool-switch', false);
            return this.armStampUltimate(id);
        }

        queueBossPhaseThresholds(enemy, cfg) {
            if (!enemy || !cfg || !Array.isArray(cfg.phases)) return false;
            const ratio = enemy.hp / Math.max(1, enemy.maxHp);
            const current = Number.isInteger(enemy.bossPhase) ? enemy.bossPhase : -1;
            let highest = current;
            cfg.phases.forEach((phase, index) => { if (ratio <= phase.at) highest = index; });
            if (!Array.isArray(enemy.bossPhaseQueue)) enemy.bossPhaseQueue = [];
            for (let index = current + 1; index <= highest; index++) {
                if (!enemy.bossPhaseQueue.includes(index)) enemy.bossPhaseQueue.push(index);
            }
            return enemy.bossPhaseQueue;
        }

        transitionBossPhase(enemy, cfg) {
            const queue = this.queueBossPhaseThresholds(enemy, cfg);
            if (!queue || enemy.bossPhaseTransitioning || hasPendingBossTelegraph(this.objs, enemy)) return false;
            const next = queue.shift();
            if (!Number.isInteger(next)) return false;
            enemy.bossPhaseTransitioning = true;
            enemy.bossPhase = next;
            const phase = cfg.phases[next];
            if (cfg.phaseAssets && cfg.phaseAssets[next]) enemy.spriteAssetId = 'enemy_super_boss_phase' + (next + 1);
            if (enemy.id === 'super_boss') enemy.titanAnnounced = true;
            this.floatText('阶段 ' + (next + 1) + '：预警！', enemy.x, enemy.y - 24, '#f8fafc', phase.telegraph, 24);
            this.spawnVfxPhase(enemy, 'telegraph', { label: 'Boss 预警' });
            this.objs.push({ type: 'bossAction', enemy, phase, cfg, delay: phase.telegraph, maxDelay: phase.telegraph });
            this.announce('BOSS 預警：' + cfg.label + '，' + Math.ceil(phase.telegraph / 60) + ' 秒後施放。');
            return true;
        }

        executeBossPhaseAction(action) {
            const enemy = action && action.enemy;
            const phase = action && action.phase;
            if (!enemy || enemy.hp <= 0 || !phase) return false;
            if (phase.ranged) this.spawnBossRangedVolley(enemy, phase);
            if (phase.summon) this.summonSupportEnemies(enemy, { summon: phase.summon, summonCount: 2, summonRows: 'adjacent', summonHpScale: 0.7 });
            if (phase.hazard) this.spawnBossHazard(enemy, phase);
            if (phase.charge) enemy.bossChargeTimer = Math.max(enemy.bossChargeTimer || 0, 90);
            this.spawnVfxPhase(enemy, 'cast', { label: 'Boss 技能' });
            this.startBossVulnerability(enemy, phase.vulnerability);
            this.floatText('破绽!', enemy.x, enemy.y - 18, '#fef08a', phase.vulnerability, 22);
            this.announce('BOSS 破綻：反擊窗口已開啟。');
            enemy.bossPhaseTransitioning = false;
            this.transitionBossPhase(enemy, action.cfg || BOSS_MECHANICS[enemy.id]);
            return true;
        }

        spawnBossRangedVolley(enemy, phase) {
            const targets = this.objs.filter(o => o.type === 'tower' && !o.destroyed).sort((a, b) => a.x - b.x).slice(0, 3);
            targets.forEach((target, index) => this.spawnEnemyProjectile(enemy, target, { label: phase.ranged, projectileSpeed: 7 + index, damageScale: 1.1, telegraph: phase.telegraph }));
        }

        spawnBossHazard(enemy, phase) {
            this.objs.push({ type: 'dirtyZone', x: enemy.x - this.G, y: enemy.y, c: Math.max(0, this.enemyGridColumn(enemy) - 1), r: enemy.r, w: this.G * 2, h: this.G, hp: 120, maxHp: 120, life: phase.telegraph + 120, maxLife: phase.telegraph + 120, color: '#a855f7', silenceFrames: 24, tick: 30 });
        }

        startBossVulnerability(enemy, frames) {
            if (!enemy || !frames) return;
            enemy.vulnerabilityTimer = Math.max(enemy.vulnerabilityTimer || 0, frames);
        }

        damageTower(tower, amount, sourceColor, label, size = 20) {
            if (!tower || tower.type !== 'tower' || tower.destroyed) return false;
            const dmg = Math.max(1, Math.round(amount || 1));
            tower.hp -= dmg;
            tower.hitFlash = Math.max(tower.hitFlash || 0, 10);
            tower.lastHitColor = sourceColor || '#E85D5D';
            this.spawnParticles(tower.x + this.G / 2, tower.y + this.G / 2, tower.lastHitColor, Math.min(18, Math.max(5, Math.round(dmg / 30))));
            if (label) this.floatText(label, tower.x + this.G / 2, tower.y + this.G * 0.22, tower.lastHitColor, 42, size);
            if (tower.hp <= 0) {
                tower.destroyed = true;
                this.spawnParticles(tower.x + this.G / 2, tower.y + this.G / 2, tower.lastHitColor, 18);
                this.floatText('设施被破坏!', tower.x + this.G / 2, tower.y + this.G * 0.62, '#E85D5D', 48, Math.max(16, size));
            }
            return true;
        }

        applyTowerCooldownPenalty(tower, frames) {
            if (!tower || !frames) return;
            const penalty = Math.max(0, Math.round(frames || 0));
            if (!penalty) return;
            // Producer cd counts up toward production; attacker cd counts down toward firing.
            if (tower.data && tower.data.type === 'producer') {
                tower.cd = Math.max(0, (tower.cd || 0) - penalty);
                return;
            }
            tower.cd = Math.max(tower.cd || 0, penalty);
        }
        findSpecialAttackTarget(enemy, cfg) {
            if (!enemy || !cfg) return null;
            const enemyCenter = enemy.x + this.G / 2;
            const reach = this.G * (cfg.range || 1.2);
            const targets = this.objs
                .filter(t => t.type === 'tower' && t.r === enemy.r && t.hp > 0 && !t.destroyed)
                .filter(t => {
                    const towerCenter = t.x + this.G / 2;
                    return towerCenter <= enemyCenter + this.G * 0.45 && enemyCenter - towerCenter <= reach;
                });
            if (cfg.targeting === 'backline') return targets.sort((a, b) => a.x - b.x)[0] || null;
            return targets.sort((a, b) => Math.abs(enemyCenter - (a.x + this.G / 2)) - Math.abs(enemyCenter - (b.x + this.G / 2)))[0] || null;
        }

        spawnSpecialFx(enemy, target, cfg) {
            if (!enemy || !target || !cfg) return;
            const color = cfg.color || (enemy.data && enemy.data.color) || '#E85D5D';
            ['telegraph', 'cast', 'travel', 'impact'].forEach((phase, index) => this.spawnVfxPhase(enemy, phase, { target, delay: index * 6, label: cfg.label }));
            this.objs.push({
                type: 'skillFx',
                x1: enemy.x + this.G / 2, y1: enemy.y + this.G / 2,
                x2: target.x + this.G / 2, y2: target.y + this.G / 2,
                color, label: cfg.label || '特殊攻击',
                life: 28, maxLife: 28
            });
        }

        spawnVfxPhase(enemy, phase, options = {}) {
            const profile = VFX_MANIFEST[enemy && enemy.id] || VFX_MANIFEST.slime;
            if (!profile || !profile.phases.includes(phase)) return false;
            const target = options.target || enemy;
            this.objs.push({
                type: 'rasterFx', assetId: 'vfx_' + (options.family || profile.family), phase, label: options.label || phase,
                x: target.x + this.G / 2, y: target.y + this.G / 2, delay: options.delay || 0,
                life: 30, maxLife: 30, size: Math.max(this.G, 54)
            });
            return true;
        }

        spawnDirtyZone(enemy, target, cfg) {
            if (!enemy || !target || !cfg) return;
            const c = Math.max(0, Math.min(this.C - 1, target.c || 0));
            const r = Math.max(0, Math.min(this.R - 1, target.r || 0));
            const zone = {
                type: 'dirtyZone',
                x: this.OX + c * this.G,
                y: this.OY + r * this.G,
                c, r,
                w: Math.min(2, this.C - c) * this.G,
                h: Math.min(2, this.R - r) * this.G,
                hp: 220, maxHp: 220,
                life: cfg.zoneDuration || 260,
                maxLife: cfg.zoneDuration || 260,
                tick: 0,
                color: cfg.color || '#ec4899'
            };
            this.objs.push(zone);
            this.floatText('2x2 污染区!', zone.x + zone.w / 2, zone.y + 16, zone.color, 58, 21);
        }

        spawnEnemyProjectile(enemy, target, cfg) {
            if (!enemy || !target || !cfg) return false;
            const color = cfg.color || (enemy.data && enemy.data.color) || '#E85D5D';
            const damage = Math.max(1, Math.round((enemy.dmg || enemy.baseDmg || 1) * (cfg.damageScale || 1)));
            const sx = enemy.x + this.G * 0.45, sy = enemy.y + this.G * 0.36;
            const tx = target.x + this.G / 2, ty = target.y + this.G / 2;
            const ang = Math.atan2(ty - sy, tx - sx);
            const speed = cfg.projectileSpeed || 8;
            this.objs.push({
                type: 'enemyProjectile',
                x: sx, y: sy,
                target,
                dmg: damage,
                color,
                label: cfg.label || 'Special',
                silenceFrames: cfg.silenceFrames || 0,
                cdPenalty: cfg.cdPenalty || 0,
                mpDrain: cfg.mpDrain || 0,
                splash: !!cfg.splash,
                vx: Math.cos(ang) * speed,
                vy: Math.sin(ang) * speed,
                life: 150,
                maxLife: 150
            });
            return true;
        }

        updateEnemyProjectile(projectile) {
            projectile.life--;
            const target = projectile.target;
            if (!target || target.destroyed || target.hp <= 0) { projectile.life = 0; return; }
            const tx = target.x + this.G / 2, ty = target.y + this.G / 2;
            const dist = Math.hypot(tx - projectile.x, ty - projectile.y);
            if (dist < 28) {
                this.damageTower(target, projectile.dmg, projectile.color, projectile.label, 18);
                if (projectile.silenceFrames) target.silenceTimer = Math.max(target.silenceTimer || 0, projectile.silenceFrames);
                if (projectile.cdPenalty) this.applyTowerCooldownPenalty(target, projectile.cdPenalty);
                if (projectile.mpDrain) { this.mp = Math.max(0, this.mp - projectile.mpDrain); this.updateStats(); }
                if (projectile.splash) {
                    this.objs.forEach(t => {
                        if (t.type !== 'tower' || t === target || t.destroyed || t.hp <= 0 || t.r !== target.r) return;
                        if (Math.abs(t.x - target.x) <= this.G * 1.05) this.damageTower(t, Math.round(projectile.dmg * 0.45), projectile.color, 'splash', 14);
                    });
                }
                projectile.life = 0;
                return;
            }
            const speed = Math.max(4, Math.hypot(projectile.vx || 0, projectile.vy || 0) || 8);
            const ang = Math.atan2(ty - projectile.y, tx - projectile.x);
            projectile.vx = Math.cos(ang) * speed;
            projectile.vy = Math.sin(ang) * speed;
            projectile.x += projectile.vx;
            projectile.y += projectile.vy;
        }

        tryVaultTower(enemy, tower, cfg) {
            if (!enemy || !tower || !cfg || !cfg.vault || enemy.vaultUsed) return false;
            enemy.vaultUsed = true;
            enemy.isEating = false;
            enemy.eatCd = 0;
            enemy.hurryTimer = Math.max(enemy.hurryTimer || 0, cfg.vaultBoost || 45);
            enemy.x = Math.max(this.OX - 10, tower.x - this.G * 0.82);
            this.spawnSpecialFx(enemy, tower, Object.assign({}, cfg, { label: cfg.vaultLabel || cfg.label || 'Vault' }));
            this.spawnParticles(tower.x + this.G / 2, tower.y + this.G / 2, cfg.color || '#38bdf8', 10);
            this.floatText('跳过防线!', tower.x + this.G / 2, tower.y - 4, cfg.color || '#38bdf8', 46, 20);
            return true;
        }

        summonSupportEnemies(enemy, cfg) {
            if (!enemy || !cfg || !cfg.summon) return 0;
            enemy.summonsUsed = enemy.summonsUsed || 0;
            const summonCap = cfg.summonCap || 6;
            if (enemy.summonsUsed >= summonCap) return 0;
            const eDef = ENEMIES[cfg.summon] || ENEMIES.slime;
            const currentWave = LEVELS[this.levelIdx] && LEVELS[this.levelIdx].waves ? LEVELS[this.levelIdx].waves[this.waveIdx] : null;
            const scaled = scaleEnemyStats(eDef, LEVELS[this.levelIdx], this.challengeRule, currentWave);
            const rows = [enemy.r];
            if (cfg.summonRows === 'adjacent') {
                if (enemy.r > 0) rows.push(enemy.r - 1);
                if (enemy.r < this.R - 1) rows.push(enemy.r + 1);
            }
            const count = Math.min(cfg.summonCount || 1, summonCap - enemy.summonsUsed);
            let spawned = 0;
            for (let n = 0; n < count; n++) {
                const r = rows[n % rows.length];
                const hp = Math.max(8, Math.round(scaled.hp * (cfg.summonHpScale || 0.72)));
                const x = Math.min(this.OX + this.C * this.G, enemy.x + this.G * (0.72 + n * 0.18));
                this.objs.push({
                    type: 'enemy',
                    id: eDef.id,
                    r,
                    x,
                    y: this.OY + r * this.G,
                    hp,
                    maxHp: hp,
                    dmg: Math.max(1, Math.round(scaled.dmg * 0.75)),
                    baseDmg: Math.max(1, Math.round(scaled.dmg * 0.75)),
                    threatTier: scaled.threatTier,
                    data: eDef,
                    vx: -Math.max(0.12, scaled.spd * 1.04),
                    fly: eDef.type === 'air',
                    slowTimer: 0,
                    isEating: false,
                    hitFlash: 0,
                    specialCd: 80,
                    levelIdx: this.levelIdx,
                    summoned: true
                });
                spawned++;
            }
            enemy.summonsUsed += spawned;
            if (spawned) {
                this.spawnSpecialFx(enemy, { x: enemy.x + this.G * 0.75, y: enemy.y, r: enemy.r }, cfg);
                this.floatText('召唤支援!', enemy.x, enemy.y - 8, cfg.color || '#0ea5e9', 52, 22);
            }
            return spawned;
        }

        updateDirtyZone(zone) {
            zone.life--;
            zone.tick = (zone.tick || 0) + 1;
            if (zone.tick % 32 !== 0) return;
            const zx2 = zone.x + zone.w, zy2 = zone.y + zone.h;
            this.objs.forEach(t => {
                if (t.type !== 'tower' || t.destroyed || t.hp <= 0) return;
                const cx = t.x + this.G / 2, cy = t.y + this.G / 2;
                if (cx >= zone.x && cx <= zx2 && cy >= zone.y && cy <= zy2) {
                    t.silenceTimer = Math.max(t.silenceTimer || 0, 70);
                    this.damageTower(t, 18, zone.color, '污染!', 16);
                }
            });
        }

        resolveSpecialAttack(enemy, target, cfg) {
            if (!enemy || !target || !cfg) return false;
            const sourceColor = cfg.color || (enemy.data && enemy.data.color) || '#E85D5D';
            const damage = Math.max(1, Math.round((enemy.dmg || enemy.baseDmg || 1) * (cfg.damageScale || 1)));
            this.spawnSpecialFx(enemy, target, cfg);
            if (cfg.projectile) {
                this.spawnEnemyProjectile(enemy, target, cfg);
                enemy.specialFlash = Math.max(enemy.specialFlash || 0, 12);
                return true;
            }
            this.damageTower(target, damage, sourceColor, cfg.label, 19);
            if (cfg.silenceFrames) {
                target.silenceTimer = Math.max(target.silenceTimer || 0, cfg.silenceFrames);
            }
            if (cfg.dirtyZone) {
                this.spawnDirtyZone(enemy, target, cfg);
            }
            if (cfg.cdPenalty) {
                this.applyTowerCooldownPenalty(target, cfg.cdPenalty);
            }
            if (cfg.mpDrain) {
                this.mp = Math.max(0, this.mp - cfg.mpDrain);
                this.updateStats();
            }
            enemy.specialFlash = Math.max(enemy.specialFlash || 0, 12);
            return true;
        }

        triggerLaneRescue(enemy) {
            if (!enemy || enemy.id === 'elf') return false;
            if (!this.laneRescueUsed) this.laneRescueUsed = {};
            if (this.laneRescueUsed[enemy.r]) return false;
            this.laneRescueUsed[enemy.r] = true;
            const y = this.OY + enemy.r * this.G + this.G / 2;
            this.floatText('值日生救场！', this.OX + this.G * 1.2, y, '#F6D365', 80, 28);
            this.spawnParticles(this.OX + this.G * 0.9, y, '#F6D365', 26);
            this.objs.forEach(e => {
                if (e.type === 'enemy' && e.r === enemy.r) {
                    e.x = Math.max(e.x, this.OX + this.G * 0.85);
                    e.slowTimer = Math.max(e.slowTimer || 0, 140);
                    this.damageEnemy(e, 420, '#F6D365');
                }
            });
            this.pushCombatState();
            return true;
        }

        // 知识碎片：永久升级货币。即时写盘（频率低）；累计本关获得量供结算展示。
        addShards(n) {
            if (!n) return;
            if (typeof this.save.shards !== 'number') this.save.shards = 0;
            this.save.shards = Math.min(999999, this.save.shards + n); // 与 import clamp 同上限，防爆表
            this.shardsEarnedThisLevel = (this.shardsEarnedThisLevel || 0) + n;
            writeGameSave(this.save);
        }

        // Phase 4：结算星级并保存最佳成绩
        computeAndSaveStars() {
            const lvl = LEVELS[this.levelIdx];
            const sg = lvl.starGoals || {};
            const hp = this.hp, wrong = this.wrongAnswers || 0;
            let stars = 1;
            if (sg.twoStar && hp >= (sg.twoStar.minHp || 0)) stars = 2;
            if (sg.threeStar && hp >= (sg.threeStar.minHp || 0) && wrong <= (sg.threeStar.maxWrongAnswers != null ? sg.threeStar.maxWrongAnswers : 99)) stars = 3;
            const id = lvl.id || ('L' + this.levelIdx);
            if (!this.save.results) this.save.results = {};
            const prev = this.save.results[id] || { stars: 0, bestHp: 0, bestWrong: 99 };
            const isNewBest = stars > prev.stars;
            this.save.results[id] = {
                stars: Math.max(prev.stars, stars),
                bestHp: Math.max(prev.bestHp, hp),
                bestWrong: Math.min(prev.bestWrong, wrong)
            };
            // Phase A/B 轻量收集：通关即收集该关贴纸；reward 为 badge 则收集徽章（资料模型先跑起来，完整贴纸册留待 Phase C）
            if (!this.save.stickers) this.save.stickers = {};
            if (!this.save.badges) this.save.badges = {};
            const isFirstSticker = !this.save.stickers[id];
            this.save.stickers[id] = true;
            let gotBadge = '';
            if (lvl.reward && lvl.reward.type === 'badge' && lvl.reward.text && !this.save.badges[id]) {
                this.save.badges[id] = true; gotBadge = lvl.reward.text; // 存 presence 旗标即可；显示文字从 LEVELS reward 取，存档保持 ASCII
            }
            // Phase C：世界完成徽章 — 该关所属世界的所有真实关卡都已通关
            let gotWorldBadge = '';
            const world = WORLDS.find(w => !w.locked && w.nodes.some(n => n.levelIdx === this.levelIdx));
            if (world) {
                const realNodes = world.nodes.filter(n => n.levelIdx != null);
                const allCleared = realNodes.every(n => { const lid = LEVELS[n.levelIdx] && LEVELS[n.levelIdx].id; const rr = lid && this.save.results[lid]; return rr && rr.stars > 0; });
                const wkey = 'world:' + world.id;
                if (allCleared && !this.save.badges[wkey]) { this.save.badges[wkey] = true; gotWorldBadge = world.name; }
            }
            writeGameSave(this.save);
            const tags = [];
            if (wrong === 0) tags.push('零失误');
            if (hp >= HP_CAP) tags.push('完美防守');
            const stickerText = isFirstSticker ? ('🏅 收集到「' + friendlyLevelName(lvl) + '」贴纸！') : '';
            this.addShards(1 + stars); // 通关奖励碎片：基础 1 + 每颗星 1
            return { levelIdx: this.levelIdx, id, stars, hp, wrong, isNewBest, reward: lvl.reward || null, tags, isChallenge: !!lvl.isChallenge, name: lvl.name, stickerText, gotBadge, gotWorldBadge, subjectsLearned: this.subjectsLearned || {}, wrongList: this.wrongList || [], shardsEarned: this.shardsEarnedThisLevel || 0, shardsTotal: this.save.shards || 0 };
        }

        nextLevel() {
            this.clearPendingUltimate('level-complete', false);
            this.waveIdx++;
            const lvl = LEVELS[this.levelIdx];
            if (this.waveIdx >= lvl.waves.length) {
                const result = this.computeAndSaveStars();
                const isLastCampaign = !lvl.isChallenge && this.levelIdx >= CAMPAIGN_COUNT - 1;
                const minigame = chapterMinigameForCompletedLevel(this.levelIdx);
                syncCompletedLevelSave(lvl, this.levelIdx, CAMPAIGN_COUNT, this.syncSave.bind(this));
                this.callbacks.onLevelComplete(this.levelIdx, Object.assign({ isLastCampaign, minigame }, result));
                this.phase = 'level_complete'; this.callbacks.onPhaseChange('level_complete'); SOUND.play('clear');
                this.floatText("章节完成!", this.w/2, this.h/2, '#F6E05E', 150, 40);
            } else { this.startTD(); }
        }

        startLoop() {
            const loop = () => { this.update(); this.draw(); this.animationId = requestAnimationFrame(loop); };
            this.animationId = requestAnimationFrame(loop);
        }

        spawnOrb(x, y, val = 25) { this.objs.push({ type: 'orb', x, y, val, life: 400, maxLife: 400 }); }

        spawnStar() {
            const x = this.OX + this.G + Math.random() * Math.max(1, (this.C - 2) * this.G);
            const y = this.OY + this.G / 2 + Math.random() * Math.max(1, (this.R - 1) * this.G);
            this.objs.push({ type: 'star', x, y, life: 600, maxLife: 600 });
            this.floatText('💡 知识星出现！', x, y - 24, '#F6D365', 70, 20);
        }

        // 点击知识星 → 暂停战场并开启战斗答题（区别于迷宫出口答题）
        openCombatQuiz() {
            if (this.combatPaused) return;
            this.combatPaused = true;
            const q = this.getQuestion();
            this.currentQuestionObj = q;
            const answersWithIndex = q.a.map((ans, idx) => ({ ...ans, originalIndex: idx }));
            const canHint = this.questionsAnswered > 0;
            this.callbacks.onQuizOpen(q.q, answersWithIndex, false, false, canHint, true);
        }

        rollRewards() {
            const pool = REWARDS.map((_, i) => i);
            shuffleArray(pool);
            return pool.slice(0, 3).map(i => REWARDS[i]);
        }

        applyReward(id) {
            SOUND.play('reward');
            if (id === 'energy') {
                this.mp += 150; this.floatText('+150 能量', this.w/2, this.h/2, '#F6D365', 70, 34);
            } else if (id === 'focus') {
                this.objs.forEach(o => { if (o.type === 'enemy') o.slowTimer = 300; });
                this.floatText('全班专注！敌人减速', this.w/2, this.h/2, '#4A90E2', 70, 30);
            } else if (id === 'chalk') {
                const counts = new Array(this.R).fill(0);
                this.objs.forEach(o => { if (o.type === 'enemy') counts[o.r]++; });
                let best = 0; for (let r = 1; r < this.R; r++) if (counts[r] > counts[best]) best = r;
                this.objs.forEach(o => { if (o.type === 'enemy' && o.r === best) this.damageEnemy(o, 400, '#E85D5D'); });
                this.floatText('粉笔风暴！', this.OX + this.C*this.G/2, this.OY + best*this.G + this.G/2, '#E85D5D', 80, 30);
            } else if (id === 'heal') {
                this.objs.forEach(o => { if (o.type === 'tower') o.hp = o.maxHp; });
                this.floatText('紧急补课！防御回满', this.w/2, this.h/2, '#48bb78', 70, 30);
            } else if (id === 'free') {
                this.freeNextTower = true;
                this.floatText('下一个防御免费！', this.w/2, this.h/2, '#B9825B', 70, 28);
            }
            this.combatPaused = false;
            this.updateStats();
            this.syncSave();
        }

        // ----- Phase 2.5 System 1: 关卡前敌人预告 + 推荐策略 -----
        getLevelPreview(idx) {
            const lvl = LEVELS[idx];
            const tally = {};
            lvl.waves.forEach(w => w.groups.forEach(g => { tally[g.e] = (tally[g.e] || 0) + g.n; }));
            const sceneTable = SCENE_MONSTER_TABLE[lvl.chapterId] || null;
            const signatureDef = lvl.signatureEnemy && ENEMIES[lvl.signatureEnemy] ? ENEMIES[lvl.signatureEnemy] : null;
            const enemies = Object.keys(tally).map(id => ({
                id, name: (ENEMIES[id] && ENEMIES[id].name) || id, color: (ENEMIES[id] && ENEMIES[id].color) || '#ffffff',
                count: tally[id], role: (ENEMIES[id] && ENEMIES[id].role) || 'normal', hint: (ENEMIES[id] && ENEMIES[id].hint) || ''
            }));
            const roles = new Set(enemies.filter(e => e.id !== 'elf').map(e => e.role));
            const strategies = ['课本发电站优先摆 2-3 个攒能量'];
            if (roles.has('fast')) strategies.push('快速敌人多：用胶水陷阱减速拖住');
            if (roles.has('normal')) strategies.push('普通敌人：铅笔投手当主力输出');
            if (roles.has('tank')) strategies.push('铁桶怪硬：橡皮盾挡路 + 集火破甲');
            if (roles.has('support')) strategies.push('支援型怪物：先点掉，不要让它们放大整波压力');
            if (roles.has('trick')) strategies.push('换路型怪物：每一路都留基础输出，别单线押宝');
            if (roles.has('boss')) strategies.push('有魔王压线：留好橡皮盾与班主任技能');
            return {
                levelIdx: idx, id: lvl.id || ('L' + idx), name: lvl.name, enemies, strategies, isFixed: idx === 0, loadoutSize: lvl.loadoutSize || LOADOUT_SIZE,
                archetype: lvl.archetype || '', hint: lvl.enemyPreviewHint || '', starGoals: lvl.starGoals || {},
                signatureEnemy: signatureDef ? { id: signatureDef.id, name: signatureDef.name, color: signatureDef.color, role: signatureDef.role, hint: signatureDef.hint, ability: signatureDef.ability } : null,
                sceneMonsters: sceneTable ? {
                    scene: sceneTable.scene,
                    theme: sceneTable.theme,
                    monsters: sceneTable.monsters.map(id => ENEMIES[id]).filter(Boolean).map(e => ({ id: e.id, name: e.name, color: e.color, role: e.role }))
                } : null,
                isBoss: !!lvl.isBoss, isChallenge: !!lvl.isChallenge, chapterId: lvl.chapterId || '',
                goal: lvl.goal || lvl.tip || '',
                recommendedTools: lvl.recommendedTools || Object.keys(TOWERS),
                mainlineLoadout: lvl.mainlineLoadout || Object.keys(TOWERS),
                lessonBeat: lvl.lessonBeat || null,
                advanced: !!lvl.advanced // 研究所进阶关：备战自选配装
            };
        }

        // ----- Phase 2.5 System 3: 班主任技能槽 -----
        canUseTeacherSkill() {
            return !!(this.activeLoadout && this.activeLoadout.includes('teacher'));
        }
        chargeTeacher(amt) {
            if (!this.canUseTeacherSkill()) return;
            if (this.teacherReady) return;
            this.teacherCharge = Math.min(this.teacherMax, this.teacherCharge + amt);
            if (this.teacherCharge >= this.teacherMax) {
                this.teacherReady = true;
                this.floatText('班主任技能就绪！', this.w / 2, this.h / 2, '#4A90E2', 80, 28);
                this.pushCombatState();
            }
        }
        releaseTeacherSkill() {
            if (!this.canUseTeacherSkill()) return;
            if (!this.teacherReady || this.phase !== 'td' || this.combatPaused) return;
            this.teacherReady = false; this.teacherCharge = 0;
            this.freezeTimer = 180; // 全班安静：定身 3 秒
            this.objs.forEach(o => { if (o.type === 'enemy') o.slowTimer = Math.max(o.slowTimer || 0, 180); });
            this.spawnParticles(this.w / 2, this.h / 2, '#4A90E2', 30);
            this.floatText('全班安静！敌人定身 3 秒', this.w / 2, this.h / 2, '#4A90E2', 90, 30);
            this.pushCombatState();
        }

        // ----- Phase 2.5 System 4: 提前上课（等待下一波时可提前开始，给少量能量） -----
        callNextWaveEarly() {
            if (this.phase !== 'td' || this.combatPaused) return;
            if (this.waitNextWave === null || this.waitNextWave <= 0) return;
            this.mp += 50;
            this.floatText('提前上课！+50 灵感值', this.w / 2, this.h / 2, '#F6D365', 70, 28);
            this.waitNextWave = 1; // 仅缩短等待计时，保留既有过波 flow（迷宫/答题）
            this.updateStats();
            this.pushCombatState();
        }

        // ----- Phase 2.5 System 5: 关卡内升级 -----
        selectField(tw) {
            this.selectedField = tw;
            const up = UPGRADES[tw.id];
            this.callbacks.onFieldSelect && this.callbacks.onFieldSelect({
                id: tw.id, name: tw.data.name, icon: tw.data.icon, color: tw.data.color,
                upgraded: !!tw.upgraded,
                canUpgrade: !!up && !tw.upgraded,
                upgradeName: up ? up.name : '', upgradeDesc: up ? up.desc : '', upgradeCost: up ? up.cost : 0
            });
        }
        clearField() {
            if (this.selectedField) { this.selectedField = null; this.callbacks.onFieldSelect && this.callbacks.onFieldSelect(null); }
        }
        upgradeSelectedField() {
            const tw = this.selectedField; if (!tw) return;
            const up = UPGRADES[tw.id]; if (!up || tw.upgraded) return;
            if (this.mp < up.cost) { this.floatText('能量不足', tw.x + this.G / 2, tw.y, '#E85D5D', 50, 22); return; }
            this.mp -= up.cost; tw.upgraded = true; up.apply(tw);
            this.spawnParticles(tw.x + this.G / 2, tw.y + this.G / 2, '#F6D365', 14);
            this.floatText('升级！' + up.name, tw.x + this.G / 2, tw.y, '#48bb78', 60, 22);
            this.updateStats();
            this.selectField(tw); // 刷新升级面板状态
        }

        // 推送战斗 HUD 额外状态（技能槽 / 提前上课按钮）
        pushCombatState() {
            this.callbacks.onCombatState && this.callbacks.onCombatState({
                teacherCharge: this.teacherCharge / this.teacherMax,
                teacherReady: this.teacherReady,
                waitWave: this.waitNextWave !== null && this.waitNextWave > 0,
                stamps: this.stamps || 0,
                stampKills: this.stampKills || 0,
                stampProgress: (this.stampKills || 0) / STAMP_KILLS_REQUIRED,
                pendingUltimate: this.pendingUltimate ? {
                    toolId: this.pendingUltimate.toolId,
                    state: this.pendingUltimate.state || 'locked',
                    previewCell: this.pendingUltimate.previewCell ? { ...this.pendingUltimate.previewCell } : null
                } : null
            });
        }

        spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 3 + 2;
                this.particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 30+Math.random()*20, color, size: Math.random()*4+2 });
            }
        }

        // 敌人死亡：纸屑 + 粉笔灰（校园主题），Boss 爆得更大
        spawnDeathFx(x, y, color, big) {
            const n = big ? 22 : 9;
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 3 + 1.5;
                this.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2.2, life: 40 + Math.random()*22, color: i % 2 ? color : '#F7F3E8', size: Math.random()*3+3, shape: 'scrap', rot: Math.random()*6.28, vr: (Math.random()-0.5)*0.5 });
            }
            const m = big ? 16 : 6;
            for (let i = 0; i < m; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 1.5 + 0.5;
                this.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1, life: 30 + Math.random()*20, color: '#ffffff', size: Math.random()*2+1.5, shape: 'dust' });
            }
        }

        floatText(text, x, y, color, life = 50, size = 24) { this.floatTexts.push({ text, x, y, color, life, size }); }

        update() {
            if (this.pendingUltimate && (this.phase !== 'td' || (this.stamps || 0) <= 0)) {
                this.clearPendingUltimate('state-invalid', false);
            }
            if (this.phase === 'minigame') {
                this.updateChapterMinigame();
                return;
            }
            if (this.phase === 'over' || this.phase === 'level_complete' || this.phase === 'rescue_quiz') return;
            if (isOrientationBlocked(this.phase)) return;
            if (this.combatPaused) return; // 战斗答题/选奖励时冻结战场
            if (this.phase === 'maze') {
                this.updateMazeMovement();
                for(let i=this.floatTexts.length-1; i>=0; i--) { this.floatTexts[i].y--; this.floatTexts[i].life--; if(this.floatTexts[i].life<=0) this.floatTexts.splice(i,1); }
                for(let i=this.particles.length-1; i>=0; i--) { const p=this.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.life--; if(p.life<=0) this.particles.splice(i,1); }
                return;
            }
            if (this.hp <= 0 && this.phase !== 'rescue_quiz') {
                this.clearPendingUltimate('player-death', false);
                this.phase = 'over'; this.callbacks.onPhaseChange('over');
                SOUND.play('lose'); this.callbacks.onGameOver(false, "游戏结束", "生命值耗尽！"); return;
            }
            this.frame++;
            if (this.phase === 'td') {
                for(const k in this.towerCooldowns) if (this.towerCooldowns[k] > 0) this.towerCooldowns[k]--;
                if (this.frame % 6 === 0) { this.mp += 1; }
                if (this.frame % 10 === 0) this.updateStats();
                this.naturalSunTimer--;
                if (this.naturalSunTimer <= 0) { this.spawnOrb(this.OX + Math.random()*(this.C*this.G), this.OY + Math.random()*(this.R*this.G), 40); this.naturalSunTimer = 300; }
                for (let i = this.laneWarnings.length - 1; i >= 0; i--) { if (--this.laneWarnings[i].life <= 0) this.laneWarnings.splice(i, 1); }
                if (this.freezeTimer > 0) this.freezeTimer--;
                if (this.frame % 30 === 0) this.pushCombatState(); // 技能槽进度平滑刷新
                // Phase 4 Boss「红笔点名」：预警一路 → 触发伤害该路最前防御；班主任定身可化解
                if (LEVELS[this.levelIdx].isBoss) {
                    if (this.objs.some(o => o.type === 'enemy' && o.id === 'boss')) {
                        this.bossTimer--;
                        if (this.bossTimer <= 0) {
                            const rows = [];
                            this.objs.forEach(o => { if (o.type === 'tower' && rows.indexOf(o.r) < 0) rows.push(o.r); });
                            if (rows.length) this.bossMarks.push({ r: rows[Math.floor(Math.random() * rows.length)], life: 95, max: 95, fired: false });
                            this.bossTimer = 420;
                        }
                    }
                    for (let bi = this.bossMarks.length - 1; bi >= 0; bi--) {
                        const mk = this.bossMarks[bi];
                        if (--mk.life <= 0 && !mk.fired) {
                            mk.fired = true;
                            if (this.freezeTimer > 0) {
                                this.floatText('红笔点名被化解！', this.OX + this.G, this.OY + mk.r * this.G + this.G / 2, '#4A90E2', 60, 24);
                            } else {
                                const ts = this.objs.filter(o => o.type === 'tower' && o.r === mk.r).sort((a, b) => b.x - a.x);
                                if (ts.length) { const t = ts[0]; this.damageTower(t, 2000, '#E85D5D', '红笔点名！', 26); }
                                else { this.floatText('红笔点名！', this.OX + this.G, this.OY + mk.r * this.G + this.G / 2, '#E85D5D', 60, 24); }
                            }
                            this.bossMarks.splice(bi, 1);
                        }
                    }
                }
                this.starTimer--;
                if (this.starTimer <= 0) {
                    if (this.spawnState.active || this.objs.some(o => o.type === 'enemy')) this.spawnStar();
                    this.starTimer = 720 + Math.floor(Math.random() * 360); // 约 12-18 秒掉一颗
                }
                if (this.spawnState.active) {
                    this.spawnState.timer--;
                    // 敌人生成前预先确定出现路线并闪红预警（让玩家来得及部署该路）
                    if (this.spawnState.timer <= 75 && this.spawnState.nextRow == null) {
                        const wave = LEVELS[this.levelIdx].waves[this.waveIdx];
                        const grp = wave.groups[this.spawnState.groupIdx];
                        const wr = chooseSpawnRowForGroup(grp, wave, this.R);
                        this.spawnState.nextRow = wr;
                        const wlife = Math.max(40, this.spawnState.timer + 12);
                        this.laneWarnings.push({ r: wr, life: wlife, max: wlife });
                    }
                    if (this.spawnState.timer <= 0) {
                        const wave = LEVELS[this.levelIdx].waves[this.waveIdx];
                        const grp = wave.groups[this.spawnState.groupIdx];
                        const eDef = ENEMIES[grp.e];
                        const r = (this.spawnState.nextRow != null) ? this.spawnState.nextRow : chooseSpawnRowForGroup(grp, wave, this.R);
                        this.spawnState.nextRow = null;
                        const scaled = scaleEnemyStats(eDef, LEVELS[this.levelIdx], this.challengeRule, wave);
                        const hp = scaled.hp, spd = scaled.spd, dmg = scaled.dmg;
                        this.objs.push({ type: 'enemy', id: grp.e, r, x: this.OX + this.C*this.G, y: this.OY + r*this.G, hp, maxHp: hp, dmg, baseDmg: dmg, threatTier: scaled.threatTier, data: eDef, vx: -spd, fly: eDef.type === 'air', slowTimer: 0, isEating: false, hitFlash: 0, specialCd: 45 + Math.floor(Math.random() * 55), levelIdx: this.levelIdx });
                        this.collectEnemySticker(grp.e); // Phase C：遇到即收集敌人贴纸
                        this.spawnState.mobsLeftInGroup--; this.spawnState.timer = grp.interval;
                        if (this.spawnState.mobsLeftInGroup <= 0) {
                            this.spawnState.groupIdx++;
                            if (this.spawnState.groupIdx < this.spawnState.totalGroups) {
                                this.spawnState.mobsLeftInGroup = LEVELS[this.levelIdx].waves[this.waveIdx].groups[this.spawnState.groupIdx].n;
                                this.spawnState.timer = LEVELS[this.levelIdx].waves[this.waveIdx].groups[this.spawnState.groupIdx].preDelay;
                                if (this.spawnState.groupIdx === this.spawnState.totalGroups - 1) this.floatText("警告：最后一波!", this.w/2, this.h/2, '#e53e3e', 180, 40);
                            } else { this.spawnState.active = false; }
                        }
                    }
                } else if (!this.spawnState.active && !this.objs.some(o => o.type === 'enemy')) {
                    if (this.waitNextWave === null) {
                        this.waitNextWave = getInterWaveDelay(LEVELS[this.levelIdx], this.challengeRule); this.floatText("战场打扫时间...", this.w/2, this.h/2, '#F6E05E', 250, 30);
                        this.chargeTeacher(15); // 过波存活：技能槽充能
                        this.pushCombatState(); // 显示「提前上课」按钮
                    }
                    this.waitNextWave--;
                    if (this.waitNextWave <= 0) { this.waitNextWave = null; this.startMaze(); this.pushCombatState(); }
                }
                for (let i = this.objs.length - 1; i >= 0; i--) {
                    const o = this.objs[i];
                    if (o.type === 'orb' || o.type === 'star') { o.life--; if(o.life<=0) this.objs.splice(i,1); }
                    else if (o.type === 'skillFx' || o.type === 'rasterFx') { if (o.delay > 0) o.delay--; else o.life--; if(o.life<=0) this.objs.splice(i,1); }
                    else if (o.type === 'bossAction') {
                        if (!o.enemy || o.enemy.hp <= 0) { this.objs.splice(i, 1); continue; }
                        o.delay--;
                        if (o.delay <= 0) { this.executeBossPhaseAction(o); this.objs.splice(i, 1); }
                    }
                    else if (o.type === 'enemyProjectile') { this.updateEnemyProjectile(o); if(o.life<=0) this.objs.splice(i,1); }
                    else if (o.type === 'dirtyZone') { this.updateDirtyZone(o); if(o.life<=0 || o.hp<=0) this.objs.splice(i,1); }
                    else if (o.type === 'tower') {
                        if (o.hp <= 0 || o.destroyed) { this.objs.splice(i,1); continue; }
                        if (o.hitFlash > 0) o.hitFlash--;
                        if (o.ultimateTimer > 0) o.ultimateTimer--;
                        if (o.data.type === 'bomb') {
                            const rowsToBomb = [o.r - 1, o.r, o.r + 1];
                            const bombDmg = o.atkOverride || o.data.dmg;
                            this.objs.forEach(e => { if (e.type === 'enemy' && rowsToBomb.includes(e.r) && e.x < this.w) { this.damageEnemy(e, bombDmg, '#F56565'); this.floatText("BOOM!", e.x, e.y, '#F56565', 40, 30); } });
                            this.spawnParticles(o.x, o.y, '#F56565', 50); this.objs.splice(i, 1); continue;
                        }
                        if (o.silenceTimer > 0) {
                            o.silenceTimer--;
                            if (this.frame % 45 === 0) this.spawnParticles(o.x + this.G / 2, o.y + this.G / 2, '#94a3b8', 5);
                        }
                        else if (o.data.type === 'producer') { const prodRate = o.rateOverride || o.data.rate; o.cd++; if(o.cd>=prodRate) { this.spawnOrb(o.x+this.G/2, o.y+this.G/2, o.orbValueOverride || 40); o.cd=0; } }
                        else if (o.data.type === 'shoot') {
