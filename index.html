            wrap.appendChild(inner);
            return wrap;
        }

        // ----- Phase A：小学生友善关卡 intro（短、鼓励、不需选 loadout） -----
        // 进阶 loadout 选择已移到 GDD §14-22 deferred backlog（研究所进阶模式才用），主线不出现。
        renderPrep() {
            if (this.phase !== 'prep' || !this.prepData) return null;
            const pd = this.prepData;
            const roleTag = { normal: '普通', fast: '好快', tank: '好硬', trick: '换路', support: '支援', boss: '魔王', elf: '能量' };
            const roleColor = { normal: '#48bb78', fast: '#E85D5D', tank: '#a0aec0', trick: '#F59E0B', support: '#EC4899', boss: '#e53e3e', elf: '#F6D365' };
            const fname = friendlyName(pd.name);
            const beat = pd.lessonBeat || null;
            const bestStars = (this.results[pd.id] && this.results[pd.id].stars) || 0;

            const wrap = this.el('div', {
                position:'absolute', inset:'0', display:'flex', alignItems:'center', justifyContent:'center', zIndex:'55',
                background:'linear-gradient(135deg, #1f3d2f 0%, #2F6B4F 55%, #1e293b 100%)', pointerEvents:'auto',
                padding:'calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))',
                boxSizing:'border-box'
            });
            const card = this.el('div', {
                width:'100%', maxWidth:'460px', maxHeight:'100%', overflowY:'auto', boxSizing:'border-box',
                display:'flex', flexDirection:'column', gap:'12px'
            });
            card.className = 'hide-scrollbar';

            // 标题（友善关卡名）
            card.appendChild(this.el('div', { textAlign:'center', color:'#F7F3E8', fontWeight:'900', fontSize:'22px', textShadow:'0 2px 4px rgba(0,0,0,0.5)' }, '🎒 ' + fname));

            // 一句任务目标（便条纸）
            const goalNote = this.el('div', { borderRadius:'4px 14px 4px 14px', padding:'12px 14px', fontSize:'15px', fontWeight:'bold', textAlign:'center', lineHeight:'1.5' }, '🎯 ' + (pd.goal || ''));
            goalNote.className = 'sticky-note';
            card.appendChild(goalNote);

            // 这一关会遇到（敌人预告，简化；不展示能量精灵）
            const enemyBox = this.el('div', { borderRadius:'12px', padding:'10px 12px' });
            enemyBox.className = 'chalk-card';
            enemyBox.appendChild(this.el('div', { fontWeight:'900', fontSize:'13px', color:'#F6D365', marginBottom:'6px' }, '👀 这一关会遇到'));
            const enemyRow = this.el('div', { display:'flex', flexWrap:'wrap', gap:'6px' });
            (pd.enemies || []).filter(en => en.id !== 'elf').forEach(en => {
                const chip = this.el('div', { display:'inline-flex', alignItems:'center', gap:'5px', background:'rgba(0,0,0,0.22)', borderRadius:'999px', padding:'3px 9px', fontSize:'12px', color:'#F7F3E8', fontWeight:'bold' });
                chip.append(
                    this.el('span', { width:'10px', height:'10px', borderRadius:'3px', background: en.color, display:'inline-block', border:'1px solid rgba(247,243,232,0.7)' }),
                    this.el('span', {}, en.name + '×' + en.count),
                    this.el('span', { fontSize:'10px', color: roleColor[en.role] || '#F7F3E8', fontWeight:'900' }, roleTag[en.role] || '')
                );
                enemyRow.appendChild(chip);
            });
            enemyBox.appendChild(enemyRow);
            if (pd.hint) enemyBox.appendChild(this.el('div', { fontSize:'12px', color:'#F7F3E8', marginTop:'6px', opacity:'0.92', lineHeight:'1.5' }, '💡 ' + pd.hint));
            card.appendChild(enemyBox);

            // 本关小诀窍：只讲一个玩法重点，避免进关前像装备选择。
            if (beat && TOWERS[beat.tool]) {
                const t = TOWERS[beat.tool];
                const lesson = this.el('div', { borderRadius:'12px', padding:'12px 14px', display:'grid', gridTemplateColumns:'54px 1fr', gap:'10px', alignItems:'center' });
                lesson.className = 'chalk-card';
                lesson.appendChild(this.el('div', {
                    width:'50px', height:'50px', borderRadius:'14px', background:'#F7F3E8', color:'#5b4636',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:'27px', border:'3px solid #F6D365'
                }, t.icon));
                const copy = this.el('div', { display:'flex', flexDirection:'column', gap:'4px' });
                copy.appendChild(this.el('div', { fontWeight:'900', fontSize:'14px', color:'#F6D365' }, '💡 本关小诀窍：' + beat.title));
                copy.appendChild(this.el('div', { fontSize:'12px', color:'#F7F3E8', lineHeight:'1.45' }, beat.text));
                lesson.appendChild(copy);
                card.appendChild(lesson);
            }

            // 星星鼓励（不卡主线进度）
            card.appendChild(this.el('div', { textAlign:'center', fontSize:'13px', color:'#FDE68A', fontWeight:'bold', lineHeight:'1.5' },
                '★★★☆☆☆'.slice(3 - bestStars, 6 - bestStars) + '　拿到 1 颗星就能前进，多拿是额外奖励～'));

            // 按钮（开始永远可点；返回回到该学校）
            const btnRow = this.el('div', { display:'flex', gap:'10px', marginTop:'2px' });
            btnRow.appendChild(this.btn('返回', {
                padding:'12px 18px', borderRadius:'12px', border:'2px solid rgba(247,243,232,0.4)', background:'rgba(0,0,0,0.25)',
                color:'#F7F3E8', fontWeight:'900', fontSize:'15px', fontFamily:'inherit', cursor:'pointer'
            }, () => {
                const wi = WORLDS.findIndex(w => w.nodes.some(n => n.levelIdx === this.prepLevelIdx));
                if (wi >= 0 && this.onOpenWorld) this.onOpenWorld(wi); else if (this.onRestart) this.onRestart();
            }));
            btnRow.appendChild(this.btn('开始上课 ▶', {
                flex:'1', padding:'12px', borderRadius:'12px', border:'2px solid #34d399', background:'#10b981', color:'white',
                fontWeight:'900', fontSize:'18px', fontFamily:'inherit', cursor:'pointer', boxShadow:'0 5px 0 #065f46'
            }, () => { if (this.onConfirmPrep) this.onConfirmPrep(this.prepLevelIdx, pd.mainlineLoadout || Object.keys(TOWERS)); }));
            card.appendChild(btnRow);

            wrap.appendChild(card);
            return wrap;
        }

        renderTowerBar() {
            if (this.phase !== 'td') return null;
            const isL = this.isLandscape;
            // Phase 2.5：道具栏只显示本关 loadout 内的文具
            const ids = (this.activeLoadout && this.activeLoadout.length) ? this.activeLoadout : Object.keys(TOWERS);
            const towerList = Object.values(TOWERS).filter(t => ids.includes(t.id));
            const landscapeButtonSize = isL
                ? Math.max(42, Math.min(54, Math.floor((window.innerHeight - readSafeAreaInset('top') - readSafeAreaInset('bottom') - 160) / Math.max(1, towerList.length))))
                : 80;
            const bar = this.el('div', {
                pointerEvents:'auto',
                position: isL ? 'absolute' : 'absolute',
                ...(isL ? {
                    left:'0', top:'0', bottom:'0', display:'flex', flexDirection:'column',
                    paddingLeft:'env(safe-area-inset-left)', paddingTop:'env(safe-area-inset-top)', paddingBottom:'env(safe-area-inset-bottom)',
                    boxSizing:'border-box', zIndex:'40'
                } : { bottom:'0', left:'0', right:'0', display:'flex', justifyContent:'center' })
            });
            const inner = this.el('div', {
                ...(isL ? {
                    backgroundColor:'#5D4037', borderRight:'4px solid #3E2723', borderTopRightRadius:'1rem', borderBottomRightRadius:'1rem',
                    boxShadow:'4px 0 10px rgba(0,0,0,0.3)', height:'100%', display:'flex', flexDirection:'column',
                    justifyContent:'flex-start', padding:'6px 4px', gap:'3px', width: SIDEBAR_WIDTH_LANDSCAPE + 'px', boxSizing:'border-box',
                    overflowY:'auto', overflowX:'visible'
                } : {
                    backgroundColor:'#5D4037', borderTop:'4px solid #3E2723', padding:'8px 8px', paddingBottom:'calc(20px + env(safe-area-inset-bottom))', borderTopLeftRadius:'24px', borderTopRightRadius:'24px',
                    boxShadow:'0 -4px 20px rgba(0,0,0,0.5)', display:'flex', justifyContent:'center', gap:'8px', overflowX:'auto', flexShrink:'0'
                })
            });

            // Landscape：文具盒标签 + 黑板小卡 HUD（知识星 / 专注值）
            if (isL) {
                const boxLabel = this.el('div', {}, '✏️ 文具盒');
                boxLabel.className = 'pencil-box-label';
                inner.appendChild(boxLabel);
                const stats = this.el('div', { display:'flex', flexDirection:'column', gap:'2px', marginBottom:'4px', padding:'6px', background:'#2F6B4F', border:'1px solid #B9825B', borderRadius:'8px', margin:'0 4px 4px', flexShrink:'0' });
                const mpRow = this.el('div', { display:'flex', alignItems:'center', gap:'6px', color:'#F7F3E8', justifyContent:'center' });
                mpRow.append(this.el('span', { fontSize:'16px' }, '⭐'), this.el('span', { color:'#F6D365', fontWeight:'900', fontSize:'16px' }, String(Math.floor(this.stats.mp))));
                const hpRow = this.el('div', { display:'flex', alignItems:'center', gap:'6px', color:'#F7F3E8', justifyContent:'center', borderTop:'1px solid rgba(247,243,232,0.18)', paddingTop:'2px' });
                const hpColor = this.stats.hp <= 1 ? '#E85D5D' : '#F2A6A6';
                hpRow.append(this.el('span', { fontSize:'16px' }, '❤️'), this.el('span', { color: hpColor, fontWeight:'900', fontSize:'16px', animation: this.stats.hp <= 1 ? 'pulse 2s infinite' : '' }, String(this.stats.hp)));
                stats.append(mpRow, hpRow);
                inner.appendChild(stats);
                if (ids.includes('teacher')) {
                    const pct = Math.round((this.teacherCharge || 0) * 100);
                    const skill = this.el('button', {
                        margin:'0 4px 4px', padding:'5px 4px', borderRadius:'8px', border:'1px solid ' + (this.teacherReady ? '#F6D365' : '#B9825B'),
                        background: this.teacherReady ? '#4A90E2' : '#23463a', color:'#F7F3E8', fontFamily:'inherit',
                        cursor: this.teacherReady ? 'pointer' : 'default', flexShrink:'0', display:'flex', flexDirection:'column', gap:'2px',
                        animation: this.teacherReady ? 'pulse 1.4s infinite' : ''
                    });
                    skill.appendChild(this.el('div', { fontSize:'9px', fontWeight:'900', textAlign:'center', letterSpacing:'1px' }, '👩‍🏫 班主任'));
                    if (this.teacherReady) {
                        skill.appendChild(this.el('div', { fontSize:'10px', fontWeight:'900', textAlign:'center', color:'#F6D365' }, '⚡就绪·点击'));
                    } else {
                        const track = this.el('div', { height:'7px', background:'rgba(0,0,0,0.35)', borderRadius:'999px', overflow:'hidden' });
                        track.appendChild(this.el('div', { height:'100%', width: pct + '%', background:'linear-gradient(90deg,#4A90E2,#F6D365)', borderRadius:'999px', transition:'width 0.2s' }));
                        skill.appendChild(track);
                        skill.appendChild(this.el('div', { fontSize:'9px', textAlign:'center', color:'rgba(247,243,232,0.7)' }, pct + '%'));
                    }
                    if (this.teacherReady) skill.onclick = (e) => { e.stopPropagation(); this.onTeacherSkill && this.onTeacherSkill(); };
                    inner.appendChild(skill);
                }
            }

            towerList.forEach(t => {
                const cooldown = this.stats.cooldowns?.[t.id] || 0;
                const isCooldown = cooldown > 0;
                const canAfford = this.stats.mp >= t.cost;
                const isSelected = this.selectedTower === t.id;
                // 永久升级：道具栏显示升级后的名称与图示 + ✨
                const permUp = (this.toolUpgrades && this.toolUpgrades[t.id]) ? TOOL_UPGRADES[t.id] : null;
                const dispIcon = permUp ? permUp.icon : t.icon;
                const dispName = permUp ? permUp.name : t.name;

                const btnEl = this.el('button', {
                    position:'relative', borderRadius:'12px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                    overflow:'hidden', transition:'all 0.15s', border:'4px solid', fontFamily:'inherit',
                    ...(isL ? { width:'100%', height: landscapeButtonSize + 'px', minHeight:'42px', flex:'0 0 auto', margin:'0' } : { width:'64px', height:'80px', flexShrink:'0' }),
                    backgroundColor: isSelected ? '#F6D365' : (canAfford ? '#F7F3E8' : '#c7b89e'),
                    borderColor: isSelected ? '#E8B84B' : '#8a5638',
                    transform: isSelected ? (isL ? 'translateX(8px) scale(1.05)' : 'translateY(-16px) scale(1.1)') : 'none',
                    boxShadow: isSelected ? '0 8px 24px rgba(0,0,0,0.3)' : 'none',
                    cursor: isCooldown ? 'not-allowed' : 'pointer',
                    opacity: (!canAfford || isCooldown) && !isSelected ? '0.7' : '1'
                });

                // Cost badge
                const badge = this.el('div', {
                    position:'absolute', top:'-4px', right:'-4px', fontSize:'10px', fontWeight:'900',
                    padding:'2px 6px', borderRadius:'999px', border:'1px solid white', zIndex:'5',
                    backgroundColor: canAfford ? '#facc15' : '#ef4444', color: canAfford ? '#713f12' : 'white'
                }, String(t.cost));

                // Icon（升级后换皮 + ✨ 角标）
                const iconEl = this.el('div', { position:'relative', fontSize: isL ? (landscapeButtonSize <= 48 ? '19px' : '22px') : '28px', flex:'1', display:'flex', alignItems:'center', justifyContent:'center' }, dispIcon);
                if (permUp) iconEl.appendChild(this.el('div', { position:'absolute', top:'-2px', left:'-2px', fontSize:'10px' }, '✨'));

                // Name（升级后显示新名）
                const nameEl = this.el('div', {
                    backgroundColor: permUp ? '#cdeafe' : '#efe7d3', color:'#6b4a2f', fontWeight:'bold', borderRadius:'4px', textAlign:'center',
                    fontSize: isL && landscapeButtonSize <= 48 ? '7px' : '8px', padding:'2px', width:'90%', marginBottom:'2px', border:'1px solid ' + (permUp ? '#7cc8f0' : '#c9a06a')
                }, dispName);

                // Cooldown overlay

                    const overlay = this.el('div', { position:'absolute', inset:'0', borderRadius:'12px', backgroundColor:'rgba(0,0,0,0.6)', zIndex:'3', display:'flex', alignItems:'flex-end', justifyContent:'center', overflow:'hidden' });
                    const fill = this.el('div', { position:'absolute', top:'0', left:'0', right:'0', backgroundColor:'rgba(30,41,59,0.5)', transition:'height 0.1s', height: `${(1 - cooldown) * 100}%` });
                    overlay.appendChild(fill);
                    btnEl.appendChild(overlay);
                }

                btnEl.append(badge, iconEl, nameEl);
                btnEl.onclick = (e) => {
                    e.stopPropagation();
                    if (!isCooldown && this.onSelectTower) this.onSelectTower(isSelected ? null : t.id);
                };
                inner.appendChild(btnEl);
            });

            inner.className = 'hide-scrollbar ' + (isL ? 'pencil-box' : 'pencil-box-portrait');
            bar.appendChild(inner);
            return bar;
        }

            const overlay = this.el('div', { position:'absolute', inset:'0', backgroundColor:'rgba(0,0,0,0.6)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'16px', zIndex:'50', pointerEvents:'auto' });

        renderLevelComplete() {
            if (this.phase !== 'level_complete') return null;
            const r = this.levelResult || { stars: 1, tags: [] };
            const overlay = this.el('div', { position:'absolute', inset:'0', backgroundColor:'rgba(15,23,42,0.9)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px', zIndex:'50', pointerEvents:'auto' });

            box.className = 'hide-scrollbar';

            box.appendChild(this.el('h2', { fontSize:'28px', fontWeight:'900', color:'#10b981', marginBottom:'4px' },
                r.isLastCampaign ? '🎓 全部通关！' : (r.isChallenge ? '⚡ 挑战完成！' : '章节完成！')));

            // 星级
            const starRow = this.el('div', { display:'flex', justifyContent:'center', gap:'10px', margin:'10px 0 4px' });
            for (let i = 0; i < 3; i++) {
                const earned = i < (r.stars || 0);
                starRow.appendChild(this.el('div', { fontSize:'42px', color: earned ? '#F6C945' : '#e2e8f0', animation: earned ? 'bounce 1s infinite' : '', filter: earned ? 'drop-shadow(0 2px 4px rgba(246,201,69,0.5))' : 'none' }, earned ? '★' : '☆'));
            }

            if (r.isNewBest) box.appendChild(this.el('div', { color:'#f59e0b', fontWeight:'900', fontSize:'14px', marginBottom:'2px' }, '🎉 新纪录！'));

            // 表现标签
            if (r.tags && r.tags.length) {
                const tagRow = this.el('div', { display:'flex', justifyContent:'center', gap:'8px', flexWrap:'wrap', margin:'6px 0' });
                r.tags.forEach(tg => tagRow.appendChild(this.el('span', { fontSize:'12px', fontWeight:'900', color:'#3730a3', background:'#e0e7ff', borderRadius:'999px', padding:'3px 12px' }, tg)));
                box.appendChild(tagRow);
            }
            box.appendChild(this.el('div', { color:'#64748b', fontSize:'14px', margin:'6px 0 4px' },
                '剩余生命 ❤️' + (r.hp != null ? r.hp : '-') + '　答错 ' + (r.wrong != null ? r.wrong : '-')));
            if (r.reward && r.reward.text) box.appendChild(this.el('div', { color:'#0f766e', fontWeight:'900', fontSize:'14px', marginBottom:'4px' }, '🎁 ' + r.reward.text));

            if (r.shardsEarned) box.appendChild(this.el('div', { color:'#0ea5e9', fontWeight:'900', fontSize:'14px', marginBottom:'4px' }, '💎 +' + r.shardsEarned + ' 知识碎片（共 ' + (r.shardsTotal != null ? r.shardsTotal : '-') + '）·到装备工坊升级文具！'));
            if (r.gotWorldBadge) box.appendChild(this.el('div', { color:'#b45309', fontWeight:'900', fontSize:'14px', marginBottom:'4px' }, '🏆 解锁世界徽章：' + r.gotWorldBadge + '！'));

            // Phase C：今天我学会了（学科分类统计）
            const SUBJ_META = { '数学':'➗ 数学', '语文':'📖 语文', '英语':'🔤 英语', '科学':'🔬 科学', '常识':'💡 常识' };
            const subj = r.subjectsLearned || {};
            const subjKeys = Object.keys(subj).filter(k => subj[k] > 0);
            if (subjKeys.length) {
                const lbox = this.el('div', { background:'#ecfdf5', border:'1px solid #a7f3d0', borderRadius:'14px', padding:'10px 12px', margin:'8px 0' });
                lbox.appendChild(this.el('div', { color:'#047857', fontWeight:'900', fontSize:'14px', marginBottom:'6px' }, '📚 今天我学会了'));
                const chips = this.el('div', { display:'flex', flexWrap:'wrap', gap:'6px', justifyContent:'center' });
                subjKeys.forEach(k => chips.appendChild(this.el('span', { fontSize:'13px', fontWeight:'900', color:'#065f46', background:'#d1fae5', borderRadius:'999px', padding:'3px 12px' }, (SUBJ_META[k] || ('💡 ' + k)) + ' ×' + subj[k])));
                lbox.appendChild(chips);
                box.appendChild(lbox);
            }

            // Phase C：本关错题回顾卡（仅本关、不存档；教学语气、不惩罚）
            const wrongs = r.wrongList || [];
            if (wrongs.length) {
                const wbox = this.el('div', { background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:'14px', padding:'10px 12px', margin:'4px 0 8px', textAlign:'left' });
                wbox.appendChild(this.el('div', { color:'#c2410c', fontWeight:'900', fontSize:'14px', marginBottom:'6px', textAlign:'center' }, '📝 这些题再看一眼就懂啦'));
                wrongs.forEach(w => {
                    const card = this.el('div', { background:'white', border:'1px solid #fde68a', borderRadius:'10px', padding:'8px 10px', marginBottom:'6px' });
                    card.appendChild(this.el('div', { color:'#1c1917', fontWeight:'900', fontSize:'13px', lineHeight:'1.4' }, '❓ ' + w.q));
                    card.appendChild(this.el('div', { color:'#047857', fontWeight:'900', fontSize:'13px', marginTop:'2px' }, '✅ 正解：' + w.ans));
                    if (w.exp) card.appendChild(this.el('div', { color:'#78716c', fontSize:'12px', marginTop:'2px', lineHeight:'1.5' }, '💡 ' + w.exp));
                    wbox.appendChild(card);
                });
                box.appendChild(wbox);
            }

            // 按钮
            const btnRow = this.el('div', { display:'flex', gap:'10px', marginTop:'14px' });
            const retryBtn = this.btn('🔄 重玩', {
                padding:'13px 16px', borderRadius:'14px', backgroundColor:'#fbbf24', color:'#7c2d12', fontWeight:'900', fontSize:'16px',
                border:'2px solid #f59e0b', boxShadow:'0 5px 0 #b45309', cursor:'pointer', fontFamily:'inherit'
            }, () => { const idx = LEVELS.findIndex(l => l.name === this.stats.levelName); if (idx >= 0 && this.onOpenPrep) this.onOpenPrep(idx); });
            btnRow.appendChild(retryBtn);
            if (r.isChallenge || r.isLastCampaign) {
                btnRow.appendChild(this.btn('🏠 返回选单', {
                    flex:'1', padding:'13px', borderRadius:'14px', backgroundColor:'#10b981', color:'white', fontWeight:'900', fontSize:'17px',
                    border:'2px solid #34d399', boxShadow:'0 5px 0 #065f46', cursor:'pointer', fontFamily:'inherit'
                }, () => this.onRestart && this.onRestart()));
            } else {
                btnRow.appendChild(this.btn('下一章 ➤', {
                    flex:'1', padding:'13px', borderRadius:'14px', backgroundColor:'#10b981', color:'white', fontWeight:'900', fontSize:'17px',
                    border:'2px solid #34d399', boxShadow:'0 5px 0 #065f46', cursor:'pointer', fontFamily:'inherit'
                }, () => {
                    const cur = LEVELS.findIndex(l => l.name === this.stats.levelName);
                    const next = (cur !== -1 ? cur : 0) + 1;
                    if (next < CAMPAIGN_COUNT && this.onOpenPrep) this.onOpenPrep(next);
                }));
            }
            box.appendChild(btnRow);
            overlay.appendChild(box);
            return overlay;
        }

        renderGameOver() {
            if (this.phase !== 'over' || !this.gameOverData) return null;
            const { win, title, msg } = this.gameOverData;
            const overlay = this.el('div', { position:'absolute', inset:'0', backgroundColor:'rgba(15,23,42,0.9)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px', zIndex:'50', pointerEvents:'auto' });
            const box = this.el('div', { backgroundColor:'white', borderRadius:'24px', padding:'32px', maxWidth:'380px', width:'100%', textAlign:'center', borderBottom:'8px solid #e2e8f0', boxShadow:'0 20px 60px rgba(0,0,0,0.4)' });
            const restartBtn = this.btn('返回标题画面', {
                width:'100%', padding:'16px', borderRadius:'16px', backgroundColor:'#6366f1', color:'white', fontWeight:'900', fontSize:'20px',
                boxShadow:'0 6px 0 #3730a3', border:'2px solid #818cf8', cursor:'pointer', transition:'all 0.15s', fontFamily:'inherit'
            }, () => this.onRestart && this.onRestart());
            const msgEl = this.el('div', { backgroundColor:'#f8fafc', padding:'16px', borderRadius:'12px', border:'1px solid #f1f5f9', marginBottom:'32px', color:'#64748b', fontSize:'18px', lineHeight:'1.6' }, msg);
            box.append(this.el('div', { fontSize:'80px', marginBottom:'24px', animation:'bounce 1s infinite' }, win ? '🏆' : '🥀'), this.el('h2', { fontSize:'36px', fontWeight:'900', color: win ? '#f59e0b' : '#334155', marginBottom:'8px' }, title), msgEl, restartBtn);
            overlay.appendChild(box);
            return overlay;
        }

        render() {
            this.root.innerHTML = '';
            this.root.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10;';

            if (this.phase === 'menu') {
                const menu = this.renderMenu();
                if (menu) this.root.appendChild(menu);
                return;
            }

            if (this.phase === 'world') {
                const w = this.renderWorld();
                if (w) this.root.appendChild(w);
                return;
            }

            if (this.phase === 'collection') {
                const c = this.renderCollection();
                if (c) this.root.appendChild(c);
                return;
            }

            if (this.phase === 'workshop') {
                const wk = this.renderWorkshop();
                if (wk) this.root.appendChild(wk);
                return;
            }

            if (this.phase === 'prep') {
                const prep = this.renderPrep();
                if (prep) this.root.appendChild(prep);
                return;
            }

            const loading = this.renderLoading();
            if (loading) this.root.appendChild(loading);

            const hud = this.renderHUD();
            if (hud) this.root.appendChild(hud);

            const lInfo = this.renderLandscapeInfo();
            if (lInfo) this.root.appendChild(lInfo);

            const towerBar = this.renderTowerBar();
            if (towerBar) this.root.appendChild(towerBar);

            const towerInfo = this.renderTowerInfo();
            if (towerInfo) this.root.appendChild(towerInfo);

            const fieldInfo = this.renderFieldInfo();
            if (fieldInfo) this.root.appendChild(fieldInfo);

            const earlyCall = this.renderEarlyCall();
            if (earlyCall) this.root.appendChild(earlyCall);

            const waveIntro = this.renderWaveIntro();
            if (waveIntro) this.root.appendChild(waveIntro);

            const mazeHint = this.renderMazeHint();
            if (mazeHint) this.root.appendChild(mazeHint);

            const expl = this.renderExplanation();
            if (expl) this.root.appendChild(expl);

            const quiz = this.renderQuiz();
            if (quiz) this.root.appendChild(quiz);

            const rewardPicker = this.renderRewardPicker();
            if (rewardPicker) this.root.appendChild(rewardPicker);

            const combatToast = this.renderCombatToast();
            if (combatToast) this.root.appendChild(combatToast);

            const lc = this.renderLevelComplete();
            if (lc) this.root.appendChild(lc);

            const go = this.renderGameOver();
            if (go) this.root.appendChild(go);

            const orientationGate = this.renderOrientationGate();
            if (orientationGate) this.root.appendChild(orientationGate);
        }
    }

    // ==================== MAIN APP ====================
    const canvas = document.getElementById('gameCanvas');
    const ui = new UIManager();

    let selectedTower = null;
    let stats = { mp: 0, hp: 0, wave: 0, levelName: '', cooldowns: {} };
    let phase = 'menu';
    let quizData = null;
    let explanationData = null;
    let gameOverData = null;
    let waveIntro = null;
    let waveIntroTimeout = null;
    let rewardCards = null;
    let combatToast = null;
    let combatToastTimeout = null;
    let isLoading = false;
    let unlockedLevel = loadGameSave().unlockedLevel || 0;
    let isLandscape = window.innerWidth > window.innerHeight;
    // ----- Phase B 世界地图 / Phase A 友善化 状态 -----
    let worldIdx = 0;
    const advancedMode = false; // 主线小学生模式：研究所进阶系统本版不开放
    let stickers = loadGameSave().stickers || {};
    let badges = loadGameSave().badges || {};
    let shards = loadGameSave().shards || 0;
    let toolUpgrades = loadGameSave().toolUpgrades || {};
    // ----- Phase 2.5 状态 -----
    let activeLoadout = Object.keys(TOWERS);
    let prepData = null;
    let prepLevelIdx = 0;
    let teacherCharge = 0, teacherReady = false, waitWave = false;
    let fieldSel = null;
    // ----- Phase 4 状态 -----
    let results = loadGameSave().results || {};
    let levelResult = null;

    const callbacks = {
        onStatsUpdate: (mp, hp, wave, lvlName, progress, cooldowns) => {
            stats = { mp, hp, wave, levelName: lvlName, waveProgress: progress, cooldowns };
            ui.update({ stats });
        },
        onPhaseChange: (p) => {
            phase = p;
            if (p !== 'td') { selectedTower = null; engine.setSelectedTower(null); }
            ui.update({ phase, selectedTower });
        },
        onQuizOpen: (q, a, isRescue, canSOS, canHint, isCombat) => {
            quizData = { q, a, hint: false, isRescue, canSOS, canHint, isCombat };
            ui.update({ quizData });
        },
        onExplanation: (data) => {
            explanationData = data;
            ui.update({ explanationData });
        },
        onGameOver: (win, title, msg) => {
            gameOverData = { win, title, msg };
            ui.update({ gameOverData });
        },
        onLoading: (l) => {
            isLoading = l;
            ui.update({ isLoading });
        },
        onSelectTower: (t) => {
            selectedTower = t;
            ui.update({ selectedTower });
        },
        onLevelComplete: (completedLevelIdx, result) => {
            if (result && !result.isChallenge) unlockedLevel = Math.max(unlockedLevel, Math.min(CAMPAIGN_COUNT - 1, completedLevelIdx + 1));
            const fresh = loadGameSave(); // 引擎已写盘，同步最新星级 + 收集 + 碎片
            results = fresh.results || results;
            stickers = fresh.stickers || stickers;
            badges = fresh.badges || badges;
            shards = fresh.shards || 0; toolUpgrades = fresh.toolUpgrades || toolUpgrades;
            levelResult = result || null;
            ui.update({ unlockedLevel, results, stickers, badges, shards, toolUpgrades, levelResult });
        },
        onWaveIntro: (info) => {
            waveIntro = info;
            ui.update({ waveIntro });
            if (waveIntroTimeout) clearTimeout(waveIntroTimeout);
            const dur = (info && info.showTip) ? 5200 : 3600; // 含关卡提示的首波多停一会
            waveIntroTimeout = setTimeout(() => { waveIntro = null; ui.update({ waveIntro }); }, dur);
        },
        onRewardPicker: (cards) => {
            quizData = null; // 关闭答题弹窗，弹出三选一奖励
            rewardCards = cards;
            ui.update({ quizData, rewardCards });
        },
        onToast: (text) => {
            combatToast = text;
            ui.update({ combatToast });
            if (combatToastTimeout) clearTimeout(combatToastTimeout);
            combatToastTimeout = setTimeout(() => { combatToast = null; ui.update({ combatToast }); }, 3200);
        },
        onCombatState: (s) => {
            teacherCharge = s.teacherCharge; teacherReady = s.teacherReady; waitWave = s.waitWave;
            ui.update({ teacherCharge, teacherReady, waitWave });
        },
        onFieldSelect: (info) => {
            fieldSel = info;
            ui.update({ fieldSel });
        }
    };

    const engine = new GameEngine(callbacks);
    engine.mount(canvas);
    ASSETS.load(); // 异步预加载 SVG 精灵，加载完成后绘制自动切换（缺图回退旧画法）

    // Wire UI events
    ui.onSelectTower = (t) => {
        selectedTower = t;
        engine.setSelectedTower(t);
        ui.update({ selectedTower });
    };
    // Phase B：点世界 → 展开该学校的关卡节点
    ui.onOpenWorld = (wi) => {
        worldIdx = wi;
        phase = 'world';
        ui.update({ phase, worldIdx });
    };
    // Phase C：打开收藏馆（读最新存档，含战斗中收集到的敌人贴纸）
    ui.onOpenCollection = () => {
        const fresh = loadGameSave();
        stickers = fresh.stickers || stickers; badges = fresh.badges || badges;
        phase = 'collection';
        ui.update({ phase, stickers, badges });
    };
    // 装备工坊：打开（读最新碎片/升级）
    ui.onOpenWorkshop = () => {
        const fresh = loadGameSave();
        shards = fresh.shards || 0; toolUpgrades = fresh.toolUpgrades || {};
        phase = 'workshop';
        ui.update({ phase, shards, toolUpgrades });
    };
    // 装备工坊：花碎片升级某文具（永久）
    ui.onUpgradeTool = (toolId) => {
        const up = TOOL_UPGRADES[toolId]; if (!up) return;
        const save = loadGameSave();
        if (!save.toolUpgrades) save.toolUpgrades = {};
        if (save.toolUpgrades[toolId]) return;          // 已升级
        if ((save.shards || 0) < up.cost) return;       // 碎片不足
        save.shards -= up.cost;
        save.toolUpgrades[toolId] = true;
        writeGameSave(save);
        engine.save = save;                              // 同步引擎，下一关即生效
        shards = save.shards; toolUpgrades = save.toolUpgrades;
        ui.update({ shards, toolUpgrades });            // 仍在 workshop，刷新即可
    };
    // Phase A：进入关卡友善 intro（不需选 loadout，开战给全部文具）
    ui.onOpenPrep = (idx) => {
        prepData = engine.getLevelPreview(idx);
        prepLevelIdx = idx;
        phase = 'prep';
        ui.update({ phase, prepData, prepLevelIdx });
    };
    // intro 完成 → 进入战斗（主线一律全配文具，最低选择负担）
    ui.onConfirmPrep = (idx, loadout) => {
        requestLandscapeMode();
        activeLoadout = (loadout && loadout.length) ? loadout.slice() : Object.keys(TOWERS);
        const fresh = loadGameSave(); toolUpgrades = fresh.toolUpgrades || {}; // 道具栏显示升级后外观
        gameOverData = null;
        ui.update({ activeLoadout, toolUpgrades, gameOverData });
        engine.startLevel(idx, activeLoadout);
    };
    // 兼容旧入口（直接开始指定关）
    ui.onStartLevel = (idx) => {
        requestLandscapeMode();
        engine.startLevel(idx, activeLoadout);
        gameOverData = null;
        ui.update({ gameOverData });
    };
    // Phase 2.5：提前上课 / 班主任技能 / 关卡内升级
    ui.onEarlyCall = () => engine.callNextWaveEarly();
    ui.onTeacherSkill = () => engine.releaseTeacherSkill();
    ui.onUpgrade = () => engine.upgradeSelectedField();
    ui.onRestart = () => {
        // 回主选单：重新同步存档（含战斗中/失败关收集到的贴纸、最新解锁与星级）
        const fresh = loadGameSave();
        unlockedLevel = Math.max(unlockedLevel, fresh.unlockedLevel || 0);
        results = fresh.results || results; stickers = fresh.stickers || stickers; badges = fresh.badges || badges;
        shards = fresh.shards || 0; toolUpgrades = fresh.toolUpgrades || toolUpgrades;
        phase = 'menu';
        gameOverData = null;
        ui.update({ phase, gameOverData, unlockedLevel, results, stickers, badges, shards, toolUpgrades });
    };
    ui.onQuizAnswer = (ok) => {
        quizData = null;
        ui.update({ quizData });
        engine.resolveQuiz(ok);
    };
    ui.onHint = () => {
        if (engine.useHint()) {
            quizData = { ...quizData, hint: true };
            ui.update({ quizData });
            setTimeout(() => {
                quizData = null;
                ui.update({ quizData });
                engine.resolveQuiz(true);
            }, 2000);
        }
    };
    ui.onSOS = () => { engine.triggerSOS(); };
    ui.onRewardPick = (id) => {
        rewardCards = null;
        ui.update({ rewardCards });
        engine.applyReward(id);
    };
    ui.onExplanationDismiss = () => {
        explanationData = null;
        ui.update({ explanationData });
        engine.proceedToFollowUp();
    };

    // 启动时把存档进度（解锁关卡 + 星级 + 收集）推到选单，确保返回玩家正确显示
    ui.update({ unlockedLevel, results, stickers, badges, shards, toolUpgrades, advancedMode });

    // Input handling
    function handleInput(type, x, y) {
        engine.handleInput(type, x, y);
    }

    canvas.addEventListener('mousedown', e => handleInput('start', e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => handleInput('move', e.clientX, e.clientY));
    canvas.addEventListener('mouseup', e => handleInput('end', e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput('start', e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput('move', e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); handleInput('end', e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });

    // Resize handling
    window.addEventListener('resize', () => {
        isLandscape = window.innerWidth > window.innerHeight;
        ui.update({ isLandscape });
    });
    </script>
</body>
</html>
