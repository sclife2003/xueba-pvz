<!DOCTYPE html>

<head>

    <title>学霸异世界：PvZ特别版 (Beta)</title>
    
    <style>
      @import url('data:text/css,');
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #202020;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        font-family: "Fredoka", "Microsoft YaHei", sans-serif;
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      @keyframes highlight {
        0% { transform: scale(1); background-color: #fff; }
        50% { transform: scale(1.05); background-color: #bbf7d0; border-color: #22c55e; }
        100% { transform: scale(1); background-color: #dcfce7; border-color: #22c55e; }
      }
      .answer-correct { animation: highlight 0.5s forwards; }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .bounce { animation: bounce 1s infinite; }
      .pulse { animation: pulse 2s infinite; }
      .spin { animation: spin 1s linear infinite; }

      .chalkboard {
        background-color: #2c3e50;
        background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        color: #ecf0f1;
        font-family: 'Courier New', Courier, monospace;
        border: 8px solid #8d6e63;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      }
      .landscape-tower-bar {
        background-color: #5D4037;
        border-right: 4px solid #3E2723;
        border-top-right-radius: 1rem;
        border-bottom-right-radius: 1rem;
        box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        z-index: 40;
      }
      #ui-root {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      /* Scrollbar hide */
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      button { cursor: pointer; font-family: inherit; }
      button:disabled { cursor: not-allowed; }

      /* ===== 校园主题视觉 (Phase 1 first-pass) — palette: chalkboard #2F6B4F / book yellow #F6D365 / school blue #4A90E2 / red pen #E85D5D / chalk #F7F3E8 / desk brown #B9825B ===== */
      .pencil-box {
        background: linear-gradient(180deg, #8b5a3c 0%, #6e422b 54%, #3f2418 100%) !important;
        border-right: 5px solid #2b170f !important;
        box-shadow: inset 0 5px 0 rgba(255,233,194,0.18), inset -8px 0 14px rgba(0,0,0,0.18), 5px 0 18px rgba(0,0,0,0.42) !important;

      .pencil-box-portrait {
        background: linear-gradient(180deg, #8b5a3c 0%, #6e422b 54%, #3f2418 100%) !important;
        border-top: 5px solid #2b170f !important;
        box-shadow: inset 0 5px 0 rgba(255,233,194,0.18), 0 -4px 18px rgba(0,0,0,0.4) !important;

      .pencil-box-label {

      .chalk-card {
        background: #2F6B4F !important; color: #F7F3E8 !important;

    function readSafeAreaInset(side) {
        if (!document.body) return 0;
        const probe = document.createElement('div');
        probe.style.cssText = `position:absolute;visibility:hidden;pointer-events:none;padding-${side}:env(safe-area-inset-${side});`;
        document.body.appendChild(probe);
        const px = parseFloat(getComputedStyle(probe).getPropertyValue(`padding-${side}`)) || 0;
        probe.remove();
        return px;
    }

    const SAVE_KEY = 'xueba_pvz_save_v1';
    const SAVE_SCHEMA_VERSION = 2;
    function emptySave() {
        return { schemaVersion: SAVE_SCHEMA_VERSION, unlockedLevel: 0, hp: 0, results: {}, stickers: {}, badges: {}, worldProgress: {}, shards: 0, toolUpgrades: {} };
    }
    // 把任意（可能是舊 v1）存檔物件補齊成最新 schema，舊進度完整保留（向後相容）
    function migrateSave(d) {
        const base = emptySave();
        if (!d || typeof d !== 'object') return base;
        base.unlockedLevel = d.unlockedLevel || 0;
        base.hp = d.hp || 0;
        base.results = (d.results && typeof d.results === 'object') ? d.results : {};
        base.stickers = (d.stickers && typeof d.stickers === 'object') ? d.stickers : {};      // v2+；舊檔缺則空

        base.schemaVersion = SAVE_SCHEMA_VERSION;
        return reconcileUnlockedLevelFromResults(base);

    function reconcileUnlockedLevelFromResults(save) {

            LEVELS.slice(0, CAMPAIGN_COUNT).forEach((lvl, idx) => {
                const r = save.results[lvl.id];
                if (r && (parseInt(r.stars) || 0) > 0) unlocked = Math.max(unlocked, Math.min(CAMPAIGN_COUNT - 1, idx + 1));
            });
        }
        save.unlockedLevel = unlocked;
        return save;
    }

    function defaultHpForLevel(idx) {

    // UTF-8 安全的 base64：直接 btoa 遇到 CJK/emoji 会丢 InvalidCharacterError；ASCII 内容下与旧码完全相容
    function b64encodeUtf8(str) { return btoa(unescape(encodeURIComponent(str))); }
    function b64decodeUtf8(b64) { return decodeURIComponent(escape(atob(b64))); }
    function exportSave() {
        const code = 'XBPVZ1:' + b64encodeUtf8(JSON.stringify(loadGameSave()));

    // 收集欄位白名單清洗：只收 boolean/number/短字串/物件存在標記，限量防爆，避免惡意存檔碼
    function sanitizeCollection(obj) {
        const out = {};
        if (obj && typeof obj === 'object') {
            let n = 0;
            for (const k in obj) {
                if (n++ >= 300) break;
                const key = String(k).slice(0, 48);
                const v = obj[k];
                if (typeof v === 'boolean' || typeof v === 'number') out[key] = v;
                else if (typeof v === 'string') out[key] = v.slice(0, 80);
                else if (v && typeof v === 'object') out[key] = true; // 收藏「已擁有」即可
            }
        }
        return out;
    }
    function importSave() {
        const raw = window.prompt('请贴上存档码：', '');

            const data = JSON.parse(b64decodeUtf8(raw.trim().replace(/^XBPVZ1:/, '')));

            if (data.results && typeof data.results === 'object') {
                for (const k in data.results) {
                    const r = data.results[k] || {};
                    cleanResults[k] = {
                        stars: Math.max(0, Math.min(3, parseInt(r.stars) || 0)),
                        bestHp: Math.max(0, Math.min(HP_CAP, parseInt(r.bestHp) || 0)),
                        bestWrong: Math.max(0, parseInt(r.bestWrong) || 0)

            // 白名單重建：v2 新增欄位必須在此明確複製，否則 export -> import 會悄悄丟失小朋友的收集進度
            const clean = {
                schemaVersion: SAVE_SCHEMA_VERSION,
                unlockedLevel: Math.max(0, Math.min(CAMPAIGN_COUNT - 1, parseInt(data.unlockedLevel) || 0)),
                hp: Math.max(0, Math.min(HP_CAP, parseInt(data.hp) || 0)),
                results: cleanResults,
                stickers: sanitizeCollection(data.stickers),
                badges: sanitizeCollection(data.badges),
                worldProgress: sanitizeCollection(data.worldProgress),
                shards: Math.max(0, Math.min(999999, parseInt(data.shards) || 0)),
                toolUpgrades: sanitizeCollection(data.toolUpgrades)

    // ==================== MAZE GENERATOR ====================
    function generateMaze(width, height) {
        width = width % 2 === 0 ? width + 1 : width;
        height = height % 2 === 0 ? height + 1 : height;
        const map = Array(height).fill(null).map(() => Array(width).fill(1));
        function carve(cx, cy) {
            const dirs = [{ x: 0, y: -2 }, { x: 0, y: 2 }, { x: -2, y: 0 }, { x: 2, y: 0 }].sort(() => Math.random() - 0.5);
            for (const d of dirs) {
                const nx = cx + d.x, ny = cy + d.y;
                if (nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && map[ny][nx] === 1) {
                    map[cy + d.y/2][cx + d.x/2] = 0;
                    map[ny][nx] = 0;
                    carve(nx, ny);
                }
            }
        }
        map[1][1] = 0; carve(1, 1);
        const emptySpots = [];
        for(let y=1; y<height-1; y++) {
            for(let x=1; x<width-1; x++) {
                if(map[y][x] === 0 && !(x===1 && y===1)) {
                    const dist = Math.abs(x - 1) + Math.abs(y - 1);
                    emptySpots.push({x, y, dist});
                }
            }
        }
        if (emptySpots.length > 0) {
            emptySpots.sort((a, b) => b.dist - a.dist);
            const topN = Math.max(1, Math.floor(emptySpots.length * 0.1));
            const exit = emptySpots[Math.floor(Math.random() * topN)];
            map[exit.y][exit.x] = 5;
        }
        return map;
    }
