            });
            wrap.className = 'hide-scrollbar';
            const inner = this.el('div', { width:'100%', maxWidth:'520px', margin:'auto', display:'flex', flexDirection:'column', gap:'12px' });

            // 收集总进度
            let total = 0, got = 0;
            const tally = (have) => { total++; if (have) got++; };
            const campaign = []; for (let i = 0; i < CAMPAIGN_COUNT; i++) campaign.push(i);
            const enemyIds = Object.keys(ENEMIES).filter(id => id !== 'elf'); // 排除友方知识精灵
            const rewardBadgeLevels = LEVELS.filter(l => l.reward && l.reward.type === 'badge');
            campaign.forEach(i => tally(!!stickers[LEVELS[i].id]));
            enemyIds.forEach(id => tally(!!stickers['enemy:' + id]));
            rewardBadgeLevels.forEach(l => tally(!!badges[l.id]));
            WORLDS.filter(w => !w.locked).forEach(w => tally(!!badges['world:' + w.id]));

            const head = this.el('div', { display:'flex', alignItems:'center', gap:'12px' });
            head.appendChild(this.btn('‹ 返回地图', {
                padding:'8px 14px', borderRadius:'999px', border:'2px solid rgba(255,255,255,0.35)', background:'rgba(0,0,0,0.25)',
                color:'white', fontWeight:'900', fontSize:'14px', fontFamily:'inherit', cursor:'pointer', flexShrink:'0'
            }, () => this.onRestart && this.onRestart()));
            const ht = this.el('div', { display:'flex', flexDirection:'column' });
            ht.append(
                this.el('div', { color:'white', fontWeight:'900', fontSize:'24px' }, '🏅 我的收藏馆'),
                this.el('div', { color:'#fde68a', fontSize:'13px', fontWeight:'900' }, '已收集 ' + got + ' / ' + total)
            );
            head.appendChild(ht);
            inner.appendChild(head);

            // 通用区块工厂：items = [{have, label, color}]
            const badgeLabel = (text, fallback) => String(text || fallback || '').replace(/^[^\w\u4e00-\u9fff]+[\s\u00a0]*/u, '').trim();
            function levelStickerAsset(level) {
                const id = level && level.signatureEnemy;
                return id && SPRITE_MANIFEST['enemy_' + id] ? 'enemy_' + id : null;
            }
            const collectionRarity = (it) => {
                if (it.frameKind === 'badge') return it.worldBadge ? '世界' : '徽章';
                if (it.role === 'boss') return 'BOSS';
                if (it.role === 'support' || it.role === 'tank') return '稀有';
                if (it.kind === 'level') return '关卡';
                return '贴纸';
            };
            const artIcon = (it) => {
                const box = this.el('div', {});
                box.className = 'collection-art ' + (it.frameKind === 'badge' ? 'collection-art--badge' : 'collection-art--sticker');
                const img = it.asset && ASSETS.get(it.asset);
                if (img) {
                    const el = document.createElement('img');
                    el.src = img.src;
                    Object.assign(el.style, {
                        filter: it.have ? 'drop-shadow(0 5px 8px rgba(0,0,0,0.42))' : 'grayscale(1) brightness(0.58) contrast(0.9)',
                        opacity: it.have ? '1' : '0.42'
                    });
                    box.appendChild(el);
                } else {
                    box.appendChild(this.el('div', {
                        width:'48px', height:'48px', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center',
                        fontSize:'26px', background: it.have ? (it.color || '#F6D365') : 'rgba(255,255,255,0.14)',
                        filter: it.have ? 'drop-shadow(0 4px 7px rgba(0,0,0,0.35))' : 'grayscale(1)'
                    }, it.have ? (it.emoji || '★') : '?'));
                }
                return box;
            };
            const section = (title, items) => {
                const sec = this.el('div', {});
                sec.className = 'collection-section';
                sec.appendChild(this.el('div', { color:'#fde68a', fontWeight:'900', fontSize:'16px', margin:'2px 0 9px', textShadow:'0 2px 5px rgba(0,0,0,0.28)' }, title));
                const grid = this.el('div', {});
                grid.className = 'collection-grid';
                items.forEach(it => {
                    const card = this.el('div', {});
                    card.className = 'collection-card ' + (it.have ? 'collection-card--owned' : 'collection-card--locked');
                    const rarity = this.el('div', {}, collectionRarity(it));
                    rarity.className = 'collection-rarity';
                    const state = this.el('div', {}, it.have ? '✓' : '?');
                    state.className = it.have ? 'collection-owned-mark' : 'collection-lock';
                    const label = this.el('div', {}, it.have ? it.label : '未收集');
                    label.className = 'collection-label';
                    card.append(rarity, artIcon(it), state, label);
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                return sec;
            };

            inner.appendChild(section('🎒 关卡贴纸', campaign.map(i => {
                const level = LEVELS[i];
                return { have: !!stickers[level.id], label: friendlyLevelName(level), color:'#4A90E2', asset: levelStickerAsset(level), emoji:'🎒', kind:'level', frameKind: 'sticker' };
            })));
            inner.appendChild(section('👾 敌人贴纸', enemyIds.map(id => ({ have: !!stickers['enemy:' + id], label: ENEMIES[id].name, color: ENEMIES[id].color, asset: 'enemy_' + id, role: ENEMIES[id].role, emoji:'👾', kind:'enemy', frameKind: 'sticker' }))));
            inner.appendChild(section('🏅 成就徽章', rewardBadgeLevels.map(l => ({ have: !!badges[l.id], label: badgeLabel(l.reward && l.reward.text, friendlyLevelName(l)), color:'#F6D365', asset: BADGE_ART[l.id], emoji:'🏅', frameKind: 'badge' }))));
            inner.appendChild(section('🏆 世界徽章', WORLDS.filter(w => !w.locked).map(w => ({ have: !!badges['world:' + w.id], label: w.name, color: w.color, asset: BADGE_ART['world:' + w.id], emoji: w.icon, frameKind: 'badge', worldBadge:true }))));

            inner.appendChild(this.el('div', { color:'rgba(255,255,255,0.6)', fontSize:'12px', textAlign:'center', marginTop:'2px' }, '通关、遇到新朋友、完成整座学校，就能收集更多贴纸喔！'));
            wrap.appendChild(inner);
            return wrap;
        }

        // ----- 装备工坊：用知识碎片把文具永久升级（纯加成、不卡进度） -----
        renderWorkshop() {
            if (this.phase !== 'workshop') return null;
            const shards = this.shards || 0;
            const levels = normalizeToolLevels(this.toolLevels, this.toolUpgrades);
            const wrap = this.el('div', {
                position:'absolute', inset:'0', zIndex:'56', overflowY:'auto', overflowX:'hidden', pointerEvents:'auto',
                background:'linear-gradient(135deg, #0c4a6e 0%, #1e3a8a 50%, #1e293b 100%)',
                display:'flex', justifyContent:'center', boxSizing:'border-box',
                padding:'calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))'
            });
            wrap.className = 'hide-scrollbar';
            const inner = this.el('div', { width:'100%', maxWidth:'520px', margin:'auto', display:'flex', flexDirection:'column', gap:'12px' });

            const head = this.el('div', { display:'flex', alignItems:'center', gap:'12px' });
            head.appendChild(this.btn('‹ 返回地图', {
                padding:'8px 14px', borderRadius:'999px', border:'2px solid rgba(255,255,255,0.35)', background:'rgba(0,0,0,0.25)',
                color:'white', fontWeight:'900', fontSize:'14px', fontFamily:'inherit', cursor:'pointer', flexShrink:'0'
            }, () => this.onRestart && this.onRestart()));
            const ht = this.el('div', { display:'flex', flexDirection:'column' });
            ht.append(
                this.el('div', { color:'white', fontWeight:'900', fontSize:'24px' }, '🔧 装备工坊'),
                this.el('div', { color:'#bae6fd', fontSize:'14px', fontWeight:'900' }, '知识碎片 💎 ' + shards + '（答题、通关都会获得）')
            );
            head.appendChild(ht);
            inner.appendChild(head);

            Object.values(TOWERS).forEach(t => {
                const level = getToolLevelFromMap(levels, t.id);
                const curMeta = getToolLevelMeta(t.id, level);
                const nextMeta = getNextToolLevelMeta(t.id, level);
                if (!curMeta) return;
                const done = level >= MAX_TOOL_LEVEL;
                const afford = !!nextMeta && shards >= nextMeta.cost;
                const card = this.el('div', {
                    display:'flex', alignItems:'center', gap:'12px', padding:'12px', borderRadius:'16px',
                    border:'2px solid ' + (done ? '#34d399' : '#334155'), background:'rgba(255,255,255,0.06)'
                });
                // 当前等级 -> 下一等级图示
                const icons = this.el('div', { display:'flex', alignItems:'center', gap:'6px', flexShrink:'0' });
                const assetBox = (assetId, fallback, size, bg, border) => {
                    const box = this.el('div', { width:size + 'px', height:size + 'px', borderRadius:'10px', background:bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:Math.round(size * 0.55) + 'px', border:border || 'none', overflow:'hidden' });
                    const imgAsset = ASSETS.get(assetId);
                    if (imgAsset) {
                        const img = document.createElement('img');
                        img.src = imgAsset.src;
                        Object.assign(img.style, { width:Math.round(size * 0.92) + 'px', height:Math.round(size * 0.92) + 'px', objectFit:'contain', filter:'drop-shadow(0 3px 5px rgba(0,0,0,0.35))' });
                        box.appendChild(img);
                    } else {
                        box.appendChild(document.createTextNode(fallback));
                    }
                    return box;
                };
                icons.append(
                    assetBox(getTowerAssetId(t.id, level), curMeta.icon || t.icon, 40, 'rgba(0,0,0,0.25)'),
                    this.el('div', { color:'#94a3b8', fontWeight:'900' }, '→'),
                    assetBox(getTowerAssetId(t.id, done ? level : nextMeta.level), done ? (curMeta.icon || t.icon) : (nextMeta.icon || t.icon), 44, done ? 'rgba(52,211,153,0.25)' : 'rgba(56,189,248,0.18)', '2px solid ' + (done ? '#34d399' : '#38bdf8'))
                );
                card.appendChild(icons);
                const info = this.el('div', { flex:'1', minWidth:'0' });
                info.append(
                    this.el('div', { color:'white', fontWeight:'900', fontSize:'15px' }, curMeta.name + ' Lv' + level + (done ? '（满级）' : ' → ' + nextMeta.name + ' Lv' + nextMeta.level)),
                    this.el('div', { color:'rgba(255,255,255,0.8)', fontSize:'12px', fontWeight:'bold', lineHeight:'1.4' }, done ? curMeta.blurb : nextMeta.blurb)
                );
                card.appendChild(info);
                if (done) {
                    card.appendChild(this.el('div', { color:'#34d399', fontWeight:'900', fontSize:'14px', flexShrink:'0' }, '✅ Lv5'));
                } else {
                    const buyBtn = this.btn('Lv' + nextMeta.level + ' 💎' + nextMeta.cost, {
                        padding:'10px 14px', borderRadius:'12px', border:'2px solid ' + (afford ? '#38bdf8' : '#475569'),
                        background: afford ? '#0ea5e9' : '#334155', color:'white', fontWeight:'900', fontSize:'15px',
                        fontFamily:'inherit', cursor: afford ? 'pointer' : 'not-allowed', flexShrink:'0'
                    }, () => { if (afford && this.onUpgradeTool) this.onUpgradeTool(t.id); });
                    buyBtn.disabled = !afford;
                    card.appendChild(buyBtn);
                }
                inner.appendChild(card);
            });

            inner.appendChild(this.el('div', { color:'rgba(255,255,255,0.6)', fontSize:'12px', textAlign:'center', marginTop:'2px', lineHeight:'1.5' }, '升级是永久的，让文具变更强；就算不升级，也能照样通关喔！'));
            wrap.appendChild(inner);
            return wrap;
        }

        // ----- Phase A：小学生友善关卡 intro（短、鼓励、不需选 loadout） -----
        // 进阶 loadout 选择已移到 GDD §14-22 deferred backlog（研究所进阶模式才用），主线不出现。
        renderPrep() {
            if (this.phase !== 'prep' || !this.prepData) return null;
            const pd = this.prepData;
            const roleTag = { normal: '普通', fast: '好快', tank: '好硬', trick: '换路', support: '支援', boss: '魔王', elf: '能量' };
            const roleColor = { normal: '#48bb78', fast: '#E85D5D', tank: '#a0aec0', trick: '#F59E0B', support: '#EC4899', boss: '#e53e3e', elf: '#F6D365' };
            const fname = friendlyName(pd.name);
            const beat = pd.lessonBeat || null;
            const bestStars = (this.results[pd.id] && this.results[pd.id].stars) || 0;

            const wrap = this.el('div', {
                position:'absolute', inset:'0', display:'flex', alignItems:'center', justifyContent:'center', zIndex:'55',
                background:'linear-gradient(135deg, #1f3d2f 0%, #2F6B4F 55%, #1e293b 100%)', pointerEvents:'auto',
                padding:'calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))',
                boxSizing:'border-box'
            });
            const card = this.el('div', {
                width:'100%', maxWidth:'460px', maxHeight:'100%', overflowY:'auto', boxSizing:'border-box',
                display:'flex', flexDirection:'column', gap:'12px'
            });
            card.className = 'hide-scrollbar';

            // 标题（友善关卡名）
            card.appendChild(this.el('div', { textAlign:'center', color:'#F7F3E8', fontWeight:'900', fontSize:'22px', textShadow:'0 2px 4px rgba(0,0,0,0.5)' }, '🎒 ' + fname));

            // 一句任务目标（便条纸）
            const goalNote = this.el('div', { borderRadius:'4px 14px 4px 14px', padding:'12px 14px', fontSize:'15px', fontWeight:'bold', textAlign:'center', lineHeight:'1.5' }, '🎯 ' + (pd.goal || ''));
            goalNote.className = 'sticky-note';
            card.appendChild(goalNote);

            // 这一关会遇到（敌人预告，简化；不展示能量精灵）
            const enemyBox = this.el('div', { borderRadius:'12px', padding:'10px 12px' });
            enemyBox.className = 'chalk-card';
            enemyBox.appendChild(this.el('div', { fontWeight:'900', fontSize:'13px', color:'#F6D365', marginBottom:'6px' }, '👀 这一关会遇到'));
            const enemyRow = this.el('div', { display:'flex', flexWrap:'wrap', gap:'6px' });
            (pd.enemies || []).filter(en => en.id !== 'elf').forEach(en => {
                const chip = this.el('div', { display:'inline-flex', alignItems:'center', gap:'5px', background:'rgba(0,0,0,0.22)', borderRadius:'999px', padding:'3px 9px', fontSize:'12px', color:'#F7F3E8', fontWeight:'bold' });
                chip.append(
                    this.el('span', { width:'10px', height:'10px', borderRadius:'3px', background: en.color, display:'inline-block', border:'1px solid rgba(247,243,232,0.7)' }),
                    this.el('span', {}, en.name + '×' + en.count),
                    this.el('span', { fontSize:'10px', color: roleColor[en.role] || '#F7F3E8', fontWeight:'900' }, roleTag[en.role] || '')
                );
                enemyRow.appendChild(chip);
            });
            enemyBox.appendChild(enemyRow);
            if (pd.signatureEnemy) {
                const sig = pd.signatureEnemy;
                enemyBox.appendChild(this.el('div', {
                    marginTop:'8px', padding:'6px 8px', borderRadius:'10px',
                    background:'rgba(246,211,101,0.14)', color:'#FDE68A', fontSize:'12px', fontWeight:'900', lineHeight:'1.45'
                }, '本关新怪：' + sig.name + ' - ' + (sig.hint || '观察它的特殊行动')));
            }
            if (pd.sceneMonsters) {
                const sceneLine = this.el('div', { marginTop:'7px', display:'flex', flexWrap:'wrap', gap:'5px', alignItems:'center' });
                sceneLine.appendChild(this.el('span', { color:'rgba(247,243,232,0.72)', fontSize:'11px', fontWeight:'900' }, pd.sceneMonsters.scene + '怪物表'));
                (pd.sceneMonsters.monsters || []).forEach(m => {
                    const chip = this.el('span', {
                        display:'inline-flex', alignItems:'center', gap:'4px', borderRadius:'999px', padding:'2px 7px',
                        background:'rgba(255,255,255,0.08)', color:'#F7F3E8', fontSize:'11px', fontWeight:'800'
                    });
                    chip.append(
                        this.el('span', { width:'8px', height:'8px', borderRadius:'3px', background:m.color, display:'inline-block' }),
                        this.el('span', {}, m.name)
                    );
                    sceneLine.appendChild(chip);
                });
                enemyBox.appendChild(sceneLine);
            }
            if (pd.hint) enemyBox.appendChild(this.el('div', { fontSize:'12px', color:'#F7F3E8', marginTop:'6px', opacity:'0.92', lineHeight:'1.5' }, '💡 ' + pd.hint));
            card.appendChild(enemyBox);

            // 本关小诀窍：只讲一个玩法重点，避免进关前像装备选择。
            if (beat && TOWERS[beat.tool]) {
                const t = TOWERS[beat.tool];
                const lesson = this.el('div', { borderRadius:'12px', padding:'12px 14px', display:'grid', gridTemplateColumns:'54px 1fr', gap:'10px', alignItems:'center' });
                lesson.className = 'chalk-card';
                lesson.appendChild(this.el('div', {
                    width:'50px', height:'50px', borderRadius:'14px', background:'#F7F3E8', color:'#5b4636',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:'27px', border:'3px solid #F6D365'
                }, t.icon));
                const copy = this.el('div', { display:'flex', flexDirection:'column', gap:'4px' });
                copy.appendChild(this.el('div', { fontWeight:'900', fontSize:'14px', color:'#F6D365' }, '💡 本关小诀窍：' + beat.title));
                copy.appendChild(this.el('div', { fontSize:'12px', color:'#F7F3E8', lineHeight:'1.45' }, beat.text));
                lesson.appendChild(copy);
                card.appendChild(lesson);
            }

            // 研究所进阶关：自选 N 件文具（重启 deferred loadout 选择，仅进阶区）
            const adv = !!pd.advanced;
            const size = pd.loadoutSize || LOADOUT_SIZE;
            if (adv) {
                if (!Array.isArray(this.prepLoadout)) this.prepLoadout = [];
                const box = this.el('div', { borderRadius:'12px', padding:'10px 12px' });
                box.className = 'chalk-card';
                box.appendChild(this.el('div', { fontWeight:'900', fontSize:'13px', color:'#7CF0E0', marginBottom:'8px' },
                    '🔧 进阶：自选 ' + size + ' 件文具（已选 ' + this.prepLoadout.length + '/' + size + '）'));
                const grid = this.el('div', { display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'8px' });
                Object.values(TOWERS).forEach(t => {
                    const sel = this.prepLoadout.includes(t.id);
                    const c = this.el('button', {
                        display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', padding:'8px 4px', borderRadius:'10px',
                        border:'3px solid ' + (sel ? '#34d399' : '#5e3a22'), background: sel ? '#F7F3E8' : '#c7b89e',
                        color:'#5b4636', fontFamily:'inherit', cursor:'pointer', opacity: sel ? '1' : '0.7'
                    });
                    c.append(this.el('div', { fontSize:'22px' }, t.icon), this.el('div', { fontSize:'11px', fontWeight:'900' }, t.name), this.el('div', { fontSize:'10px', color:'#8a6a45' }, '☀️' + t.cost));
                    c.onclick = () => {
                        const i = this.prepLoadout.indexOf(t.id);
                        if (i >= 0) this.prepLoadout.splice(i, 1);
                        else { if (this.prepLoadout.length >= size) return; this.prepLoadout.push(t.id); }
                        this.render();
                    };
                    grid.appendChild(c);
                });
                box.appendChild(grid);
                card.appendChild(box);
            }

            // 星星鼓励（不卡主线进度）
            card.appendChild(this.el('div', { textAlign:'center', fontSize:'13px', color:'#FDE68A', fontWeight:'bold', lineHeight:'1.5' },
                '★★★☆☆☆'.slice(3 - bestStars, 6 - bestStars) + '　拿到 1 颗星就能前进，多拿是额外奖励～'));

            // 按钮（主线开始永远可点；进阶须选满 N 件；返回回到该学校）
            const ready = !adv || (this.prepLoadout && this.prepLoadout.length === size);
            const btnRow = this.el('div', { display:'flex', gap:'10px', marginTop:'2px' });
            btnRow.appendChild(this.btn('返回', {
                padding:'12px 18px', borderRadius:'12px', border:'2px solid rgba(247,243,232,0.4)', background:'rgba(0,0,0,0.25)',
                color:'#F7F3E8', fontWeight:'900', fontSize:'15px', fontFamily:'inherit', cursor:'pointer'
            }, () => {
                const wi = WORLDS.findIndex(w => w.nodes.some(n => n.levelIdx === this.prepLevelIdx));
                if (wi >= 0 && this.onOpenWorld) this.onOpenWorld(wi); else if (this.onRestart) this.onRestart();
            }));
            const startBtn = this.btn(adv ? '开始研究 ▶' : '开始上课 ▶', {
                flex:'1', padding:'12px', borderRadius:'12px', border:'2px solid ' + (ready ? '#34d399' : '#94a3b8'),
                background: ready ? '#10b981' : '#475569', color:'white', fontWeight:'900', fontSize:'18px', fontFamily:'inherit',
                cursor: ready ? 'pointer' : 'not-allowed', boxShadow: ready ? '0 5px 0 #065f46' : 'none'
            }, () => { if (ready && this.onConfirmPrep) this.onConfirmPrep(this.prepLevelIdx, adv ? this.prepLoadout.slice() : (pd.mainlineLoadout || Object.keys(TOWERS))); });
            startBtn.disabled = !ready;
            btnRow.appendChild(startBtn);
            card.appendChild(btnRow);

            wrap.appendChild(card);
            return wrap;
        }

        renderLiveRegion() {
            const live = this.el('div', {
                position:'absolute', width:'1px', height:'1px', padding:'0', margin:'-1px',
                overflow:'hidden', clip:'rect(0, 0, 0, 0)', whiteSpace:'nowrap', border:'0'
            }, this.liveMessage || '');
            live.setAttribute('role', 'status');
            live.setAttribute('aria-live', 'assertive');
            live.setAttribute('aria-atomic', 'true');
            return live;
        }

        renderUltimateControls() {
            if (this.phase !== 'td' || !this.pendingUltimate) return null;
            const meta = TOOL_ULTIMATES[this.pendingUltimate.toolId] || TOOL_ULTIMATES.pencil;
            const wrap = this.el('div', {
                position:'fixed', top:'calc(52px + env(safe-area-inset-top))', right:'calc(12px + env(safe-area-inset-right))',
                zIndex:'90', pointerEvents:'auto', display:'flex', alignItems:'center', gap:'8px',
                maxWidth:'calc(100vw - 24px)', padding:'7px 9px', borderRadius:'12px',
                background:'rgba(15,23,42,0.92)', border:'2px solid #F6D365', color:'#fff7ed', boxShadow:'0 8px 24px rgba(0,0,0,0.38)'
            });
            wrap.append(
                this.el('span', { fontSize:'12px', fontWeight:'900' }, meta.label + '：方向鍵移動，Enter 確認'),
                this.btn('X 取消', {
                    padding:'7px 10px', borderRadius:'9px', border:'2px solid #fca5a5', background:'#7f1d1d',
                    color:'white', fontWeight:'900', fontFamily:'inherit', cursor:'pointer', whiteSpace:'nowrap'
                }, (event) => { event.stopPropagation(); this.onCancelUltimate && this.onCancelUltimate(); })
            );
            return wrap;
        }

        renderTowerBar() {
            if (this.phase !== 'td') return null;
            const isL = this.isLandscape;
            // Phase 2.5：道具栏只显示本关 loadout 内的文具
            const ids = (this.activeLoadout && this.activeLoadout.length) ? this.activeLoadout : Object.keys(TOWERS);
            const towerList = Object.values(TOWERS).filter(t => ids.includes(t.id));
            const landscapeButtonSize = isL
                ? Math.max(42, Math.min(54, Math.floor((window.innerHeight - readSafeAreaInset('top') - readSafeAreaInset('bottom') - 160) / Math.max(1, towerList.length))))
                : 80;
            const bar = this.el('div', {
                pointerEvents:'auto',
                position: isL ? 'absolute' : 'absolute',
                ...(isL ? {
                    left:'0', top:'0', bottom:'0', display:'flex', flexDirection:'column',
                    paddingLeft:'env(safe-area-inset-left)', paddingTop:'env(safe-area-inset-top)', paddingBottom:'env(safe-area-inset-bottom)',
                    boxSizing:'border-box', zIndex:'40'
                } : { bottom:'0', left:'0', right:'0', display:'flex', justifyContent:'center' })
            });
            const inner = this.el('div', {
                ...(isL ? {
                    backgroundColor:'#5D4037', borderRight:'4px solid #3E2723', borderTopRightRadius:'1rem', borderBottomRightRadius:'1rem',
                    boxShadow:'4px 0 10px rgba(0,0,0,0.3)', height:'100%', display:'flex', flexDirection:'column',
                    justifyContent:'flex-start', padding:'6px 4px', gap:'3px', width: SIDEBAR_WIDTH_LANDSCAPE + 'px', boxSizing:'border-box',
                    overflowY:'auto', overflowX:'visible'
                } : {
                    backgroundColor:'#5D4037', borderTop:'4px solid #3E2723', padding:'8px 8px', paddingBottom:'calc(20px + env(safe-area-inset-bottom))', borderTopLeftRadius:'24px', borderTopRightRadius:'24px',
                    boxShadow:'0 -4px 20px rgba(0,0,0,0.5)', display:'flex', justifyContent:'center', gap:'8px', overflowX:'auto', flexShrink:'0'
                })
            });

            // Landscape：文具盒标签 + 黑板小卡 HUD（知识星 / 专注值）
            if (isL) {
                const boxLabel = this.el('div', {}, '✏️ 文具盒');
                boxLabel.className = 'pencil-box-label';
                inner.appendChild(boxLabel);
                const stats = this.el('div', { display:'flex', flexDirection:'column', gap:'2px', marginBottom:'4px', padding:'6px', background:'#2F6B4F', border:'1px solid #B9825B', borderRadius:'8px', margin:'0 4px 4px', flexShrink:'0' });
                const mpRow = this.el('div', { display:'flex', alignItems:'center', gap:'6px', color:'#F7F3E8', justifyContent:'center' });
                mpRow.append(this.el('span', { fontSize:'16px' }, '⭐'), this.el('span', { color:'#F6D365', fontWeight:'900', fontSize:'16px' }, String(Math.floor(this.stats.mp))));
                const hpRow = this.el('div', { display:'flex', alignItems:'center', gap:'6px', color:'#F7F3E8', justifyContent:'center', borderTop:'1px solid rgba(247,243,232,0.18)', paddingTop:'2px' });
                const hpColor = this.stats.hp <= 1 ? '#E85D5D' : '#F2A6A6';
                hpRow.append(this.el('span', { fontSize:'16px' }, '❤️'), this.el('span', { color: hpColor, fontWeight:'900', fontSize:'16px', animation: this.stats.hp <= 1 ? 'pulse 2s infinite' : '' }, String(this.stats.hp)));
                stats.append(mpRow, hpRow);
                inner.appendChild(stats);
                if (ids.includes('teacher')) {
                    const pct = Math.round((this.teacherCharge || 0) * 100);
                    const skill = this.el('button', {
                        margin:'0 4px 4px', padding:'5px 4px', borderRadius:'8px', border:'1px solid ' + (this.teacherReady ? '#F6D365' : '#B9825B'),
                        background: this.teacherReady ? '#4A90E2' : '#23463a', color:'#F7F3E8', fontFamily:'inherit',
                        cursor: this.teacherReady ? 'pointer' : 'default', flexShrink:'0', display:'flex', flexDirection:'column', gap:'2px',
                        animation: this.teacherReady ? 'pulse 1.4s infinite' : ''
                    });
                    skill.appendChild(this.el('div', { fontSize:'9px', fontWeight:'900', textAlign:'center', letterSpacing:'1px' }, '👩‍🏫 班主任'));
                    if (this.teacherReady) {
                        skill.appendChild(this.el('div', { fontSize:'10px', fontWeight:'900', textAlign:'center', color:'#F6D365' }, '⚡就绪·点击'));
                    } else {
                        const track = this.el('div', { height:'7px', background:'rgba(0,0,0,0.35)', borderRadius:'999px', overflow:'hidden' });
                        track.appendChild(this.el('div', { height:'100%', width: pct + '%', background:'linear-gradient(90deg,#4A90E2,#F6D365)', borderRadius:'999px', transition:'width 0.2s' }));
                        skill.appendChild(track);
                        skill.appendChild(this.el('div', { fontSize:'9px', textAlign:'center', color:'rgba(247,243,232,0.7)' }, pct + '%'));
                    }
                    if (this.teacherReady) skill.onclick = (e) => { e.stopPropagation(); this.onTeacherSkill && this.onTeacherSkill(); };
                    inner.appendChild(skill);
                }
            }

            const selectedUltimateId = (this.pendingUltimate && this.pendingUltimate.toolId)
                || this.selectedTower
                || (ids.includes('pencil') ? 'pencil' : ids[0]);
            const ultimateMeta = TOOL_ULTIMATES[selectedUltimateId] || TOOL_ULTIMATES.pencil;
            const stampReady = (this.stamps || 0) > 0;
            const stampBtn = this.el('button', {
                margin: isL ? '0 4px 5px' : '0',
                padding: isL ? '6px 5px' : '8px 12px',
                borderRadius:'10px',
                border:'2px solid ' + (stampReady ? '#F6D365' : '#475569'),
                background: stampReady ? 'linear-gradient(135deg,#92400e,#f59e0b)' : '#1e293b',
                color:'white', fontWeight:'900', fontFamily:'inherit',
                cursor: stampReady ? 'pointer' : 'default',
                display:'flex', flexDirection:'column', alignItems:'center', gap:'2px',
                flexShrink:'0',
                touchAction:'none',
                boxShadow: stampReady ? '0 0 16px rgba(246,211,101,0.42)' : 'none'
            });
            stampBtn.append(
                this.el('div', { fontSize:isL ? '10px' : '12px' }, '🏅 印章 x' + (this.stamps || 0)),
                this.el('div', { fontSize:isL ? '9px' : '11px', color: stampReady ? '#fff7ed' : '#cbd5e1' }, stampReady ? ultimateMeta.label : Math.floor((this.stampProgress || 0) * 10) + '/' + STAMP_KILLS_REQUIRED)
            );
            if (stampReady) {
                stampBtn.onpointerdown = event => {
                    if (event.isPrimary === false || (event.pointerType === 'mouse' && event.button !== 0)) return;
                    event.preventDefault();
                    event.stopPropagation();
                    const wasLocked = !!(this.pendingUltimate
                        && this.pendingUltimate.toolId === selectedUltimateId
                        && this.pendingUltimate.state === 'locked');
                    this.ultimatePointer = {
                        pointerId: event.pointerId,
                        toolId: selectedUltimateId,
                        startX: event.clientX,
                        startY: event.clientY,
                        dragging: !wasLocked
                    };
                    if (stampBtn.setPointerCapture) {
                        try { stampBtn.setPointerCapture(event.pointerId); } catch (error) {}
                    }
                    if (!wasLocked) {
                        this.suppressUltimateClick = true;
                        this.onUltimateGestureStart && this.onUltimateGestureStart(selectedUltimateId);
                    }
                };
                stampBtn.onpointermove = event => {
                    const pointer = this.ultimatePointer;
                    if (!pointer || pointer.pointerId !== event.pointerId || event.isPrimary === false) return;
                    const moved = Math.hypot(event.clientX - pointer.startX, event.clientY - pointer.startY) >= 8;
                    if (!pointer.dragging && moved) {
                        pointer.dragging = true;
                        this.suppressUltimateClick = true;
                        this.onUltimateGestureStart && this.onUltimateGestureStart(pointer.toolId);
                    }
                    if (pointer.dragging) {
                        event.preventDefault();
                        this.onUltimateGestureMove && this.onUltimateGestureMove(event.clientX, event.clientY);
                    }
                };
                stampBtn.onpointerup = event => {
                    const pointer = this.ultimatePointer;
                    if (!pointer || pointer.pointerId !== event.pointerId || event.isPrimary === false) return;
                    event.preventDefault();
                    const rect = stampBtn.getBoundingClientRect();
                    const returnedToIcon = event.clientX >= rect.left && event.clientX <= rect.right
                        && event.clientY >= rect.top && event.clientY <= rect.bottom;
                    this.ultimatePointer = null;
                    if (pointer.dragging) {
                        this.suppressUltimateClick = true;
                        this.onUltimateGestureEnd && this.onUltimateGestureEnd(returnedToIcon);
                    }
                    setTimeout(() => { this.suppressUltimateClick = false; }, 0);
                };
                stampBtn.onpointercancel = event => {
                    const pointer = this.ultimatePointer;
                    if (!pointer || pointer.pointerId !== event.pointerId) return;
                    this.ultimatePointer = null;
                    this.suppressUltimateClick = true;
                    this.onUltimateGestureCancel && this.onUltimateGestureCancel();
                    setTimeout(() => { this.suppressUltimateClick = false; }, 0);
                };
                stampBtn.onlostpointercapture = event => {
                    const pointer = this.ultimatePointer;
                    if (!pointer || pointer.pointerId !== event.pointerId) return;
                    this.ultimatePointer = null;
                    this.suppressUltimateClick = true;
                    this.onUltimateGestureCancel && this.onUltimateGestureCancel();
                    setTimeout(() => { this.suppressUltimateClick = false; }, 0);
                };
                stampBtn.onclick = event => {
                    event.stopPropagation();
                    if (this.suppressUltimateClick) {
                        this.suppressUltimateClick = false;
                        return;
                    }
                    this.onStampUltimate && this.onStampUltimate(selectedUltimateId);
                };
            }
            inner.appendChild(stampBtn);

            towerList.forEach(t => {
                const cooldown = this.stats.cooldowns?.[t.id] || 0;
                const isCooldown = cooldown > 0;
                const canAfford = this.stats.mp >= t.cost;
                const isSelected = this.selectedTower === t.id;
                // 永久等级：道具栏显示当前等级名称与图示
                const toolLevel = getToolLevelFromMap(this.toolLevels, t.id);
                const levelMeta = getToolLevelMeta(t.id, toolLevel);
                const dispIcon = levelMeta ? levelMeta.icon : t.icon;
                const dispName = levelMeta ? levelMeta.name : t.name;
                const towerAsset = ASSETS.get(getTowerAssetId(t.id, toolLevel));

                const btnEl = this.el('button', {
                    position:'relative', borderRadius:'12px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                    overflow:'hidden', transition:'all 0.15s', border:'4px solid', fontFamily:'inherit',
                    ...(isL ? { width:'100%', height: landscapeButtonSize + 'px', minHeight:'42px', flex:'0 0 auto', margin:'0' } : { width:'64px', height:'80px', flexShrink:'0' }),
                    backgroundColor: isSelected ? '#F6D365' : (canAfford ? '#F7F3E8' : '#c7b89e'),
                    borderColor: isSelected ? '#E8B84B' : '#8a5638',
                    transform: isSelected ? (isL ? 'translateX(8px) scale(1.05)' : 'translateY(-16px) scale(1.1)') : 'none',
                    boxShadow: isSelected ? '0 8px 24px rgba(0,0,0,0.3)' : 'none',
                    cursor: isCooldown ? 'not-allowed' : 'pointer',
                    opacity: (!canAfford || isCooldown) && !isSelected ? '0.7' : '1'
                });

                // Cost badge
                const badge = this.el('div', {
                    position:'absolute', top:'-4px', right:'-4px', fontSize:'10px', fontWeight:'900',
                    padding:'2px 6px', borderRadius:'999px', border:'1px solid white', zIndex:'5',
                    backgroundColor: canAfford ? '#facc15' : '#ef4444', color: canAfford ? '#713f12' : 'white'
                }, String(t.cost));

                // Icon（升级后换皮 + ✨ 角标）
                const iconEl = this.el('div', { position:'relative', fontSize: isL ? (landscapeButtonSize <= 48 ? '19px' : '22px') : '28px', flex:'1', display:'flex', alignItems:'center', justifyContent:'center' });
                if (towerAsset) {
                    const img = document.createElement('img');
                    img.src = towerAsset.src;
                    Object.assign(img.style, {
                        width: isL ? Math.max(34, Math.min(48, landscapeButtonSize - 12)) + 'px' : '48px',
                        height: isL ? Math.max(34, Math.min(48, landscapeButtonSize - 12)) + 'px' : '48px',
                        objectFit:'contain',
                        filter:'drop-shadow(0 3px 4px rgba(0,0,0,0.28))'
                    });
                    iconEl.appendChild(img);
                } else {
                    iconEl.appendChild(document.createTextNode(dispIcon));
                }
                if (toolLevel > 1) iconEl.appendChild(this.el('div', { position:'absolute', top:'-2px', left:'-2px', fontSize:'10px', fontWeight:'900', color:'#0f172a', background:'#F6D365', borderRadius:'999px', padding:'0 3px' }, 'Lv' + toolLevel));

                // Name（升级后显示新名）
                const nameEl = this.el('div', {
                    backgroundColor: toolLevel > 1 ? '#cdeafe' : '#efe7d3', color:'#6b4a2f', fontWeight:'bold', borderRadius:'4px', textAlign:'center',
                    fontSize: isL && landscapeButtonSize <= 48 ? '7px' : '8px', padding:'2px', width:'90%', marginBottom:'2px', border:'1px solid ' + (toolLevel > 1 ? '#7cc8f0' : '#c9a06a')
                }, dispName);

                // Cooldown overlay
                if (isCooldown) {
                    const overlay = this.el('div', { position:'absolute', inset:'0', borderRadius:'12px', backgroundColor:'rgba(0,0,0,0.6)', zIndex:'3', display:'flex', alignItems:'flex-end', justifyContent:'center', overflow:'hidden' });
                    const fill = this.el('div', { position:'absolute', top:'0', left:'0', right:'0', backgroundColor:'rgba(30,41,59,0.5)', transition:'height 0.1s', height: `${(1 - cooldown) * 100}%` });
                    overlay.appendChild(fill);
                    btnEl.appendChild(overlay);
                }

                btnEl.append(badge, iconEl, nameEl);
                btnEl.onclick = (e) => {
                    e.stopPropagation();
                    if (!isCooldown && this.onSelectTower) this.onSelectTower(isSelected ? null : t.id);
                };
                inner.appendChild(btnEl);
            });

            inner.className = 'hide-scrollbar ' + (isL ? 'pencil-box' : 'pencil-box-portrait');
            bar.appendChild(inner);
            return bar;
        }

        renderHUD() {
            const isL = this.isLandscape;
            if (isL || this.phase !== 'td') return null;
            // Portrait top bar
            const bar = this.el('div', {
                position:'absolute', top:'0', left:'0', right:'0', padding:'16px',

            lvlBadge.append(this.el('span', { color:'#34d399', fontSize:'18px' }, '🗺️'), this.el('span', {}, friendlyName(this.stats.levelName)));
            const waveBadge = this.el('div', { backgroundColor:'rgba(30,41,59,0.9)', color:'#e2e8f0', fontSize:'14px', padding:'4px 12px', borderRadius:'12px', border:'1px solid #475569', fontWeight:'bold', marginLeft:'8px' }, `Wave ${this.stats.wave}`);

            mpBox.append(this.el('span', { fontSize:'22px' }, '☀️'), this.el('span', { color:'#fde68a', fontWeight:'900', fontSize:'22px' }, String(Math.floor(this.stats.mp))));
            const hpBox = this.el('div', { backgroundColor:'rgba(15,23,42,0.9)', color:'white', padding:'8px 16px', borderRadius:'16px', border:'2px solid #334155', display:'flex', alignItems:'center', gap:'12px' });

            const hint = this.el('div', { backgroundColor:'rgba(0,0,0,0.6)', color:'white', padding:'12px 24px', borderRadius:'999px', backdropFilter:'blur(8px)', animation:'pulse 2s infinite', fontWeight:'bold', fontSize:'18px', border:'1px solid rgba(255,255,255,0.2)', whiteSpace:'nowrap' }, '👆 点击空地，角色自动走向 ❓ 答题');

                border:'2px solid ' + t.color, boxShadow:'0 8px 24px rgba(0,0,0,0.4)', maxWidth:'264px'
            });

            }

                '剩余生命 ❤️' + (r.hp != null ? r.hp : '-') + '　答错 ' + (r.wrong != null ? r.wrong : '-')));
            if (r.reward && r.reward.text) box.appendChild(this.el('div', { color:'#0f766e', fontWeight:'900', fontSize:'14px', marginBottom:'4px' }, '🎁 ' + r.reward.text));
            if (r.stickerText) box.appendChild(this.el('div', { color:'#9333ea', fontWeight:'900', fontSize:'14px', marginBottom:'4px' }, r.stickerText));

            if (r.minigame && !r.minigameDone) box.appendChild(this.el('div', { background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:'12px', padding:'8px 10px', color:'#c2410c', fontWeight:'900', fontSize:'13px', margin:'8px 0' }, '下一章前可玩「' + r.minigame.title + '」赚开局阳光'));
            if (r.minigameDone) box.appendChild(this.el('div', { background:'#ecfdf5', border:'1px solid #a7f3d0', borderRadius:'12px', padding:'8px 10px', color:'#047857', fontWeight:'900', fontSize:'13px', margin:'8px 0' }, '小游戏获得 +' + (r.minigameReward || 0) + ' 阳光，下一关开局自动带入'));

            // Phase C：今天我学会了（学科分类统计）
            const SUBJ_META = { '数学':'➗ 数学', '语文':'📖 语文', '英语':'🔤 英语', '科学':'🔬 科学', '科技':'🤖 科技', '常识':'💡 常识' };
            const subj = r.subjectsLearned || {};
            const subjKeys = Object.keys(subj).filter(k => subj[k] > 0);
            if (subjKeys.length) {

                lbox.appendChild(chips);
                box.appendChild(lbox);
            }

            // Phase C：本关错题回顾卡（仅本关、不存档；教学语气、不惩罚）
            const wrongs = r.wrongList || [];
            if (wrongs.length) {
                const wbox = this.el('div', { background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:'14px', padding:'10px 12px', margin:'4px 0 8px', textAlign:'left' });
                wbox.appendChild(this.el('div', { color:'#c2410c', fontWeight:'900', fontSize:'14px', marginBottom:'6px', textAlign:'center' }, '📝 这些题再看一眼就懂啦'));

            }, () => { const idx = LEVELS.findIndex(l => l.name === this.stats.levelName); if (idx >= 0 && this.onOpenPrep) this.onOpenPrep(idx); });
            btnRow.appendChild(retryBtn);
            if (r.isChallenge || r.isLastCampaign) {
                btnRow.appendChild(this.btn('🏠 返回选单', {
                    flex:'1', padding:'13px', borderRadius:'14px', backgroundColor:'#10b981', color:'white', fontWeight:'900', fontSize:'17px',
                    border:'2px solid #34d399', boxShadow:'0 5px 0 #065f46', cursor:'pointer', fontFamily:'inherit'
                }, () => this.onRestart && this.onRestart()));
            } else {

                }, () => {
                    const cur = LEVELS.findIndex(l => l.name === this.stats.levelName);
                    const next = (cur !== -1 ? cur : 0) + 1;

                    else if (next < CAMPAIGN_COUNT && this.onOpenPrep) this.onOpenPrep(next);
                }));
            }
            box.appendChild(btnRow);
            overlay.appendChild(box);
            return overlay;

            const restartBtn = this.btn('返回标题画面', {
                width:'100%', padding:'16px', borderRadius:'16px', backgroundColor:'#6366f1', color:'white', fontWeight:'900', fontSize:'20px',
                boxShadow:'0 6px 0 #3730a3', border:'2px solid #818cf8', cursor:'pointer', transition:'all 0.15s', fontFamily:'inherit'
            }, () => this.onRestart && this.onRestart());
            const msgEl = this.el('div', { backgroundColor:'#f8fafc', padding:'16px', borderRadius:'12px', border:'1px solid #f1f5f9', marginBottom:'32px', color:'#64748b', fontSize:'18px', lineHeight:'1.6' }, msg);
            box.append(this.el('div', { fontSize:'80px', marginBottom:'24px', animation:'bounce 1s infinite' }, win ? '🏆' : '🥀'), this.el('h2', { fontSize:'36px', fontWeight:'900', color: win ? '#f59e0b' : '#334155', marginBottom:'8px' }, title), msgEl, restartBtn);
            overlay.appendChild(box);
            return overlay;
        }

        render() {
            this.root.innerHTML = '';
            this.root.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10;';
            this.root.appendChild(this.renderLiveRegion());

            if (this.phase === 'menu') {
                const menu = this.renderMenu();
                if (menu) this.root.appendChild(menu);
                const accountPanel = this.renderAccountPanel();
                if (accountPanel) this.root.appendChild(accountPanel);
                return;
            }

            if (this.phase === 'world') {
                const w = this.renderWorld();
                if (w) this.root.appendChild(w);
                return;
            }

            if (this.phase === 'collection') {
                const c = this.renderCollection();
                if (c) this.root.appendChild(c);
                return;
            }

            if (this.phase === 'workshop') {
                const wk = this.renderWorkshop();
                if (wk) this.root.appendChild(wk);
                return;
            }

            if (this.phase === 'prep') {
                const prep = this.renderPrep();
                if (prep) this.root.appendChild(prep);
                return;
            }

            if (this.phase === 'minigame') {
                const mg = this.renderMinigameHUD();
                if (mg) this.root.appendChild(mg);
                return;
            }

            const loading = this.renderLoading();
            if (loading) this.root.appendChild(loading);

            const hud = this.renderHUD();
            if (hud) this.root.appendChild(hud);

            const lInfo = this.renderLandscapeInfo();
            if (lInfo) this.root.appendChild(lInfo);

            const towerBar = this.renderTowerBar();
            if (towerBar) this.root.appendChild(towerBar);

            const ultimateControls = this.renderUltimateControls();
            if (ultimateControls) this.root.appendChild(ultimateControls);

            const towerInfo = this.renderTowerInfo();
            if (towerInfo) this.root.appendChild(towerInfo);

            const fieldInfo = this.renderFieldInfo();
            if (fieldInfo) this.root.appendChild(fieldInfo);

            const earlyCall = this.renderEarlyCall();
            if (earlyCall) this.root.appendChild(earlyCall);

            const waveIntro = this.renderWaveIntro();
            if (waveIntro) this.root.appendChild(waveIntro);

            const mazeHint = this.renderMazeHint();
            if (mazeHint) this.root.appendChild(mazeHint);

            const expl = this.renderExplanation();
            if (expl) this.root.appendChild(expl);

            const quiz = this.renderQuiz();
            if (quiz) this.root.appendChild(quiz);

            const rewardPicker = this.renderRewardPicker();
            if (rewardPicker) this.root.appendChild(rewardPicker);

            const combatToast = this.renderCombatToast();
            if (combatToast) this.root.appendChild(combatToast);

            const lc = this.renderLevelComplete();
            if (lc) this.root.appendChild(lc);

            const go = this.renderGameOver();
            if (go) this.root.appendChild(go);

            const orientationGate = this.renderOrientationGate();
            if (orientationGate) this.root.appendChild(orientationGate);
        }
    }

    // ==================== MAIN APP ====================
    const canvas = document.getElementById('gameCanvas');
    canvas.tabIndex = 0;
    canvas.setAttribute('role', 'application');
    canvas.setAttribute('aria-label', '學霸校園塔防戰場。大招瞄準時可用方向鍵移動，Enter 或空白鍵確認，Escape 取消。');
    const ui = new UIManager();

    function applyCloudProgress(save) {
        if (!save || typeof save !== 'object') return false;
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify(migrateSave(save)));
            window.location.reload();
            return true;
        } catch (error) {
            return false;
        }
    }

    function handleAccountResult(result) {
        if (result && result.action === 'apply-cloud') applyCloudProgress(result.save);
    }

    accountService = new AccountService({
        onState: accountState => ui.update({ accountState })
    });

    async function initializeAccountService() {
        let config = null;
        try {
            const response = await fetch('account-service.json', { cache: 'no-store' });
            if (response.ok) config = await response.json();
        } catch (error) {}
        if (!accountService.configure(config)) return;
        const result = await accountService.restoreSession(loadGameSave());
        handleAccountResult(result);
    }

    let selectedTower = null;
    let stats = { mp: 0, hp: 0, wave: 0, levelName: '', cooldowns: {} };
    let phase = 'menu';
    let quizData = null;
    let explanationData = null;
    let gameOverData = null;
    let waveIntro = null;
    let waveIntroTimeout = null;
    let rewardCards = null;
    let combatToast = null;
    let combatToastTimeout = null;
    let minigameData = null;
    let isLoading = false;
    let unlockedLevel = loadGameSave().unlockedLevel || 0;
    let isLandscape = readStableLandscapeOrientation(window.innerWidth > window.innerHeight, true);
    // ----- Phase B 世界地图 / Phase A 友善化 状态 -----
    let worldIdx = 0;
    let advancedMode = false; // 主线 false；研究所进阶关进入时设 true（开放提前上课/关卡内升级）
    let stickers = loadGameSave().stickers || {};
    let badges = loadGameSave().badges || {};
    let shards = loadGameSave().shards || 0;
    let toolUpgrades = loadGameSave().toolUpgrades || {};
    let toolLevels = loadGameSave().toolLevels || defaultToolLevels();
    // ----- Phase 2.5 状态 -----
    let activeLoadout = Object.keys(TOWERS);
    let prepData = null;
    let prepLevelIdx = 0;
    let teacherCharge = 0, teacherReady = false, waitWave = false;
    let stamps = 0, stampKills = 0, stampProgress = 0, pendingUltimate = null;
    let fieldSel = null;
    // ----- Phase 4 状态 -----
    let results = loadGameSave().results || {};
    let levelResult = null;

    const callbacks = {
        onStatsUpdate: (mp, hp, wave, lvlName, progress, cooldowns) => {
            stats = { mp, hp, wave, levelName: lvlName, waveProgress: progress, cooldowns };
            ui.update({ stats });
        },
        onPhaseChange: (p) => {
            phase = p;
            if (p !== 'td') {
                engine.clearPendingUltimate('phase-change', false);
                selectedTower = null;
                engine.setSelectedTower(null);
            }
            ui.update({ phase, selectedTower });
        },
        onQuizOpen: (q, a, isRescue, canSOS, canHint, isCombat) => {
            quizData = { q, a, hint: false, isRescue, canSOS, canHint, isCombat };
            ui.update({ quizData });
            VOICE.speak(q); // 朗读题目（小学生友善；feature-detect 安全）
        },
        onExplanation: (data) => {
            explanationData = data;
            ui.update({ explanationData });
        },
        onGameOver: (win, title, msg) => {
            gameOverData = { win, title, msg };
            ui.update({ gameOverData });
        },
        onLoading: (l) => {
            isLoading = l;
            ui.update({ isLoading });
        },
        onSelectTower: (t) => {
            selectedTower = t;
            ui.update({ selectedTower });
        },
        onLevelComplete: (completedLevelIdx, result) => {
            if (result && !result.isChallenge) unlockedLevel = Math.max(unlockedLevel, Math.min(CAMPAIGN_COUNT - 1, completedLevelIdx + 1));
            const fresh = loadGameSave(); // 引擎已写盘，同步最新星级 + 收集 + 碎片
            results = fresh.results || results;
            stickers = fresh.stickers || stickers;
            badges = fresh.badges || badges;
            shards = fresh.shards || 0; toolLevels = fresh.toolLevels || toolLevels; toolUpgrades = fresh.toolUpgrades || legacyUpgradesFromLevels(toolLevels);
            levelResult = result || null;
            ui.update({ unlockedLevel, results, stickers, badges, shards, toolLevels, toolUpgrades, levelResult });
        },
        onWaveIntro: (info) => {
            waveIntro = info;
            ui.update({ waveIntro });
            if (waveIntroTimeout) clearTimeout(waveIntroTimeout);
            let dur = (info && info.showTip) ? 5200 : 3600; // 含关卡提示的首波多停一会
            if (info && info.isFlagWave) dur = Math.max(dur, 4800);
            waveIntroTimeout = setTimeout(() => { waveIntro = null; ui.update({ waveIntro }); }, dur);
        },
        onRewardPicker: (cards) => {
            quizData = null; // 关闭答题弹窗，弹出三选一奖励
            rewardCards = cards;
            ui.update({ quizData, rewardCards });
        },
        onToast: (text) => {
            combatToast = text;
            ui.update({ combatToast });
            if (combatToastTimeout) clearTimeout(combatToastTimeout);
            combatToastTimeout = setTimeout(() => { combatToast = null; ui.update({ combatToast }); }, 3200);
        },
        onCombatState: (s) => {
            teacherCharge = s.teacherCharge; teacherReady = s.teacherReady; waitWave = s.waitWave;
            stamps = s.stamps || 0; stampKills = s.stampKills || 0; stampProgress = s.stampProgress || 0;
            pendingUltimate = s.pendingUltimate || null;
            ui.update({ teacherCharge, teacherReady, waitWave, stamps, stampKills, stampProgress, pendingUltimate });
        },
        onAnnouncement: (message) => ui.update({ liveMessage: message || '' }),
        onFieldSelect: (info) => {
            fieldSel = info;
            ui.update({ fieldSel });
        },
        onMinigameState: (data) => {
            minigameData = data ? { ...data, targets: data.targets ? data.targets.map(t => ({ ...t })) : [] } : null;
            ui.update({ minigameData });
        },
        onMinigameComplete: (result) => {
            minigameData = null;
            levelResult = Object.assign({}, levelResult || {}, {
                minigameDone: true,
                minigameReward: result.reward || 0,
                minigameHits: result.hits || 0,
                minigameShots: result.shots || 0
            });
            ui.update({ minigameData, levelResult });
        }
    };

    const engine = new GameEngine(callbacks);
    engine.mount(canvas);
    canvas.addEventListener('keydown', event => {
        if (engine.handleUltimateKey(event.key)) {
            event.preventDefault();
            SOUND.arm();
        }
    });
    isLoading = true;
    ui.update({ isLoading });
    const assetLoadPromise = ASSETS.load().then(() => { isLoading = false; ui.update({ isLoading }); });

    function startLevelWhenAssetsReady(idx, loadout) {
        const begin = () => {
            isLoading = false;
            ui.update({ isLoading });
            engine.startLevel(idx, loadout);
        };
        if (ASSETS.ready) { begin(); return; }
        isLoading = true;
        ui.update({ isLoading });
        assetLoadPromise.then(begin);
    }

    // Wire UI events
    ui.onOpenAccount = () => ui.update({ accountPanelOpen: true });
    ui.onCloseAccount = () => ui.update({ accountPanelOpen: false, accountBusy: false });
    ui.onAccountSubmit = async credentials => {
        ui.update({ accountBusy: true });
        try {
            const result = credentials.mode === 'register'
                ? await accountService.register(credentials.username, credentials.password, loadGameSave())
                : await accountService.login(credentials.username, credentials.password, loadGameSave());
            handleAccountResult(result);
        } catch (error) {
            // AccountService publishes a safe user-facing error through accountState.
        } finally {
            ui.update({ accountBusy: false });
        }
    };
    ui.onAccountSync = async () => {
        ui.update({ accountBusy: true });
        try { await accountService.syncNow(loadGameSave()); }
        finally { ui.update({ accountBusy: false }); }
    };
    ui.onAccountKeepLocal = async () => {
        ui.update({ accountBusy: true });
        try { await accountService.keepLocal(loadGameSave()); }
        finally { ui.update({ accountBusy: false }); }
    };
    ui.onAccountUseCloud = () => {
        const save = accountService.acceptCloud();
        if (save) applyCloudProgress(save);
    };
    ui.onAccountLogout = async () => {
        ui.update({ accountBusy: true });
        try { await accountService.logout(); }
        finally { ui.update({ accountBusy: false }); }
    };
    ui.onSelectTower = (t) => {
        selectedTower = t;
        engine.setSelectedTower(t);
        ui.update({ selectedTower });
    };
    // Phase B：点世界 → 展开该学校的关卡节点
    ui.onOpenWorld = (wi) => {
        worldIdx = wi;
        phase = 'world';
        ui.update({ phase, worldIdx });
    };
    // Phase C：打开收藏馆（读最新存档，含战斗中收集到的敌人贴纸）
    ui.onOpenCollection = () => {
        const fresh = loadGameSave();
        stickers = fresh.stickers || stickers; badges = fresh.badges || badges;
        phase = 'collection';
        ui.update({ phase, stickers, badges });
    };
    // 音效 / 语音 开关（持久化到独立 settings，不动存档 schema）
    ui.onToggleSound = () => {
        SOUND.enabled = !SOUND.enabled; SOUND.arm();
        saveSettings({ sound: SOUND.enabled, voice: VOICE.enabled });
        if (SOUND.enabled) SOUND.play('tap');
        ui.update({ soundOn: SOUND.enabled });
    };
    ui.onToggleVoice = () => {
        VOICE.enabled = !VOICE.enabled;
        saveSettings({ sound: SOUND.enabled, voice: VOICE.enabled });
        if (VOICE.enabled) VOICE.speak('语音开启'); else VOICE.stop();
        ui.update({ voiceOn: VOICE.enabled });
    };
    // 装备工坊：打开（读最新碎片/升级）
    ui.onOpenWorkshop = () => {
        const fresh = loadGameSave();
        shards = fresh.shards || 0; toolLevels = fresh.toolLevels || defaultToolLevels(); toolUpgrades = fresh.toolUpgrades || legacyUpgradesFromLevels(toolLevels);
        phase = 'workshop';
        ui.update({ phase, shards, toolLevels, toolUpgrades });
    };
    // 装备工坊：花碎片逐级升级某文具（永久）
    ui.onUpgradeTool = (toolId) => {
        const save = loadGameSave();
        save.toolLevels = normalizeToolLevels(save.toolLevels, save.toolUpgrades);
        const currentLevel = getToolLevelFromMap(save.toolLevels, toolId);
        const nextMeta = getNextToolLevelMeta(toolId, currentLevel);
        if (!nextMeta) return;                          // 已满级
        if ((save.shards || 0) < nextMeta.cost) return; // 碎片不足
        save.shards -= nextMeta.cost;
        save.toolLevels[toolId] = currentLevel + 1;
        save.toolUpgrades = legacyUpgradesFromLevels(save.toolLevels);
        writeGameSave(save);
        engine.save = save;                              // 同步引擎，下一关即生效
        shards = save.shards; toolLevels = save.toolLevels; toolUpgrades = save.toolUpgrades;
        SOUND.play('upgrade');
        ui.update({ shards, toolLevels, toolUpgrades }); // 仍在 workshop，刷新即可
    };
    // Phase A：进入关卡友善 intro（不需选 loadout，开战给全部文具）
    ui.onOpenPrep = (idx) => {
        prepData = engine.getLevelPreview(idx);
        prepLevelIdx = idx;
        phase = 'prep';
        // 研究所进阶关：备战预选一组泛用文具（玩家可改）；主线无需选
        const prepLoadout = prepData.advanced ? ['textbook', 'pencil', 'ruler', 'glue'].slice(0, prepData.loadoutSize || 4) : [];
        ui.update({ phase, prepData, prepLevelIdx, prepLoadout });
    };
    // intro/备战 完成 → 进入战斗（主线全配；研究所用自选 loadout）
    ui.onConfirmPrep = (idx, loadout) => {
        requestLandscapeMode();
        activeLoadout = (loadout && loadout.length) ? loadout.slice() : Object.keys(TOWERS);
        advancedMode = !!(LEVELS[idx] && LEVELS[idx].advanced); // 研究所开放提前上课 / 关卡内升级
        const fresh = loadGameSave(); toolLevels = fresh.toolLevels || defaultToolLevels(); toolUpgrades = fresh.toolUpgrades || legacyUpgradesFromLevels(toolLevels); // 道具栏显示升级后外观
        gameOverData = null;
        ui.update({ activeLoadout, toolLevels, toolUpgrades, advancedMode, gameOverData });
        startLevelWhenAssetsReady(idx, activeLoadout);
    };
    // 兼容旧入口（直接开始指定关）
    ui.onStartLevel = (idx) => {
        requestLandscapeMode();
        startLevelWhenAssetsReady(idx, activeLoadout);
        gameOverData = null;
        ui.update({ gameOverData });
    };
    // Phase 2.5：提前上课 / 班主任技能 / 关卡内升级
    ui.onEarlyCall = () => engine.callNextWaveEarly();
    ui.onTeacherSkill = () => engine.releaseTeacherSkill();
    ui.onStampUltimate = (toolId) => engine.releaseStampUltimate(toolId);
    ui.onCancelUltimate = () => engine.cancelStampUltimate();
    ui.onUltimateGestureStart = toolId => engine.beginUltimateGesture(toolId);
    ui.onUltimateGestureMove = (x, y) => engine.updateUltimateGesture(x, y);
    ui.onUltimateGestureEnd = returnedToIcon => engine.endUltimateGesture(returnedToIcon);
    ui.onUltimateGestureCancel = () => engine.cancelUltimateGesture();
    ui.onUpgrade = () => engine.upgradeSelectedField();
    ui.onStartMinigame = (levelIdx, nextLevelIdx) => engine.startChapterMinigame(levelIdx, nextLevelIdx);
    ui.onRestart = () => {
        // 回主选单：重新同步存档（含战斗中/失败关收集到的贴纸、最新解锁与星级）
        engine.clearPendingUltimate('return-menu', false);
        const fresh = loadGameSave();
        unlockedLevel = Math.max(unlockedLevel, fresh.unlockedLevel || 0);
        results = fresh.results || results; stickers = fresh.stickers || stickers; badges = fresh.badges || badges;
        shards = fresh.shards || 0; toolLevels = fresh.toolLevels || toolLevels; toolUpgrades = fresh.toolUpgrades || legacyUpgradesFromLevels(toolLevels);
        phase = 'menu';
        gameOverData = null;
        ui.update({ phase, gameOverData, unlockedLevel, results, stickers, badges, shards, toolLevels, toolUpgrades });
    };
    ui.onQuizAnswer = (ok) => {
        quizData = null;
        ui.update({ quizData });
        engine.resolveQuiz(ok);
    };
    ui.onHint = () => {
        if (engine.useHint()) {
            quizData = { ...quizData, hint: true };
            ui.update({ quizData });
            setTimeout(() => {
                quizData = null;
                ui.update({ quizData });
                engine.resolveQuiz(true);
            }, 2000);
        }
    };
    ui.onSOS = () => { engine.triggerSOS(); };
    ui.onRewardPick = (id) => {
        rewardCards = null;
        ui.update({ rewardCards });
        engine.applyReward(id);
    };
    ui.onExplanationDismiss = () => {
        explanationData = null;
        ui.update({ explanationData });
        engine.proceedToFollowUp();
    };

    // 启动时把存档进度（解锁关卡 + 星级 + 收集）推到选单，确保返回玩家正确显示
    ui.update({ unlockedLevel, results, stickers, badges, shards, toolLevels, toolUpgrades, advancedMode, soundOn: SOUND.enabled, voiceOn: VOICE.enabled });
    initializeAccountService();

    // Input handling
    function handleInput(type, x, y) {
        if (type === 'start') SOUND.arm(); // 首次手势解锁 AudioContext（浏览器 autoplay 政策）
        engine.handleInput(type, x, y);
    }
    // 菜单等 DOM 按钮的点击也解锁音频
    document.addEventListener('pointerdown', () => SOUND.arm(), { once: true });

    if (window.PointerEvent) {
        canvas.addEventListener('pointerdown', e => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            if (e.isPrimary === false) return;
            e.preventDefault();
            canvas.focus({ preventScroll: true });
            if (canvas.setPointerCapture) {
                try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
            }
            handleInput('start', e.clientX, e.clientY);
        }, { passive: false });
        canvas.addEventListener('pointermove', e => {
            if (e.isPrimary === false) return;
            if (e.pointerType === 'mouse' && e.buttons === 0) return;
            e.preventDefault();
            handleInput('move', e.clientX, e.clientY);
        }, { passive: false });
        const endPointerInput = e => {
            if (e.isPrimary === false) return;
            e.preventDefault();
            if (canvas.releasePointerCapture && canvas.hasPointerCapture && canvas.hasPointerCapture(e.pointerId)) {
                try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
            }
            handleInput('end', e.clientX, e.clientY);
        };
        canvas.addEventListener('pointerup', endPointerInput, { passive: false });
        canvas.addEventListener('pointercancel', endPointerInput, { passive: false });
    } else {
        canvas.addEventListener('mousedown', e => handleInput('start', e.clientX, e.clientY));
        canvas.addEventListener('mousemove', e => handleInput('move', e.clientX, e.clientY));
        canvas.addEventListener('mouseup', e => handleInput('end', e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput('start', e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput('move', e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchend', e => { e.preventDefault(); handleInput('end', e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
    }

    // Resize handling
    const refreshUiOrientation = allowViewportFallback => {
        isLandscape = readStableLandscapeOrientation(isLandscape, allowViewportFallback);
        syncUiOrientation(ui, isLandscape);
    };
    window.addEventListener('resize', () => refreshUiOrientation(false));
    window.addEventListener('orientationchange', () => refreshUiOrientation(true));
    if (screen.orientation && screen.orientation.addEventListener) {
        screen.orientation.addEventListener('change', () => refreshUiOrientation(true));
    }
    </script>
</body>
</html>
