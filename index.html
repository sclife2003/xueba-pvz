                const wiggle = Math.sin(this.frame * 0.14 + o.x * 0.01) * 4;
                ctx.fillStyle = '#F9A8D4';
                ctx.strokeStyle = '#9D174D';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(cx, cy, G * 0.31, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                ctx.strokeStyle = '#EC4899';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(cx - G * 0.25, cy - G * 0.12);
                ctx.quadraticCurveTo(cx - G * 0.05, cy - G * 0.24 + wiggle, cx + G * 0.22, cy - G * 0.1);
                ctx.stroke();
                ctx.fillStyle = '#111827';
                ctx.beginPath(); ctx.arc(cx - G * 0.1, cy, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + G * 0.11, cy, 4, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#BE185D';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(cx, cy + G * 0.12, G * 0.09, 0, Math.PI); ctx.stroke();
            } else if (o.id === 'boss') {
                const bossColor = levelIdx === 2 ? '#9B2C2C' : '#C53030';
                ctx.fillStyle = 'rgba(229, 62, 62, 0.3)'; ctx.beginPath(); ctx.arc(cx, cy, G/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = bossColor; ctx.beginPath(); ctx.arc(cx, cy, G/2 - 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#742A2A'; ctx.beginPath(); ctx.moveTo(cx-20, cy+20); ctx.lineTo(cx+20, cy+20); ctx.lineTo(cx, cy+50); ctx.fill();
                ctx.fillStyle = '#F6AD55'; ctx.beginPath(); ctx.moveTo(cx - 20, cy - 20); ctx.bezierCurveTo(cx - 40, cy - 40, cx - 30, cy - 50, cx - 10, cy - 30); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 20, cy - 20); ctx.bezierCurveTo(cx + 40, cy - 40, cx + 30, cy - 50, cx + 10, cy - 30); ctx.fill();
                ctx.fillStyle = levelIdx >= 1 ? '#F6E05E' : '#FBD38D';
                ctx.beginPath(); ctx.moveTo(cx - 20, cy - 10); ctx.lineTo(cx - 5, cy); ctx.lineTo(cx - 20, cy + 5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 20, cy - 10); ctx.lineTo(cx + 5, cy); ctx.lineTo(cx + 20, cy + 5); ctx.fill();
                ctx.strokeStyle = 'black'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy + 15, 10, 3.14, 0); ctx.stroke();
            } else if (o.id === 'elf') {
                const glow = Math.sin(this.frame * 0.2) * 5;
                ctx.fillStyle = 'rgba(250, 240, 137, 0.6)'; ctx.beginPath(); ctx.arc(cx, cy, 20 + glow, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#FFFFF0'; ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.beginPath(); ctx.ellipse(cx - 15, cy, 15, 5, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 15, cy, 15, 5, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#B7791F'; ctx.font = `${Math.max(10, G*0.25)}px Arial`; ctx.fillText('$', cx - 4, cy + 5);
            }
            if (o.isEating) { ctx.fillStyle = 'red'; ctx.font = `bold ${Math.max(12, G*0.3)}px Arial`; ctx.fillText('咬!', x, y); }
            if (o.rushTimer > 0) { ctx.fillStyle = '#E85D5D'; ctx.font = `bold ${Math.max(11, G*0.24)}px Arial`; ctx.fillText('冲!', x + G * 0.15, y - 8); }
            if (o.hurryTimer > 0) { ctx.fillStyle = '#0ea5e9'; ctx.font = `bold ${Math.max(11, G*0.24)}px Arial`; ctx.fillText('快!', x + G * 0.48, y - 8); }
            if (o.rageTimer > 0) { ctx.fillStyle = '#ef4444'; ctx.font = `bold ${Math.max(13, G*0.28)}px Arial`; ctx.fillText('暴!', x + G * 0.18, y - 30); }
            if (o.powerStacks > 0) { ctx.fillStyle = '#facc15'; ctx.font = `bold ${Math.max(11, G*0.24)}px Arial`; ctx.fillText('阳+' + o.powerStacks, x + G * 0.12, y - 8); }
            if (o.shieldFlash > 0) { ctx.strokeStyle = '#F6D365'; ctx.lineWidth = 4; ctx.strokeRect(x + 10, y + 10, G - 20, G - 20); }
            if (o.specialFlash > 0) { ctx.strokeStyle = 'rgba(248,113,113,0.85)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy, G * 0.58, 0, Math.PI * 2); ctx.stroke(); }
            ctx.restore();
            if (o.hp < o.maxHp) {
                const barY = y - 10;
                ctx.fillStyle = 'red'; ctx.fillRect(x + 15, barY, G - 30, 6);
                ctx.fillStyle = '#48bb78'; ctx.fillRect(x + 15, barY, (G - 30) * (o.hp / o.maxHp), 6);
                ctx.strokeStyle = 'black'; ctx.lineWidth = 1; ctx.strokeRect(x + 15, barY, G - 30, 6);
            }
        }

        drawRoundedRect(ctx, x, y, w, h, r) {
            const rr = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + rr, y);
            ctx.lineTo(x + w - rr, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
            ctx.lineTo(x + w, y + h - rr);
            ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
            ctx.lineTo(x + rr, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
            ctx.lineTo(x, y + rr);
            ctx.quadraticCurveTo(x, y, x + rr, y);
        }

        // ----- Phase D 通用舞台：每章一个场景，离屏缓存（key 含 chapterId，切关不串场） -----
        getStageCacheKey(G, chapterId) {
            return [chapterId, this.w, this.h, this.OX, this.OY, this.C, this.R, Math.round(G * 100), Math.round((this.dpr || 1) * 100)].join(':');
        }

        // 共用：每格主题地砖（圆角 + 渐层 + 描边 + 可选点缀）+ 格线
        paintTiles(ctx, G, colA, colA2, colB, colB2, edge, accent) {
            const gridX = this.OX, gridY = this.OY, gridW = this.C * G, gridH = this.R * G;
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 7; ctx.shadowOffsetY = 3;
            for (let r = 0; r < this.R; r++) for (let c = 0; c < this.C; c++) {
                const x = gridX + c * G, y = gridY + r * G, pad = Math.max(3, G * 0.055), even = (r + c) % 2 === 0;
                const grad = ctx.createLinearGradient(x, y, x, y + G);
                grad.addColorStop(0, even ? colA : colB); grad.addColorStop(1, even ? colA2 : colB2);
                ctx.fillStyle = grad;
                this.drawRoundedRect(ctx, x + pad, y + pad, G - pad * 2, G - pad * 2, Math.max(7, G * 0.12)); ctx.fill();
                ctx.strokeStyle = edge; ctx.lineWidth = Math.max(1, G * 0.025); ctx.stroke();
                if (accent) accent(ctx, x, y, r, c);
            }
            ctx.restore();
            ctx.strokeStyle = 'rgba(247,243,232,0.34)'; ctx.lineWidth = 2;
            for (let r = 0; r <= this.R; r++) { ctx.beginPath(); ctx.moveTo(gridX, gridY + r * G); ctx.lineTo(gridX + gridW, gridY + r * G); ctx.stroke(); }
            for (let c = 0; c <= this.C; c++) { ctx.beginPath(); ctx.moveTo(gridX + c * G, gridY); ctx.lineTo(gridX + c * G, gridY + gridH); ctx.stroke(); }
        }

        renderStageCache(G, chapterId) {
            const canvas = document.createElement('canvas');
            const dpr = this.dpr || 1;
            canvas.width = Math.round(this.w * dpr);
            canvas.height = Math.round(this.h * dpr);
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            const gridX = this.OX, gridY = this.OY, gridW = this.C * G, gridH = this.R * G;
            let overlay = null;

            if (chapterId === 'playground') {
                // 操场：天空 + 草地 + 红色跑道（5 排 = 跑道），白色跑道线
                const sky = ctx.createLinearGradient(0, 0, 0, Math.max(1, gridY));
                sky.addColorStop(0, '#bfe3ff'); sky.addColorStop(1, '#e9f6d8');
                ctx.fillStyle = sky; ctx.fillRect(0, 0, this.w, this.h);
                ctx.fillStyle = '#8fc55f'; ctx.fillRect(0, gridY - 6, this.w, this.h - gridY + 6); // 草地带
                // 小旗
                if (gridY > 24) { ctx.strokeStyle = '#94703f'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(gridX + 14, gridY - 8); ctx.lineTo(gridX + 14, Math.max(6, gridY - 40)); ctx.stroke(); ctx.fillStyle = '#E85D5D'; ctx.beginPath(); ctx.moveTo(gridX + 16, Math.max(8, gridY - 38)); ctx.lineTo(gridX + 16 + G * 0.5, Math.max(14, gridY - 31)); ctx.lineTo(gridX + 16, Math.max(20, gridY - 24)); ctx.fill(); }
                this.paintTiles(ctx, G, '#d6a062', '#bf8347', '#cf9657', '#b27a3f', '#8a5a2f', (cx, x, y, r) => {
                    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillRect(x + 2, y + G - 3, G - 4, 2); // 跑道线
                });
            } else if (chapterId === 'library') {
                // 图书馆：暖墙 + 书架（彩色书脊）+ 走道地砖 + 阅读灯
                const wall = ctx.createLinearGradient(0, 0, 0, Math.max(1, gridY + gridH));
                wall.addColorStop(0, '#e7d6b8'); wall.addColorStop(0.5, '#d2b88e'); wall.addColorStop(0.52, '#8a6b45'); wall.addColorStop(1, '#6b4f31');
                ctx.fillStyle = wall; ctx.fillRect(0, 0, this.w, this.h);
                if (gridY > 26) { // 顶部书架
                    const shelfBooks = ['#c0584f', '#4a7a9c', '#caa24a', '#5b8c5a', '#9c5b86'];
                    ctx.fillStyle = '#7a4a28'; ctx.fillRect(gridX, 6, gridW, gridY - 12);
                    let bxp = gridX + 4;
                    for (let i = 0; bxp < gridX + gridW - 6; i++) { const bw = 8 + (i * 7 % 12); const bh = (gridY - 18) * (0.6 + (i % 3) * 0.13); ctx.fillStyle = shelfBooks[i % shelfBooks.length]; ctx.fillRect(bxp, gridY - 6 - bh, bw, bh); bxp += bw + 3; }
                }
                this.paintTiles(ctx, G, '#caa775', '#b08a55', '#c0985f', '#a67c45', '#5b3d22', null);
                overlay = { lamp: { x: gridX + gridW - G * 0.6, y: Math.max(10, gridY - 18) } };
            } else if (chapterId === 'exam') {
                // 考场：冷色紧张 + 监考台 + 时钟 + 座位（桌格 + 试卷）
                const wall = ctx.createLinearGradient(0, 0, 0, Math.max(1, gridY + gridH));
                wall.addColorStop(0, '#dfe6ef'); wall.addColorStop(0.5, '#bcc7d6'); wall.addColorStop(0.52, '#9aa3b2'); wall.addColorStop(1, '#7c8694');
                ctx.fillStyle = wall; ctx.fillRect(0, 0, this.w, this.h);
                const clock = { x: gridX + gridW * 0.5, y: Math.max(16, gridY - 22), r: Math.min(16, Math.max(10, gridY * 0.3)) };
                if (gridY > 30) { ctx.fillStyle = '#f7f3e8'; ctx.beginPath(); ctx.arc(clock.x, clock.y, clock.r, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#5b6675'; ctx.lineWidth = 2; ctx.stroke(); }
                this.paintTiles(ctx, G, '#e2e8f1', '#cfd8e4', '#d6deea', '#c2cdda', '#8893a4', (cx, x, y, r, c) => {
                    if ((r + c) % 2 === 0) { cx.fillStyle = '#fbfcff'; cx.fillRect(x + G * 0.56, y + G * 0.2, G * 0.24, G * 0.18); cx.strokeStyle = 'rgba(120,130,150,0.5)'; cx.lineWidth = 1; cx.strokeRect(x + G * 0.56, y + G * 0.2, G * 0.24, G * 0.18); }
                });
                overlay = { clock };
            } else {
                // classroom（保留原教室画法）
                const p = CLASSROOM_PALETTE;
                const wall = ctx.createLinearGradient(0, 0, 0, Math.max(1, gridY + gridH));
                wall.addColorStop(0, p.wallTop); wall.addColorStop(0.52, p.wallBottom); wall.addColorStop(0.53, p.floor); wall.addColorStop(1, p.floorDark);
                ctx.fillStyle = wall; ctx.fillRect(0, 0, this.w, this.h);
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                for (let x = gridX - G; x < gridX + gridW + G; x += Math.max(42, G * 0.72)) ctx.fillRect(x, gridY + gridH + 4, 2, this.h - gridY - gridH);
                ctx.fillStyle = 'rgba(75,45,25,0.18)'; ctx.fillRect(0, gridY + gridH + 3, this.w, 5);
                const boardH = Math.min(58, Math.max(34, gridY - 18));
                const bx = gridX + G * 0.45, by = Math.max(8, gridY - boardH - 7), bw = Math.min(gridW * 0.46, this.w - bx - 18);
                if (boardH > 28) {
                    ctx.fillStyle = p.chalkTrim; this.drawRoundedRect(ctx, bx - 7, by - 7, bw + 14, boardH + 14, 10); ctx.fill();
                    ctx.fillStyle = p.chalkboard; this.drawRoundedRect(ctx, bx, by, bw, boardH, 7); ctx.fill();
                    const wx = bx + bw + 18, ww = Math.min(G * 1.4, this.w - wx - 16);
                    if (ww > 36) {
                        ctx.fillStyle = '#f7f3e8'; this.drawRoundedRect(ctx, wx, by + 2, ww, boardH - 2, 8); ctx.fill();
                        ctx.fillStyle = p.window; this.drawRoundedRect(ctx, wx + 5, by + 7, ww - 10, boardH - 12, 5); ctx.fill();
                        ctx.strokeStyle = 'rgba(36,87,63,0.35)'; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.moveTo(wx + ww / 2, by + 8); ctx.lineTo(wx + ww / 2, by + boardH - 7);
                        ctx.moveTo(wx + 7, by + boardH / 2); ctx.lineTo(wx + ww - 7, by + boardH / 2); ctx.stroke();
                    }
                }
                this.paintTiles(ctx, G, p.deskTop, p.deskAlt, '#d29358', '#aa6836', p.deskEdge, (cx, x, y, r, c) => {
                    cx.fillStyle = 'rgba(255,236,196,0.24)'; cx.fillRect(x + Math.max(3, G * 0.055) + 8, y + Math.max(3, G * 0.055) + 7, Math.max(10, G * 0.34), 3);
                    if ((r + c) % 3 === 0) { cx.fillStyle = p.paper; cx.fillRect(x + G * 0.58, y + G * 0.18, G * 0.22, G * 0.16); cx.fillStyle = 'rgba(74,144,226,0.38)'; cx.fillRect(x + G * 0.6, y + G * 0.24, G * 0.15, 2); }
                });
                overlay = boardH > 28 ? { chalk: { bx, by, bw, boardH } } : null;
            }
            return { canvas, key: this.getStageCacheKey(G, chapterId), overlay: overlay };
        }

        drawChapterStage(ctx, G, chapterId) {
            const key = this.getStageCacheKey(G, chapterId);
            if (!this.stageCache || this.stageCache.key !== key) this.stageCache = this.renderStageCache(G, chapterId);
            const cache = this.stageCache, ov = cache.overlay;
            ctx.drawImage(cache.canvas, 0, 0, this.w, this.h);
            if (!ov) return;
            if (ov.chalk) { // 教室：动态粉笔线
                const { bx, by, bw, boardH } = ov.chalk;
                ctx.strokeStyle = 'rgba(247,243,232,0.26)'; ctx.lineWidth = 3;
                for (let i = 0; i < 3; i++) { const yy = by + 15 + i * Math.max(8, boardH * 0.2); ctx.beginPath(); ctx.moveTo(bx + 16, yy); ctx.lineTo(bx + bw * (0.42 + i * 0.11), yy + Math.sin(this.frame * 0.02 + i) * 2); ctx.stroke(); }
            } else if (ov.clock) { // 考场：时钟秒针
                const c = ov.clock, a = (this.frame * 0.03) % (Math.PI * 2);
                ctx.strokeStyle = '#E85D5D'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x + Math.sin(a) * c.r * 0.8, c.y - Math.cos(a) * c.r * 0.8); ctx.stroke();
            } else if (ov.lamp) { // 图书馆：阅读灯暖光呼吸
                const l = ov.lamp, glow = 0.18 + 0.1 * Math.abs(Math.sin(this.frame * 0.04));
                ctx.fillStyle = 'rgba(246,211,101,' + glow + ')'; ctx.beginPath(); ctx.arc(l.x, l.y, G * 0.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        drawRasterScene(ctx, assetId, label) {
            const image = ASSETS.images[assetId];
            if (!image) { drawMissingPaintedAsset(ctx, this.w / 2, this.h / 2, Math.min(this.w, this.h) * 0.45, label, '#f8fafc'); return false; }
            const containScale = Math.min(this.w / image.width, this.h / image.height);
            const coverScale = Math.max(this.w / image.width, this.h / image.height);
            const coverW = image.width * coverScale, coverH = image.height * coverScale;
            ctx.save();
            ctx.globalAlpha = 0.62;
            ctx.filter = 'blur(14px) saturate(0.9)';
            ctx.drawImage(image, (this.w - coverW) / 2, (this.h - coverH) / 2, coverW, coverH);
            ctx.restore();
            const w = image.width * containScale, h = image.height * containScale;
            ctx.drawImage(image, (this.w - w) / 2, (this.h - h) / 2, w, h);
            return true;
        }

        drawBattleGrid(ctx) {
            ctx.save();
            for (let r = 0; r < this.R; r++) {
                ctx.fillStyle = r % 2 === 0 ? 'rgba(255, 255, 255, 0.035)' : 'rgba(15, 23, 42, 0.035)';
                ctx.fillRect(this.OX, this.OY + r * this.G, this.C * this.G, this.G);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let c = 0; c <= this.C; c++) {
                const x = this.OX + c * this.G;
                ctx.moveTo(x, this.OY); ctx.lineTo(x, this.OY + this.R * this.G);
            }
            for (let r = 0; r <= this.R; r++) {
                const y = this.OY + r * this.G;
                ctx.moveTo(this.OX, y); ctx.lineTo(this.OX + this.C * this.G, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        drawUltimateTargetPreview(ctx) {
            if (!this.pendingUltimate || !this.pendingUltimate.previewCell) return;
            const meta = TOOL_ULTIMATES[this.pendingUltimate.toolId];
            const cells = this.ultimateAreaCells(meta, this.pendingUltimate.previewCell);
            ctx.save();
            cells.forEach(cell => {
                const x = this.OX + cell.c * this.G;
                const y = this.OY + cell.r * this.G;
                ctx.fillStyle = 'rgba(246, 211, 101, 0.28)';
                ctx.fillRect(x + 2, y + 2, this.G - 4, this.G - 4);
                ctx.strokeStyle = 'rgba(255, 247, 237, 0.92)';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 3, y + 3, this.G - 6, this.G - 6);
            });
            ctx.restore();
        }

        drawChapterMinigame(ctx) {
            const mg = this.minigame, w = this.w, h = this.h;
            const viewportOrientation = w > h ? 'landscape' : 'portrait';
            const variant = resolveSceneVariant('minigame', viewportOrientation, null, mg.id);
            this.drawRasterScene(ctx, 'minigame_' + mg.id + '_' + variant.variant, mg.title);
            ctx.fillStyle = '#f8fafc'; ctx.textAlign = 'center';
            ctx.font = 'bold ' + Math.max(20, Math.floor(w * 0.028)) + 'px Arial';
            ctx.fillText((mg && mg.title) || '阳光小游戏', w / 2, 44);
            (mg && mg.targets || []).forEach(t => {
                const pulse = 1 + Math.sin(this.frame * 0.16 + t.x) * 0.04;
                ctx.save(); ctx.translate(t.x, t.y); ctx.scale(pulse, pulse);
                ctx.shadowBlur = 18; ctx.shadowColor = t.color; ctx.fillStyle = t.color;
                if (t.kind === 'shield') {
                    ctx.beginPath();
                    ctx.moveTo(0, -t.radius); ctx.lineTo(t.radius * 0.82, -t.radius * 0.28); ctx.lineTo(t.radius * 0.54, t.radius * 0.9); ctx.lineTo(-t.radius * 0.54, t.radius * 0.9); ctx.lineTo(-t.radius * 0.82, -t.radius * 0.28); ctx.closePath();
                    ctx.fill(); ctx.strokeStyle = '#f8fafc'; ctx.lineWidth = 4; ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(0, 0, t.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = t.kind === 'fast' ? '#7c2d12' : '#312e81';
                    ctx.beginPath(); ctx.arc(-t.radius * 0.26, -t.radius * 0.08, 4, 0, Math.PI * 2); ctx.arc(t.radius * 0.26, -t.radius * 0.08, 4, 0, Math.PI * 2); ctx.fill();
                }
                if (t.hp > 1) {
                    ctx.fillStyle = '#fef3c7'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center'; ctx.fillText('盾', 0, 7);
                }
                ctx.restore();
            });
            const aim = mg && mg.crosshair ? mg.crosshair : { x: w / 2, y: h / 2 };
            ctx.strokeStyle = '#fef3c7'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(aim.x, aim.y, 22, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(aim.x - 32, aim.y); ctx.lineTo(aim.x - 10, aim.y); ctx.moveTo(aim.x + 10, aim.y); ctx.lineTo(aim.x + 32, aim.y);
            ctx.moveTo(aim.x, aim.y - 32); ctx.lineTo(aim.x, aim.y - 10); ctx.moveTo(aim.x, aim.y + 10); ctx.lineTo(aim.x, aim.y + 32);
            ctx.stroke(); ctx.textAlign = 'left';
        }

        draw() {
            if (!this.ctx) return;
            const ctx = this.ctx, G = this.G;
            ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, this.w, this.h);
            if (this.phase === 'td') {
                const level = LEVELS[this.levelIdx] || {};
                const viewportOrientation = this.w > this.h ? 'landscape' : 'portrait';
                const variant = resolveSceneVariant('td', viewportOrientation, level.id, null);
                if (variant.variant === 'landscape') this.drawRasterScene(ctx, 'scene_' + String(level.id || '').replace(/[^a-z0-9]+/gi, '_'), level.name || '场景加载中');
                this.drawBattleGrid(ctx);
                this.drawUltimateTargetPreview(ctx);
                // 路线预警：敌人即将出现的那一路，右侧闪红 + ⚠️
                this.laneWarnings.forEach(w => {
                    const blink = 0.3 + 0.4 * Math.abs(Math.sin(this.frame * 0.3));
                    const ry = this.OY + w.r * this.G;
                    const gridRight = this.OX + this.C * this.G;
                    const grad = ctx.createLinearGradient(gridRight - this.G * 2, 0, gridRight, 0);
                    grad.addColorStop(0, 'rgba(229,62,62,0)');
                    grad.addColorStop(1, 'rgba(229,62,62,' + blink + ')');
                    ctx.fillStyle = grad;
                    ctx.fillRect(gridRight - this.G * 2, ry, this.G * 2, this.G);
                    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(1, blink + 0.25) + ')';
                    ctx.font = 'bold ' + Math.max(16, Math.floor(this.G * 0.5)) + 'px Arial';
                    ctx.fillText('⚠️', gridRight - this.G * 0.95, ry + this.G * 0.64);
                });
                // Phase 4 Boss「红笔点名」预警绘制
                this.bossMarks.forEach(mk => {
                    const ry = this.OY + mk.r * this.G;
                    const prog = 1 - mk.life / mk.max;
                    const blink = 0.35 + 0.45 * Math.abs(Math.sin(this.frame * 0.4));
                    ctx.fillStyle = 'rgba(232,93,93,' + (0.12 + prog * 0.25) + ')';
                    ctx.fillRect(this.OX, ry, this.C * this.G, this.G);
                    const ts = this.objs.filter(o => o.type === 'tower' && o.r === mk.r).sort((a, b) => b.x - a.x);
                    const mx = ts.length ? ts[0].x + this.G / 2 : this.OX + this.G * 1.5;
                    const my = ry + this.G / 2, rad = this.G * (0.55 - prog * 0.18);
                    ctx.strokeStyle = 'rgba(232,93,93,' + blink + ')'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(mx, my, rad, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(mx - rad * 0.6, my - rad * 0.6); ctx.lineTo(mx + rad * 0.6, my + rad * 0.6);
                    ctx.moveTo(mx + rad * 0.6, my - rad * 0.6); ctx.lineTo(mx - rad * 0.6, my + rad * 0.6); ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(1, blink + 0.3) + ')';
                    ctx.font = 'bold ' + Math.max(12, Math.floor(this.G * 0.34)) + 'px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('红笔点名', this.OX + this.C * this.G * 0.5, ry + this.G * 0.32);
                    ctx.textAlign = 'left';
                });
                this.objs.forEach(o => {
                    if(o.type!=='orb' && o.type!=='bullet' && o.type!=='skillFx' && o.type!=='rasterFx' && o.type!=='bossAction' && o.type!=='dirtyZone' && o.type!=='enemyProjectile') {
                        const shadowScale = o.type === 'enemy' ? ((o.data && o.data.spriteScale) || 1) : 1;
                        ctx.fillStyle='rgba(0,0,0,0.3)';
                        ctx.beginPath();
                        ctx.ellipse(o.x+G/2, o.y+G-5, G/3*shadowScale, G/6*Math.min(1.35, shadowScale), 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                    if(o.type==='bossAction') {
                        if (!o.enemy) return;
                        const ratio = Math.max(0, o.delay / Math.max(1, o.maxDelay));
                        const cx = o.enemy.x + G / 2, cy = o.enemy.y + G / 2;
                        const bossTextX = Math.max(this.OX + G, Math.min(this.w - readSafeAreaInset('right') - G * 1.45, cx));
                        ctx.save();
                        ctx.strokeStyle = ratio < 0.35 ? '#ef4444' : '#fbbf24';
                        ctx.fillStyle = 'rgba(127, 29, 29, 0.14)';
                        ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.arc(cx, cy, G * (0.55 + ratio * 0.42), 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                        ctx.fillStyle = '#fff7ed';
                        ctx.font = 'bold ' + Math.max(13, Math.floor(G * 0.22)) + 'px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('BOSS 預警 ' + Math.max(1, Math.ceil(o.delay / 60)), bossTextX, cy - G * 0.62);
                        ctx.restore();
                    } else if(o.type==='rasterFx') {
                        if (o.delay > 0) return;
                        const image = ASSETS.images[o.assetId];
                        const size = o.size * (1 + (1 - o.life / o.maxLife) * 0.2);
                        if (image) {
                            ctx.save();
                            ctx.globalAlpha = Math.min(1, Math.max(0, o.life / 8));
                            ctx.drawImage(image, o.x - size / 2, o.y - size / 2, size, size);
                            ctx.restore();
                        }
                        else drawMissingPaintedAsset(ctx, o.x, o.y, size, o.label, '#f8fafc');
                    } else if(o.type==='dirtyZone') {
                        const pulse = 0.38 + 0.18 * Math.abs(Math.sin(this.frame * 0.18));
                        ctx.save();
                        ctx.globalAlpha = Math.min(0.72, pulse + 0.18);
                        ctx.fillStyle = o.color || '#ec4899';
                        ctx.strokeStyle = '#831843';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(o.x + 8, o.y + 16);
                        ctx.bezierCurveTo(o.x + o.w * 0.26, o.y - 8, o.x + o.w * 0.78, o.y + 12, o.x + o.w - 8, o.y + 18);
                        ctx.bezierCurveTo(o.x + o.w + 8, o.y + o.h * 0.42, o.x + o.w * 0.78, o.y + o.h + 8, o.x + o.w * 0.42, o.y + o.h - 8);
                        ctx.bezierCurveTo(o.x + o.w * 0.12, o.y + o.h + 2, o.x - 8, o.y + o.h * 0.58, o.x + 8, o.y + 16);
                        ctx.fill(); ctx.stroke();
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#fff7ed';
                        ctx.font = 'bold ' + Math.max(13, Math.floor(G * 0.26)) + 'px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('污', o.x + o.w / 2, o.y + o.h / 2 + 5);
                        ctx.textAlign = 'left';
                        ctx.restore();
                    } else if(o.type==='skillFx') {
                        const k = Math.max(0, o.life / (o.maxLife || 1));
                        ctx.save();
                        ctx.globalAlpha = Math.min(1, 0.2 + k);
                        ctx.strokeStyle = o.color || '#f97316';
                        ctx.lineWidth = 5 + (1 - k) * 6;
                        ctx.lineCap = 'round';
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = o.color || '#f97316';
                        ctx.beginPath(); ctx.moveTo(o.x1, o.y1); ctx.lineTo(o.x2, o.y2); ctx.stroke();
                        ctx.fillStyle = o.color || '#f97316';
                        ctx.beginPath(); ctx.arc(o.x2, o.y2, 12 + (1 - k) * 22, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#fff7ed';
                        ctx.font = 'bold ' + Math.max(12, Math.floor(G * 0.22)) + 'px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(o.label || '技能', (o.x1 + o.x2) / 2, (o.y1 + o.y2) / 2 - 12);
                        ctx.textAlign = 'left';
                        ctx.restore();
                    } else if(o.type==='enemyProjectile') {
                        const sp = Math.hypot(o.vx || 0, o.vy || 0);
                        ctx.save();
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = o.color || '#f97316';
                        if (sp > 0.5) {
                            const tl = 24, tx = o.x - o.vx/sp*tl, ty = o.y - o.vy/sp*tl;
                            const grad = ctx.createLinearGradient(tx, ty, o.x, o.y);
                            grad.addColorStop(0, 'rgba(255,255,255,0)');
                            grad.addColorStop(1, o.color || '#f97316');
                            ctx.strokeStyle = grad; ctx.lineWidth = 8; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(o.x, o.y); ctx.stroke();
                        }
                        ctx.fillStyle = o.color || '#f97316';
                        ctx.beginPath(); ctx.arc(o.x, o.y, 9, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff7ed';
                        ctx.beginPath(); ctx.arc(o.x - 2, o.y - 2, 3, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    } else if(o.type==='tower') {
                        const towerIcon = (o.up && o.up.icon) || o.data.icon;
                        const towerAssetId = getTowerAssetId(o.id, o.toolLevel || 1);
                        const tSprite = ASSETS.get(towerAssetId);
                        if (tSprite) {
                            const age = this.frame - (o.placedFrame || 0);
                            const pop = age < 14 ? 1 + Math.sin(age/14*Math.PI)*0.22 : 1; // 放置弹入
                            const sq = (1 + Math.sin(this.frame*0.12 + o.c)*0.03) * pop;
                            const sz = G * 1.08;
                            ctx.save(); ctx.translate(o.x+G/2, o.y+G/2); ctx.scale(pop, sq);
                            ctx.drawImage(tSprite, -sz/2, -sz/2, sz, sz); ctx.restore();
                            if(o.hp<o.maxHp) { ctx.fillStyle='rgba(255,0,0,0.45)'; ctx.fillRect(o.x+10, o.y+10, G-20, (G-20)*(1-o.hp/o.maxHp)); }
                        } else if (hasExpectedAsset(towerAssetId)) {
                            drawMissingPaintedAsset(ctx, o.x + G / 2, o.y + G / 2, G * 0.92, towerIcon, o.data.color);
                        } else {
                        ctx.fillStyle = o.data.color;
                        if(o.data.type==='wall') { ctx.fillRect(o.x+10, o.y+10, G-20, G-20); ctx.strokeStyle='white'; ctx.strokeRect(o.x+10,o.y+10,G-20,G-20); ctx.fillStyle='black'; ctx.font=`${G*0.5}px Arial`; ctx.fillText('🛡️', o.x+G/3.5, o.y+G/1.5); }
                        else if(o.data.type==='bomb') {
                            ctx.beginPath(); ctx.arc(o.x+G/2, o.y+G/2, G/2.5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
                            ctx.fillStyle='white'; ctx.font=`${G*0.6}px Arial`; ctx.fillText(towerIcon, o.x+G/4, o.y+G/1.4);
                            ctx.fillStyle='#F6AD55'; ctx.beginPath(); ctx.arc(o.x+G-10, o.y+10, 5, 0, Math.PI*2); ctx.fill();
                        }
                        else { ctx.beginPath(); ctx.arc(o.x+G/2, o.y+G/2, G/2.5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='black'; ctx.font=`${G*0.5}px Arial`; ctx.fillText(towerIcon, o.x+G/3.5, o.y+G/1.5); }
                        if(o.hp<o.maxHp) { ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.fillRect(o.x+10, o.y+10, G-20, (G-20)*(1-o.hp/o.maxHp)); }
                        }
                        if(o.hitFlash > 0) {
                            ctx.fillStyle='rgba(248,113,113,' + Math.min(0.55, 0.18 + o.hitFlash * 0.035) + ')';
                            ctx.fillRect(o.x+7, o.y+7, G-14, G-14);
                        }
                        // 升级标记 + 选中高亮（Phase 2.5）
                        if(o.upgraded) { ctx.fillStyle='#F6D365'; ctx.font=`bold ${Math.max(12,G*0.3)}px Arial`; ctx.textAlign='left'; ctx.fillText('⭐', o.x+G-G*0.36, o.y+G*0.36); }
                        if(o.upgradedPermanent) { ctx.font=`${Math.max(12,G*0.32)}px Arial`; ctx.textAlign='left'; ctx.fillText('✨', o.x+G*0.04, o.y+G*0.34); }
                        if(o.silenceTimer > 0) {
                            ctx.fillStyle='rgba(15,23,42,0.48)';
                            ctx.fillRect(o.x+8, o.y+8, G-16, G-16);
                            ctx.fillStyle='#cbd5e1';
                            ctx.font=`bold ${Math.max(14,G*0.34)}px Arial`;
                            ctx.textAlign='center';
                            ctx.fillText('静', o.x+G/2, o.y+G*0.58);
                            ctx.textAlign='left';
                        }
                        if(o===this.selectedField) { ctx.strokeStyle='#F6D365'; ctx.lineWidth=3; ctx.setLineDash([6,4]); ctx.strokeRect(o.x+4, o.y+4, G-8, G-8); ctx.setLineDash([]); }
                    } else if(o.type==='enemy') { this.drawEnemy(ctx, o, G); }
                    else if(o.type==='bullet') {
                        const sp = Math.hypot(o.vx, o.vy);
                        if (sp > 0.5) {
                            const tl = 16, tx = o.x - o.vx/sp*tl, ty = o.y - o.vy/sp*tl;
                            const grad = ctx.createLinearGradient(tx, ty, o.x, o.y);
                            grad.addColorStop(0, 'rgba(255,255,255,0)'); grad.addColorStop(1, o.color);
                            ctx.strokeStyle = grad; ctx.lineWidth = 6; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(o.x, o.y); ctx.stroke();
                        }
                        ctx.fillStyle=o.color; ctx.beginPath(); ctx.arc(o.x, o.y, 7, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(o.x-1.5, o.y-1.5, 2.5, 0, Math.PI*2); ctx.fill();
                    }
                    else if(o.type==='orb') { ctx.shadowBlur=15; ctx.shadowColor='#F6E05E'; ctx.fillStyle='#F6E05E'; ctx.beginPath(); ctx.arc(o.x, o.y, 25, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#FFFFF0'; ctx.lineWidth=3; ctx.stroke(); ctx.shadowBlur=0; }
                    else if(o.type==='star') {
                        const pulse = 1 + Math.sin(this.frame*0.2)*0.12;
                        ctx.save(); ctx.translate(o.x, o.y); ctx.scale(pulse, pulse);
                        ctx.shadowBlur=18; ctx.shadowColor='#F6D365';
                        ctx.fillStyle='#F6D365'; ctx.strokeStyle='#fff7e0'; ctx.lineWidth=2;
                        ctx.beginPath();
                        for(let s=0;s<5;s++){ const a=-Math.PI/2 + s*2*Math.PI/5, a2=a+Math.PI/5;
                            ctx.lineTo(Math.cos(a)*22, Math.sin(a)*22); ctx.lineTo(Math.cos(a2)*10, Math.sin(a2)*10); }
                        ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
                        ctx.fillStyle='#7a5b1a'; ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.fillText('?', 0, 6);
                        ctx.restore();
                    }
                });
            } else if (this.phase === 'minigame' && this.minigame) {
                this.drawChapterMinigame(ctx);
            } else if (this.phase === 'maze' && this.maze) {
                const m = this.maze, cs = m.cs, mx = m.mx, my = m.my;
                for(let y=0; y<m.h; y++) for(let x=0; x<m.w; x++) {
                    const t = m.map[y][x], px = mx+x*cs, py = my+y*cs;
                    if(t===1) { ctx.fillStyle='#1e293b'; ctx.fillRect(px,py,cs,cs); ctx.fillStyle='#334155'; ctx.fillRect(px,py,cs,5); }
                    else { ctx.fillStyle='#f1f5f9'; ctx.fillRect(px,py,cs,cs); ctx.strokeStyle='#cbd5e1'; ctx.strokeRect(px,py,cs,cs); }
                    if(t===5) {
                        const pulse2 = Math.sin(this.frame * 0.15) * 4;
                        ctx.fillStyle='rgba(72, 187, 120, 0.4)'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/2.5 + pulse2, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#22c55e'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/3, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke(); ctx.fillStyle='white'; ctx.font='bold 24px Arial'; ctx.fillText('?', px+cs/2-7, py+cs/2+8);
                    }
                }
                if (this.mazePath && this.mazePathIdx < this.mazePath.length) {
                    ctx.fillStyle = 'rgba(59,130,246,0.35)';
                    for (let pi = this.mazePathIdx; pi < this.mazePath.length; pi++) {
                        const s = this.mazePath[pi];
                        ctx.beginPath(); ctx.arc(mx+s.x*cs+cs/2, my+s.y*cs+cs/2, cs/6, 0, Math.PI*2); ctx.fill();
                    }
                }
                const px = mx+m.px*cs, py = my+m.py*cs;
                ctx.fillStyle='#3b82f6'; ctx.beginPath(); ctx.arc(px+cs/2, py+cs/2, cs/3, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
                if (this.touchStart) {
                    ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 4; ctx.arc(this.touchStart.x, this.touchStart.y, 50, 0, Math.PI * 2); ctx.stroke();
                    if (this.currentTouch) {
                        ctx.beginPath(); ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.arc(this.currentTouch.x, this.currentTouch.y, 20, 0, Math.PI * 2); ctx.fill();
                        const playerScreenX = mx + m.px * cs + cs/2, playerScreenY = my + m.py * cs + cs/2;
                        ctx.beginPath(); ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)'; ctx.lineWidth = 4; ctx.setLineDash([10, 5]); ctx.moveTo(playerScreenX, playerScreenY); ctx.lineTo(this.currentTouch.x, this.currentTouch.y); ctx.stroke(); ctx.setLineDash([]);
                    }
                }
            }
            this.particles.forEach(p => {
                const fade = Math.min(1, p.life / 18);
                if (p.shape === 'scrap') {
                    ctx.save(); ctx.globalAlpha = fade; ctx.translate(p.x, p.y); ctx.rotate((p.rot || 0) + this.frame * (p.vr || 0));
                    ctx.fillStyle = p.color; ctx.fillRect(-p.size, -p.size*0.6, p.size*2, p.size*1.2); ctx.restore();
                } else if (p.shape === 'dust') {
                    ctx.save(); ctx.globalAlpha = fade * 0.85; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
                } else {
                    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
            });
            this.floatTexts.forEach(t => { ctx.shadowBlur=2; ctx.shadowColor='black'; ctx.fillStyle=t.color; ctx.font=`bold ${t.size}px Arial`; ctx.fillText(t.text, t.x, t.y); ctx.shadowBlur=0; });
        }

        updateStats() {
            const normalizedCooldowns = {};
            for (const k in TOWERS) normalizedCooldowns[k] = this.towerCooldowns[k] ? this.towerCooldowns[k] / TOWERS[k].recharge : 0;
            this.callbacks.onStatsUpdate(this.mp, this.hp, this.waveIdx + 1, LEVELS[this.levelIdx].name, 0, normalizedCooldowns);
        }
    }

            Object.assign(this, patch);
            if (this.ultimatePointer) {
                const leavesBattle = Object.prototype.hasOwnProperty.call(patch, 'phase') && patch.phase !== 'td';
                if (!leavesBattle) return;
                this.ultimatePointer = null;
            }
            this.render();
        }

        el(tag, style, ...children) {
            const e = document.createElement(tag);
            if (style) Object.assign(e.style, style);
            children.forEach(c => {
                if (typeof c === 'string') e.appendChild(document.createTextNode(c));
                else if (c) e.appendChild(c);
            });
            return e;
        }

        btn(text, style, onClick, disabled = false) {
            const b = document.createElement('button');
            b.textContent = text;
            Object.assign(b.style, style);
            b.onclick = onClick;
            b.disabled = disabled;
            return b;
        }

        // 计算单一世界进度：真实关卡数 / 已通关数 / 星星总数 / 是否解锁
        worldStat(world) {
            const realNodes = world.nodes.filter(n => n.levelIdx != null);
            const firstReal = realNodes.length ? Math.min.apply(null, realNodes.map(n => n.levelIdx)) : 999;
            let cleared = 0, stars = 0;
            realNodes.forEach(n => {
                const id = LEVELS[n.levelIdx] && LEVELS[n.levelIdx].id;
                const r = id && this.results[id];
                if (r && r.stars > 0) { cleared++; stars += r.stars; }
            });
            // 主线世界：按解锁进度；研究所（advanced）：通关大学部后开放
            const unlocked = world.advanced
                ? isCampaignCleared(this.results)
                : (!world.locked && firstReal <= (this.unlockedLevel || 0));
            return { realCount: realNodes.length, total: world.nodes.length, cleared, stars, unlocked, firstReal, advanced: !!world.advanced };
        }
